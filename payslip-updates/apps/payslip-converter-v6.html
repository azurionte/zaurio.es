<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Payslip converter V6</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root{--bg:#07111f;--bar:#101827;--panel:#0b1728;--line:rgba(148,163,184,.26);--text:#e5edf8;--muted:#9fb0c9;--blue:#60a5fa;--green:#86efac;--orange:#fb923c;--field:#071024}
*{box-sizing:border-box}html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}button,input,textarea{font:inherit}button{cursor:pointer}.app{height:100vh;display:flex;flex-direction:column;background:linear-gradient(180deg,#07111f,#0b1020)}.bar{min-height:56px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--line);background:var(--bar);padding:10px 18px}.title{display:flex;align-items:center;gap:10px;font-weight:950;font-size:18px}.tag{display:inline-flex;align-items:center;border:1px solid rgba(134,239,172,.34);background:rgba(22,163,74,.13);color:#bbf7d0;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:950}.actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.btn{border:1px solid rgba(96,165,250,.38);background:rgba(37,99,235,.16);color:#eaf2ff;border-radius:999px;padding:9px 13px;font-weight:900;display:inline-flex;align-items:center;gap:8px}.btn.primary{background:#0b82ff;border-color:#0b82ff;color:#fff}.btn.warn{background:#f97316;border-color:#f97316;color:#fff}.btn.good{background:#22c55e;border-color:#22c55e;color:#04130a}.btn:disabled{opacity:.45;cursor:not-allowed}.content{flex:1;min-height:0;overflow:auto;padding:22px}.home{width:min(1180px,100%);margin:0 auto}.panel{border:1px solid var(--line);background:rgba(15,23,42,.72);border-radius:8px;padding:18px}.panel h1{margin:0 0 8px;font-size:28px}.panel p{margin:0;color:var(--muted);line-height:1.45}.country-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-top:16px}.country{border:1px solid var(--line);background:#071024;color:#fff;border-radius:8px;padding:14px;text-align:left;min-height:124px;display:grid;grid-template-columns:44px 1fr;gap:12px;align-items:start}.country:hover,.country.active{border-color:#60a5fa;background:rgba(37,99,235,.14)}.country b{display:block;font-size:18px;margin-bottom:4px}.country small{color:var(--muted);line-height:1.3}.flag{width:38px;height:28px;border-radius:5px;box-shadow:0 0 0 1px rgba(255,255,255,.28) inset;background:#334155}.flag.uk{background:linear-gradient(135deg,#012169 0 43%,#fff 43% 48%,#c8102e 48% 55%,#fff 55% 60%,#012169 60%)}.flag.au{background:#1d4ed8}.flag.cn{background:#dc2626}.flag.de{background:linear-gradient(#000 0 33%,#dd0000 33% 66%,#ffce00 66%)}.flag.mx{background:linear-gradient(90deg,#006847 0 33%,#fff 33% 66%,#ce1126 66%)}.flag.sg{background:linear-gradient(#dc2626 0 50%,#fff 50%)}.flag.fr{background:linear-gradient(90deg,#002395 0 33%,#fff 33% 66%,#ed2939 66%)}.flag.nl{background:linear-gradient(#ae1c28 0 33%,#fff 33% 66%,#21468b 66%)}.flag.ca{background:linear-gradient(90deg,#d52b1e 0 25%,#fff 25% 75%,#d52b1e 75%)}.workspace{flex:1;min-height:0;display:grid;grid-template-columns:360px minmax(0,1fr);background:#101010}.sidebar{min-height:0;display:flex;flex-direction:column;background:#121212;border-right:1px solid #333}.tabs{display:flex;gap:6px;flex-wrap:wrap;padding:12px;border-bottom:1px solid #333}.tabs button{border:1px solid #444;background:#2b2b2b;color:#fff;border-radius:6px;padding:7px 9px;font-size:12px}.tabs button.active{background:#0b82ff;border-color:#0b82ff}.fields{flex:1;min-height:0;overflow:auto;padding:12px}.section{border:1px solid #333;background:#1f1f1f;border-radius:8px;margin-bottom:12px;padding:12px}.section h3{margin:0 0 10px;font-size:15px}.field{display:block;margin-bottom:9px}.field span{display:block;font-size:11px;font-weight:850;color:#cbd5e1;margin-bottom:5px}input,textarea{width:100%;border:1px solid #444;background:#2a2a2a;color:#fff;border-radius:6px;padding:8px 9px;min-height:36px}textarea{resize:vertical;min-height:74px}.preview{min-height:0;display:flex;flex-direction:column}.preview-head{min-height:46px;padding:8px 14px;border-bottom:1px solid #333;display:flex;align-items:center;justify-content:space-between;background:#151515}.preview-head strong{font-size:14px}.preview-head span{font-size:12px;color:#aaa}.preview-scroll{flex:1;min-height:0;overflow:auto;padding:30px 22px 70px}.paper{display:flex;justify-content:center;min-width:max-content}.paper iframe{border:0;background:#fff;box-shadow:0 12px 34px rgba(0,0,0,.42);width:794px;height:1123px}.busy{position:fixed;inset:0;z-index:1000;background:rgba(2,6,23,.74);display:none;align-items:center;justify-content:center;font-size:22px;font-weight:850}.busy.show{display:flex}.modal-cover{position:fixed;inset:0;z-index:900;background:rgba(2,6,23,.7);display:none;align-items:center;justify-content:center;padding:20px}.modal-cover.show{display:flex}.modal{width:min(860px,100%);border:1px solid var(--line);background:#0b1728;border-radius:8px;padding:18px;box-shadow:0 18px 50px rgba(0,0,0,.45)}.modal h2{margin:0 0 6px}.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#0f172a;border:1px solid var(--line);border-radius:999px;padding:10px 14px;z-index:1100;display:none}.toast.show{display:block}.hidden{display:none!important}@media(max-width:980px){.country-grid{grid-template-columns:1fr 1fr}.workspace{grid-template-columns:1fr}.sidebar{height:46vh;border-right:0;border-bottom:1px solid #333}.preview{height:54vh}}@media(max-width:640px){.country-grid{grid-template-columns:1fr}.bar{align-items:flex-start}.actions{width:100%}.btn{flex:1;justify-content:center}.content{padding:14px}}
</style>
</head>
<body>
<div class="app">
  <header class="bar">
    <div class="title"><i class="fa-solid fa-file-invoice-dollar"></i> Payslip converter V6 <span class="tag">V6.1.0</span></div>
    <div class="actions">
      <button id="importAnother" class="btn warn" type="button"><i class="fa-solid fa-file-import"></i> Import another</button>
      <button id="savePdf" class="btn good" type="button" disabled><i class="fa-solid fa-floppy-disk"></i> Save PDF</button>
    </div>
  </header>
  <main id="home" class="content">
    <section class="home panel">
      <h1>Select country</h1>
      <p>Choose the output payslip template. V6 then asks for the source earning statement and renders the exact country HTML template.</p>
      <div id="countryGrid" class="country-grid"></div>
    </section>
  </main>
  <section id="workspace" class="workspace hidden">
    <aside class="sidebar">
      <div id="tabs" class="tabs"></div>
      <div id="fields" class="fields"></div>
    </aside>
    <section class="preview">
      <div class="preview-head"><div><strong id="previewTitle">Preview</strong><br><span id="previewMeta"></span></div><span id="recordCount"></span></div>
      <div class="preview-scroll"><div class="paper"><iframe id="templateFrame" title="Payslip preview"></iframe></div></div>
    </section>
  </section>
</div>
<div id="countryModal" class="modal-cover"><div class="modal"><h2>Import another</h2><p class="muted">Choose the target country before selecting the PDF.</p><div id="modalCountries" class="country-grid"></div></div></div>
<input id="fileInput" type="file" accept="application/pdf,.pdf" hidden>
<div id="busy" class="busy">Reading PDF...</div>
<div id="toast" class="toast"></div>
<script>
(function(){
'use strict';
var COUNTRIES=[
 {key:'UK',flag:'uk',label:'United Kingdom',detail:'UK payslip',template:'payslip-v6/templates/uk.html',currency:'GBP'},
 {key:'AU',flag:'au',label:'Australia',detail:'PayForce Australia payslip',template:'payslip-v6/templates/au.html',currency:'AUD'},
 {key:'CN',flag:'cn',label:'China',detail:'China pay advice',template:'payslip-v6/templates/cn.html',currency:'CNY'},
 {key:'DE',flag:'de',label:'Germany',detail:'Germany payslip',template:'payslip-v6/templates/de.html',currency:'EUR'},
 {key:'MX',flag:'mx',label:'Mexico',detail:'Mexico payroll receipt',template:'payslip-v6/templates/mx.html',currency:'MXN'},
 {key:'SG',flag:'sg',label:'Singapore',detail:'Singapore payslip',template:'payslip-v6/templates/sg.html',currency:'SGD'},
 {key:'FR',flag:'fr',label:'France',detail:'France payslip',template:'payslip-v6/templates/fr.html',currency:'EUR'},
 {key:'NL',flag:'nl',label:'Netherlands',detail:'Netherlands payslip',template:'payslip-v6/templates/nl.html',currency:'EUR'},
 {key:'CA',flag:'ca',label:'Canada',detail:'Canada earnings statement',template:'payslip-v6/templates/ca.html',currency:'CAD'}
];
var MAP=COUNTRIES.reduce(function(a,c){a[c.key]=c;return a},{});
var state={country:null,records:[],index:0,fileName:'',templates:{}};
var common=[['name','Employee name'],['employeeId','Employee ID'],['period','Pay period'],['gross','Gross','number'],['deductionsTotal','Total deductions','number'],['net','Net pay','number'],['address','Address','textarea']];
function $(id){return document.getElementById(id)}
function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function num(v){var n=parseFloat(String(v==null?'':v).replace(/[^\d.-]/g,''));return isFinite(n)?n:0}
function b64ToArrayBuffer(b64){var bin=atob(b64),bytes=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);return bytes.buffer}
function desktop(){try{return window.payslipDesktop||(window.parent&&window.parent.payslipDesktop)}catch(e){return window.payslipDesktop||null}}
function toast(msg){var t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(function(){t.classList.remove('show')},2500)}
function busy(on,msg){$('busy').textContent=msg||'Working...';$('busy').classList.toggle('show',!!on)}
function tile(c,modal){return '<button type="button" class="country" data-country="'+c.key+'" data-modal="'+(modal?'1':'0')+'"><span class="flag '+c.flag+'"></span><span><b>'+esc(c.label)+'</b><small>'+esc(c.detail)+'</small></span></button>'}
function renderCountryTiles(){var html=COUNTRIES.map(function(c){return tile(c,false)}).join('');$('countryGrid').innerHTML=html;$('modalCountries').innerHTML=COUNTRIES.map(function(c){return tile(c,true)}).join('')}
async function templateFor(country){if(state.templates[country])return state.templates[country];var res=await fetch(MAP[country].template,{cache:'no-store'});if(!res.ok)throw new Error('Template not found: '+MAP[country].template);var html=await res.text();html=html.replace(/contenteditable=\"true\"/g,'data-v6-edit=\"true\"').replace(/contenteditable/g,'data-v6-edit');state.templates[country]=html;return html}
function sample(country,i){var id=String(({UK:8000,AU:3000,CN:3200,DE:3400,MX:3800,SG:3600,FR:6000,NL:5000,CA:7000}[country]||3000)+(i||0));return {country:country,name:['Alex Morgan','Cathy Robert','Markus Weber','Li Wei'][i%4],employeeId:id,period:'2026-Monthly-05',gross:5200,deductionsTotal:1400,net:3800,address:'Demo address',earnings:[{label:'Salary',amount:5200}],deductions:[{label:'Income Tax',amount:900},{label:'Social Security',amount:500}]}}
function parseAmount(s){s=String(s||'').replace(/[^\d,.-]/g,'');if(/,\d{2}$/.test(s))s=s.replace(/\./g,'').replace(',','.');else s=s.replace(/,/g,'');var n=parseFloat(s);return isFinite(n)?n:0}
function first(text,res){for(var i=0;i<res.length;i++){var m=text.match(res[i]);if(m)return (m[1]||'').trim()}return ''}
function sectionRows(lines,start,end){var on=false,out=[];lines.forEach(function(line){line=String(line||'').trim();if(start.test(line)){on=true;return}if(on&&end.test(line)){on=false;return}if(!on)return;var nums=line.match(/[-]?\d[\d,.]*\d/g)||[];if(!nums.length)return;var label=line.replace(/[-]?\d[\d,.]*\d/g,'').replace(/\b(AUD|EUR|MXN|GBP|SGD|CAD|CNY)\b/ig,'').replace(/\s+/g,' ').trim();var amount=parseAmount(nums[0]);if(label&&amount)out.push({label:label,amount:amount})});return out}
function parsePage(country,lines,i){var text=lines.join('\n'),r=sample(country,i);r.employeeId=first(text,[/Employee\s*ID\s*:?\s*([A-Z0-9-]+)/i,/Global\s*ID:\s*([A-Z0-9-]+)/i,/Employee Number:\s*([A-Z0-9-]+)/i])||r.employeeId;r.period=first(text,[/Pay\s*Period\s*:?\s*([^\n]+)/i,/Period\s*:?\s*([^\n]+)/i,/Month\/year of pay:\s*([^\n]+)/i])||r.period;if(lines[0]&&!/cid:/i.test(lines[0]))r.name=lines[0].replace(/\s*ADP Demo\s*/i,'').trim()||r.name;r.earnings=sectionRows(lines,/^Payments\b|Earnings|Pay Items/i,/Payment\s*Total|Deductions|Deduction Pay Items/i);r.deductions=sectionRows(lines,/^Deductions\b|Deduction Pay Items/i,/Deduction\s*Total|DeductionTotal|Employer Contributions|NetPay/i);var g=first(text,[/Payment\s*Total\s+\w+\s+([\d,.]+)/i,/Total Payment:\s*([\d,.]+)/i]);var d=first(text,[/DeductionTotal\s+\w+\s+([\d,.]+)/i,/Total Deduction\s*:?\s*([\d,.]+)/i]);var n=first(text,[/NetPay\s+([\d,.]+)/i,/Net Pay:\s*([\d,.]+)/i]);r.gross=parseAmount(g)||sum(r.earnings)||r.gross;r.deductionsTotal=parseAmount(d)||sum(r.deductions)||r.deductionsTotal;r.net=parseAmount(n)||r.gross-r.deductionsTotal;return r}
function sum(rows){return rows.reduce(function(t,r){return t+num(r.amount)},0)}
async function readPdf(buf){if(!window.pdfjsLib)throw new Error('PDF.js unavailable');pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';var pdf=await pdfjsLib.getDocument({data:new Uint8Array(buf),disableWorker:true,stopAtErrors:false}).promise;var pages=[];for(var p=1;p<=pdf.numPages;p++){var page=await pdf.getPage(p),content=await page.getTextContent({normalizeWhitespace:true,disableCombineTextItems:false});pages.push((content.items||[]).map(function(it){return String(it.str||'').trim()}).filter(Boolean));if(page.cleanup)page.cleanup()}if(pdf.destroy)pdf.destroy();return pages}
async function selectPdf(country){state.country=country;var api=desktop();if(api&&api.selectPdf){var r=await api.selectPdf();if(!r||r.canceled)return;return importBuffer(country,b64ToArrayBuffer(r.base64),r.fileName)}$('fileInput').value='';$('fileInput').dataset.country=country;$('fileInput').click()}
async function importBuffer(country,buf,name){busy(true,'Reading PDF...');try{var pages=await readPdf(buf);state.records=(pages.length?pages:[[ ]]).map(function(lines,i){return parsePage(country,lines,i)});state.index=0;state.fileName=name||'Imported PDF';$('home').classList.add('hidden');$('workspace').classList.remove('hidden');$('savePdf').disabled=false;await renderAll()}catch(e){console.error(e);toast('Could not parse PDF. Check the file and try again.')}finally{busy(false)}}
function renderTabs(){$('tabs').innerHTML=state.records.map(function(r,i){return '<button type="button" class="'+(i===state.index?'active':'')+'" data-record="'+i+'">ID : '+esc(r.employeeId)+'</button>'}).join('')}
function renderFields(){var r=state.records[state.index];$('fields').innerHTML='<div class="section"><h3>Employee and period</h3>'+common.map(function(f){var v=r[f[0]]||'';return '<label class="field"><span>'+esc(f[1])+'</span>'+(f[2]==='textarea'?'<textarea data-field="'+f[0]+'">'+esc(v)+'</textarea>':'<input data-field="'+f[0]+'" type="'+(f[2]==='number'?'number':'text')+'" value="'+esc(v)+'">')+'</label>'}).join('')+'</div><div class="section"><h3>Source</h3><div class="muted">'+esc(state.fileName)+'</div></div>'}
function fitTemplateToA4(doc){var page=doc.querySelector('.page,main.page,.pay-page')||doc.body.firstElementChild;if(!page||!doc.body)return;var style=doc.createElement('style');style.textContent='@page{size:A4;margin:0}html,body{width:794px!important;height:1123px!important;margin:0!important;padding:0!important;overflow:hidden!important;background:white!important}.v6-fit-wrap{width:794px;height:1123px;overflow:hidden;background:white}.v6-fit-wrap>.page,.v6-fit-wrap>main.page,.v6-fit-wrap>.pay-page{margin:0!important;transform-origin:top left!important;box-shadow:none!important}';doc.head.appendChild(style);var wrap=doc.createElement('div');wrap.className='v6-fit-wrap';doc.body.insertBefore(wrap,page);wrap.appendChild(page);setTimeout(function(){var w=page.offsetWidth||794,h=page.offsetHeight||1123,scale=Math.min(794/w,1123/h);if(scale>0&&scale<1)page.style.transform='scale('+scale+')';},0)}
function fillTemplate(doc,r){var edits=Array.from(doc.querySelectorAll('[data-v6-edit]'));function put(i,val){if(edits[i])edits[i].innerHTML=esc(val).replace(/\n/g,'<br>')}put(0,edits[0]?edits[0].textContent:'');put(1,r.employeeId);put(2,r.name);var body=doc.body;if(body){var html=body.innerHTML;html=html.replace(/08004232|06000020|05000034|7004144|3400|3200|3800/g,esc(r.employeeId));html=html.replace(/Evelyn Fraser|Cathy Robert|Markus Weber|Li Wei|Helene Perry|David Santos Ruiz/gi,esc(r.name));html=html.replace(/2026-Monthly-05|08\/2025|Augustus 2025/g,esc(r.period));body.innerHTML=html}fitTemplateToA4(doc)}
async function renderPreview(){var r=state.records[state.index];var html=await templateFor(state.country);var frame=$('templateFrame');frame.onload=function(){try{fillTemplate(frame.contentDocument,r)}catch(e){console.error(e)}};frame.srcdoc=html;$('previewTitle').textContent=MAP[state.country].label+' preview';$('previewMeta').textContent=r.name+' / '+r.employeeId+' / '+r.period;$('recordCount').textContent=(state.index+1)+' of '+state.records.length}
async function renderAll(){renderTabs();renderFields();await renderPreview()}
function openImportModal(){$('countryModal').classList.add('show')}
function closeModal(){$('countryModal').classList.remove('show')}
document.addEventListener('click',function(e){var c=e.target.closest('[data-country]');if(c){closeModal();selectPdf(c.dataset.country);return}var tab=e.target.closest('[data-record]');if(tab){state.index=parseInt(tab.dataset.record,10)||0;renderAll();return}if(e.target.closest('#importAnother'))openImportModal();if(e.target.closest('#countryModal')&&!e.target.closest('.modal'))closeModal();if(e.target.closest('#savePdf'))savePdf()});
document.addEventListener('input',function(e){var r=state.records[state.index];if(!r||!e.target.matches('[data-field]'))return;var k=e.target.dataset.field;r[k]=e.target.type==='number'?num(e.target.value):e.target.value;if(k==='gross'||k==='deductionsTotal')r.net=num(r.gross)-num(r.deductionsTotal);renderPreview()});
$('fileInput').addEventListener('change',function(){var f=this.files&&this.files[0];if(!f)return;var reader=new FileReader();reader.onload=function(ev){importBuffer($('fileInput').dataset.country,ev.target.result,f.name)};reader.readAsArrayBuffer(f)});
function savePdf(){var api=desktop(),frame=$('templateFrame'),doc=frame.contentDocument;if(!doc)return;var html='<!doctype html>'+doc.documentElement.outerHTML;if(api&&api.saveHtmlAsPdf){api.saveHtmlAsPdf({title:(state.country||'Payslip')+'_Payslip',html:html}).then(function(r){if(!r||r.canceled)return;toast('PDF saved')});return}var blob=new Blob([html],{type:'text/html'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='payslip.html';a.click()}
renderCountryTiles();
})();
</script>
</body>
</html>
