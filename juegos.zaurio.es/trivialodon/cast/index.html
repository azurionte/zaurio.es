<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Trivialodon Cast</title>
  <style>
    html,body{margin:0;width:100vw;height:100vh;overflow:hidden;background:#05000a;color:#fff;font-family:Arial,system-ui,sans-serif}
    body{position:fixed;inset:0}
    .shell{position:fixed;inset:0;width:100vw;height:100vh;overflow:hidden}
    iframe{position:absolute;inset:0;width:100vw;height:100vh;border:0;background:#05000a;display:block}
    .placeholder{position:absolute;inset:0;display:grid;place-items:center;padding:40px;background:radial-gradient(circle at top,#2f0049 0%,#180024 36%,#060009 100%)}
    .card{width:min(860px,92vw);padding:42px 36px;border-radius:32px;border:1px solid rgba(255,255,255,.12);background:rgba(43,4,73,.9);box-shadow:0 16px 48px rgba(0,0,0,.28);display:grid;gap:16px;justify-items:center;text-align:center}
    .card img{width:min(320px,64vw);display:block}
    .kick{display:inline-flex;padding:6px 12px;border-radius:999px;background:rgba(56,220,255,.14);color:#38dcff;font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}
    h1,p{margin:0}
    h1{font-size:clamp(2rem,4.4vw,3.8rem);line-height:.98}
    p{color:rgba(255,255,255,.78);font-size:1.02rem;line-height:1.5;max-width:34ch}
  </style>
</head>
<body>
  <main class="shell">
    <iframe id="liveFrame" allow="autoplay"></iframe>
    <div class="placeholder" id="placeholder">
      <article class="card">
        <img src="/shared/assets/brand/trivialodon.png" alt="Trivialodon">
        <span class="kick">Chromecast</span>
        <h1>Esperando la emision</h1>
        <p>Cuando el anfitrion conecte la TV, aqui aparecerá la pantalla en directo de Trivialodon.</p>
      </article>
    </div>
  </main>
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script>
    const NS = "urn:x-cast:zaurio.trivialodon";
    const frame = document.getElementById("liveFrame");
    const placeholder = document.getElementById("placeholder");
    let currentRoom = "";

    const LIVE_BUILD = "20260330-cast-fix-1";
    function liveUrl(roomCode){
      const code = String(roomCode || "").replace(/\D/g, "").slice(0, 4);
      if(!code) return "";
      return `${location.origin}/trivialodon/live?sala=${encodeURIComponent(code)}&layout=horizontal&cast=1&v=${encodeURIComponent(LIVE_BUILD)}`;
    }

    function showRoom(roomCode){
      const url = liveUrl(roomCode);
      if(!url) return;
      currentRoom = roomCode;
      if(frame.src !== url) frame.src = url;
      placeholder.style.display = "none";
    }

    function parsePayload(data){
      if(!data) return {};
      if(typeof data === "string"){
        try{ return JSON.parse(data); } catch(_){ return {}; }
      }
      return data;
    }

    const context = cast.framework.CastReceiverContext.getInstance();
    context.addCustomMessageListener(NS, event => {
      const payload = parsePayload(event.data);
      if(payload?.roomCode) showRoom(payload.roomCode);
    });

    const playerManager = context.getPlayerManager();
    playerManager.setMessageInterceptor(cast.framework.messages.MessageType.LOAD, request => {
      const payload = parsePayload(request?.media?.customData);
      if(payload?.roomCode) showRoom(payload.roomCode);
      return request;
    });

    context.start({
      disableIdleTimeout: true
    });
  </script>
</body>
</html>
