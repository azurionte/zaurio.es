<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Trivialodon Live</title>
  <style>
    :root{
      --bg:radial-gradient(circle at top,#31044c 0%,#180225 44%,#07000b 100%);
      --panel:rgba(44,7,70,.92);
      --panel-soft:rgba(255,255,255,.04);
      --stroke:rgba(255,255,255,.12);
      --text:#fff;
      --muted:rgba(255,255,255,.72);
      --cyan:#38dcff;
      --gold:#ffd84a;
      --pink:#ff7dcf;
      --green:#90eb7c;
      --red:#ff8095;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:Arial,system-ui,sans-serif}
    body{padding:14px}
    .app{height:calc(100dvh - 28px);display:grid;grid-template-rows:auto minmax(0,1fr);gap:14px}
    .top,.card,.answer,.roundRow,.podiumCard,.joinCard{border:1px solid var(--stroke);background:var(--panel);border-radius:28px;box-shadow:0 20px 60px rgba(0,0,0,.28)}
    .top{display:grid;grid-template-columns:auto 1fr auto;align-items:center;padding:14px 18px;gap:12px}
    .brand{width:min(220px,22vw);display:block}
    .topCenter{display:grid;place-items:center}
    .code{padding:10px 16px;border-radius:999px;background:rgba(255,216,74,.12);color:var(--gold);font-weight:1000;letter-spacing:.08em}
    .layout{display:grid;grid-template-columns:1fr;min-height:0}
    .card{padding:22px;display:grid;gap:16px;min-height:0}
    .kick{display:inline-flex;padding:6px 12px;border-radius:999px;background:rgba(56,220,255,.14);color:var(--cyan);font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}
    .hero{display:grid;gap:18px;position:relative;min-height:0}
    .hero.center{align-content:center;justify-items:center;text-align:center;min-height:min(70vh,780px)}
    .hero.center .titleWrap{justify-items:center;text-align:center;max-width:min(1180px,90%);margin:0 auto}
    .hero.lobby{align-content:center;justify-items:center;text-align:center;gap:26px;min-height:min(72vh,820px)}
    .hero.lobby .titleWrap{justify-items:center;text-align:center;max-width:min(1180px,82%);margin:0 auto}
    .hero.lead{align-content:center;justify-items:center;text-align:center;min-height:min(72vh,820px)}
    .hero.lead .titleWrap{justify-items:center;text-align:center;max-width:min(1220px,88%);margin:0 auto}
    .hero.compact{align-content:start}
    .hero.compact .titleWrap{max-width:none}
    .hero.compact .title{font-size:clamp(1.8rem,3vw,3.4rem)}
    .hero.compact .titleWrap{padding-right:120px}
    .hero.scores{align-content:start;justify-items:center;text-align:center}
    .hero.scores .titleWrap{justify-items:center;text-align:center;max-width:min(980px,92%);margin:0 auto}
    .titleWrap{display:grid;gap:12px}
    .title{margin:0;font-size:clamp(2.6rem,5vw,5.5rem);line-height:.94;font-weight:1000}
    .copy{margin:0;color:var(--muted);font-size:1.04rem;line-height:1.48}
    .timer{width:96px;height:96px;border-radius:999px;display:grid;place-items:center;background:conic-gradient(var(--gold) calc(var(--timer,1) * 1turn),rgba(255,255,255,.08) 0);padding:7px;position:absolute;top:0;right:0}
    .timerInner{width:100%;height:100%;border-radius:999px;background:#220432;display:grid;place-items:center;font-weight:1000;font-size:1.5rem}
    .answers{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-content:start}
    .answers.revealed{animation:answersIn .45s ease both}
    .answers.questionBoard{grid-auto-rows:minmax(108px,auto)}
    .countStage{display:grid;gap:16px;justify-items:center;text-align:center;align-content:center;min-height:min(48vh,520px);width:min(980px,100%);margin:0 auto;padding:34px 28px;border-radius:34px;border:1px solid rgba(255,255,255,.1);background:
      radial-gradient(circle at top,rgba(255,255,255,.06),transparent 48%),
      linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02))}
    .countStage.heroStage{min-height:min(62vh,680px);width:min(1080px,94%)}
    .countLabel{font-size:.78rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
    .countCategory{font-size:clamp(2rem,3.2vw,3.1rem);font-weight:1000;line-height:1.04}
    .countBig{font-size:clamp(6rem,13vw,9rem);font-weight:1000;line-height:1;color:#fff;text-shadow:0 10px 30px rgba(255,216,74,.16)}
    .countText{font-size:1rem;color:var(--muted);max-width:34ch}
    .answer{padding:16px 18px;display:grid;gap:10px;background:rgba(255,255,255,.02)}
    .answer.selected{border-color:rgba(56,220,255,.48);background:linear-gradient(135deg,rgba(56,220,255,.12),rgba(255,125,207,.08))}
    .answer.correct{border-color:rgba(144,235,124,.84);background:linear-gradient(135deg,rgba(144,235,124,.22),rgba(56,220,255,.08))}
    .answer.wrong{border-color:rgba(255,128,149,.86);background:linear-gradient(135deg,rgba(255,128,149,.18),rgba(255,125,207,.08))}
    .answerTop{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
    .aKey{margin-right:8px;color:var(--gold);font-weight:1000}
    .aText{font-size:clamp(1rem,1.34vw,1.45rem);font-weight:900;line-height:1.24}
    .aState{font-size:.94rem;font-weight:900;color:#fff;white-space:nowrap}
    .voteCloud{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
    .voteAvatar{width:34px;height:34px;border-radius:999px;overflow:hidden;display:grid;place-items:center;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12)}
    .voteAvatar img{width:100%;height:100%;object-fit:cover}
    .voteMore{padding:0 8px;height:30px;border-radius:999px;display:grid;place-items:center;background:rgba(255,255,255,.08);font-size:.8rem}
    .fact{padding:18px 20px;border-radius:24px;border:1px solid rgba(255,255,255,.1);background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,216,74,.08));display:grid;gap:8px}
    .fact p{margin:0;color:var(--muted);line-height:1.45}
    .roundBoard,.podiumBoard{display:grid;gap:12px;width:min(1280px,100%);margin:0 auto}
    .roundHeadline{display:grid;gap:10px;justify-items:center;text-align:center;padding:18px 22px;border-radius:28px;border:1px solid rgba(255,255,255,.1);background:linear-gradient(135deg,rgba(255,216,74,.16),rgba(255,125,207,.12))}
    .roundHeadline strong{font-size:clamp(1.6rem,3.1vw,2.9rem);line-height:1}
    .roundHeadline span{color:var(--muted);font-size:1rem}
    .roundGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .roundRow{padding:12px 14px;display:grid;grid-template-columns:34px 42px minmax(0,1fr) auto;gap:10px;align-items:center;background:var(--panel-soft)}
    .roundRow.leader{grid-column:1/-1;padding:14px 16px;background:linear-gradient(135deg,rgba(255,216,74,.16),rgba(255,125,207,.12))}
    .rank{width:34px;height:34px;border-radius:999px;display:grid;place-items:center;background:rgba(255,255,255,.06);font-size:.8rem;font-weight:1000;color:var(--gold)}
    .avatar{width:42px;height:42px;border-radius:999px;overflow:hidden;display:grid;place-items:center;background:rgba(255,255,255,.08)}
    .avatar img{width:100%;height:100%;object-fit:cover}
    .playerName{font-size:1rem;font-weight:1000;line-height:1.04}
    .playerSub{margin-top:3px;color:var(--muted);font-size:.8rem}
    .points{font-size:1.1rem;font-weight:1000;color:var(--gold)}
    .moreLine,.empty{color:var(--muted);text-align:center}
    .podium{display:grid;grid-template-columns:1fr 1.15fr 1fr;gap:16px;align-items:end}
    .podiumCard{padding:18px 16px;display:grid;gap:10px;justify-items:center;text-align:center;background:rgba(255,255,255,.04)}
    .podiumCard.first{min-height:300px;background:linear-gradient(180deg,rgba(255,216,74,.2),rgba(255,125,207,.12))}
    .podiumCard.second,.podiumCard.third{min-height:248px}
    .podiumRank{font-size:.78rem;font-weight:900;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
    .podiumAvatar{width:112px;height:112px;border-radius:999px;overflow:hidden;display:grid;place-items:center;background:rgba(255,255,255,.08)}
    .podiumAvatar img{width:100%;height:100%;object-fit:cover}
    .podiumName{font-size:1.5rem;font-weight:1000;line-height:1.04}
    .podiumMeta{font-size:.92rem;color:var(--muted)}
    .podiumPoints{font-size:2.1rem;font-weight:1000;color:var(--gold)}
    .restBoard{display:grid;gap:10px}
    .restTitle{font-size:.8rem;font-weight:900;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;text-align:center}
    .join{height:100dvh;display:grid;place-items:center;padding:16px}
    .joinCard{width:min(520px,100%);padding:28px;display:grid;gap:16px}
    .lobbyCast{display:flex;flex-wrap:wrap;justify-content:center;align-items:flex-start;gap:22px 18px;width:min(1240px,100%);margin:0 auto}
    .castPlayer{display:grid;gap:8px;justify-items:center;min-width:88px;animation:castIn .34s ease both}
    .castAvatar{width:86px;height:86px;border-radius:999px;overflow:hidden;display:grid;place-items:center;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);box-shadow:0 12px 30px rgba(0,0,0,.24)}
    .castAvatar img{width:100%;height:100%;object-fit:cover}
    .castName{font-size:.9rem;font-weight:1000;line-height:1.08;text-align:center;max-width:10ch;text-wrap:balance}
    .castRole{font-size:.68rem;color:var(--muted);font-weight:800;letter-spacing:.06em;text-transform:uppercase}
    input{width:100%;padding:15px 16px;border-radius:18px;border:1px solid var(--stroke);background:rgba(255,255,255,.06);color:#fff;font:inherit}
    button{padding:14px 18px;border:0;border-radius:999px;background:linear-gradient(135deg,var(--gold),var(--pink));font:inherit;font-weight:1000;color:#240433;cursor:pointer}
    .hidden{display:none!important}
    @keyframes answersIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
    @keyframes castIn{from{opacity:0;transform:translateY(12px) scale(.96)}to{opacity:1;transform:none}}
    body.vertical .top{grid-template-columns:1fr;justify-items:center;padding:10px 12px}
    body.vertical .brand{width:min(150px,44vw)}
    body.vertical .code{display:none}
    body.vertical .card{padding:14px;gap:12px;border-radius:22px}
    body.vertical .title{font-size:clamp(1.55rem,6.8vw,2.55rem)}
    body.vertical .copy{font-size:.92rem}
    body.vertical .timer{width:72px;height:72px;padding:5px;top:6px;right:6px}
    body.vertical .timerInner{font-size:1.08rem}
    body.vertical .hero.center{min-height:min(58vh,520px)}
    body.vertical .hero.lead{min-height:min(62vh,560px)}
    body.vertical .hero.compact .title{font-size:clamp(1.35rem,5vw,2rem)}
    body.vertical .hero.compact .titleWrap{padding-right:72px;gap:8px}
    body.vertical .answers{grid-template-columns:1fr;gap:8px}
    body.vertical .answers.questionBoard{grid-auto-rows:minmax(0,auto)}
    body.vertical .countStage{min-height:min(52vh,560px);padding:24px 18px;gap:12px}
    body.vertical .countStage.heroStage{min-height:min(58vh,620px);width:min(100%,96%)}
    body.vertical .countCategory{font-size:clamp(1.35rem,5.6vw,2rem)}
    body.vertical .countBig{font-size:clamp(4rem,18vw,6.4rem)}
    body.vertical .countText{font-size:.88rem}
    body.vertical .answer{padding:11px 12px}
    body.vertical .aText{font-size:.95rem}
    body.vertical .aState{font-size:.82rem}
    body.vertical .voteAvatar{width:28px;height:28px}
    body.vertical .voteMore{height:24px;font-size:.72rem}
    body.vertical.phase-lobby .top{display:none}
    body.vertical.phase-lobby .app{grid-template-rows:minmax(0,1fr)}
    body.vertical .hero.lobby{min-height:min(52vh,430px);gap:16px}
    body.vertical .hero.lobby .titleWrap{max-width:min(92%,30ch)}
    body.vertical .lobbyCast{gap:14px 12px}
    body.vertical .castPlayer{min-width:68px}
    body.vertical .castAvatar{width:60px;height:60px}
    body.vertical .castName{font-size:.7rem;max-width:8ch}
    body.vertical .castRole{font-size:.58rem}
    body.vertical .roundBoard,.body.vertical .podiumBoard{gap:10px}
    body.vertical .roundHeadline{padding:12px 14px;border-radius:22px}
    body.vertical .roundHeadline strong{font-size:1.3rem}
    body.vertical .roundHeadline span{font-size:.82rem}
    body.vertical .roundGrid{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
    body.vertical .roundRow{padding:8px 9px;grid-template-columns:22px 26px minmax(0,1fr) auto;gap:7px;border-radius:18px}
    body.vertical .roundRow.leader{padding:10px 12px}
    body.vertical .rank{width:22px;height:22px;font-size:.66rem}
    body.vertical .avatar{width:26px;height:26px}
    body.vertical .playerName{font-size:.8rem}
    body.vertical .playerSub{font-size:.62rem}
    body.vertical .points{font-size:.86rem}
    body.vertical .podium{grid-template-columns:1fr;gap:10px}
    body.vertical .podiumCard,.body.vertical .podiumCard.first,.body.vertical .podiumCard.second,.body.vertical .podiumCard.third{min-height:auto}
    body.vertical .podiumAvatar{width:62px;height:62px}
    body.vertical .podiumName{font-size:1rem}
    body.vertical .podiumPoints{font-size:1.28rem}
    @media (max-width:980px){
      .answers{grid-template-columns:1fr}
      .podium{grid-template-columns:1fr}
      .podiumCard,.podiumCard.first,.podiumCard.second,.podiumCard.third{min-height:auto}
    }
    @media (max-height:560px){
      body{padding:8px}
      .app{height:calc(100dvh - 16px);gap:8px}
      .top{padding:8px 12px;border-radius:22px}
      .brand{width:min(150px,22vw)}
      .card{padding:14px;gap:10px;border-radius:22px}
      .title{font-size:clamp(1.7rem,4vw,3.2rem)}
      .copy{font-size:.9rem;line-height:1.35}
      .timer{width:74px;height:74px;padding:5px}
      .timerInner{font-size:1.1rem}
      .countStage,.countStage.heroStage{min-height:min(46vh,320px);padding:18px 18px;gap:10px}
      .countCategory{font-size:clamp(1.2rem,2.2vw,2rem)}
      .countBig{font-size:clamp(3.4rem,8vw,5.4rem)}
      .countText{font-size:.86rem}
      .answer{padding:10px 12px;gap:6px}
      .aText{font-size:.92rem}
      .aState{font-size:.8rem}
    }
    @media (max-width:520px) and (max-height:700px){
      body.vertical .top{padding:8px 10px}
      body.vertical .brand{width:min(120px,34vw)}
      body.vertical .card{padding:10px;gap:8px}
      body.vertical .hero.lead{min-height:min(40vh,300px)}
      body.vertical .title{font-size:clamp(1.2rem,5.8vw,2rem)}
      body.vertical .copy{font-size:.78rem;line-height:1.28}
      body.vertical .timer{width:58px;height:58px;padding:4px;top:4px;right:4px}
      body.vertical .timerInner{font-size:.94rem}
      body.vertical .countStage,body.vertical .countStage.heroStage{min-height:min(36vh,240px);padding:16px 12px;gap:8px}
      body.vertical .countCategory{font-size:clamp(1rem,5.2vw,1.5rem)}
      body.vertical .countBig{font-size:clamp(2.9rem,15vw,4.7rem)}
      body.vertical .countText{font-size:.74rem}
      body.vertical .answers{gap:6px}
      body.vertical .answer{padding:8px 10px}
      body.vertical .aText{font-size:.82rem}
      body.vertical .aState{font-size:.72rem}
      body.vertical .voteAvatar{width:22px;height:22px}
      body.vertical .voteMore{height:20px;font-size:.66rem}
      body.vertical .lobbyCast{gap:10px 8px}
      body.vertical .castAvatar{width:50px;height:50px}
      body.vertical .castName{font-size:.62rem}
      body.vertical .hero.lobby{min-height:min(44vh,320px);gap:12px}
    }
    body.phase-question .card,body.phase-answer .card{grid-template-rows:auto auto minmax(0,1fr)}
    body.phase-question .hero.compact,body.phase-answer .hero.compact{gap:10px}
    body.phase-question .copy,body.phase-answer .copy{max-width:72ch}
    body.vertical.phase-question .top,body.vertical.phase-answer .top{padding:6px 10px}
    body.vertical.phase-question .brand,body.vertical.phase-answer .brand{width:min(96px,28vw)}
    body.vertical.phase-question .card,body.vertical.phase-answer .card{padding:9px;gap:7px}
    body.vertical.phase-question .hero.compact,body.vertical.phase-answer .hero.compact{gap:6px}
    body.vertical.phase-question .hero.compact .title,body.vertical.phase-answer .hero.compact .title{font-size:clamp(1.02rem,4.8vw,1.45rem);line-height:.98}
    body.vertical.phase-question .hero.compact .copy,body.vertical.phase-answer .hero.compact .copy{font-size:.68rem;line-height:1.2}
    body.vertical.phase-question .hero.compact .titleWrap,body.vertical.phase-answer .hero.compact .titleWrap{padding-right:58px;gap:6px}
    body.vertical.phase-question .kick,body.vertical.phase-answer .kick{padding:4px 8px;font-size:9px}
    body.vertical.phase-question .timer,body.vertical.phase-answer .timer{width:50px;height:50px;padding:4px;top:2px;right:2px}
    body.vertical.phase-question .timerInner,body.vertical.phase-answer .timerInner{font-size:.82rem}
    body.vertical.phase-question .answers.questionBoard,body.vertical.phase-answer .answers.questionBoard{gap:5px}
    body.vertical.phase-question .answer,body.vertical.phase-answer .answer{padding:7px 9px;gap:4px;border-radius:16px}
    body.vertical.phase-question .answerTop,body.vertical.phase-answer .answerTop{gap:8px}
    body.vertical.phase-question .aText,body.vertical.phase-answer .aText{font-size:.74rem;line-height:1.14}
    body.vertical.phase-question .aState,body.vertical.phase-answer .aState{font-size:.64rem}
    body.vertical.phase-question .voteCloud,body.vertical.phase-answer .voteCloud{gap:4px}
    body.vertical.phase-question .voteAvatar,body.vertical.phase-answer .voteAvatar{width:18px;height:18px}
    body.vertical.phase-question .voteMore,body.vertical.phase-answer .voteMore{height:18px;font-size:.58rem;padding:0 6px}
  </style>
</head>
<body>
  <main class="app hidden" id="app">
    <header class="top">
      <div></div>
      <div class="topCenter">
        <img class="brand" src="/shared/assets/brand/trivialodon.png" alt="Trivialodon">
      </div>
      <div class="code" id="roomCode">0000</div>
    </header>
    <section class="layout">
      <article class="card">
        <div class="hero center" id="hero">
          <div class="titleWrap">
            <span class="kick" id="category">Categoria</span>
            <h1 class="title" id="prompt">Esperando partida...</h1>
            <p class="copy" id="copy"></p>
          </div>
          <div class="timer hidden" id="timerRing" style="--timer:1">
            <div class="timerInner" id="timer"></div>
          </div>
        </div>
        <div class="fact hidden" id="fact">
          <span class="kick" id="factKick">Fun fact</span>
          <p id="factText"></p>
        </div>
        <div class="answers" id="answers"></div>
      </article>
    </section>
  </main>

  <section class="join" id="join">
    <article class="joinCard">
      <span class="kick">Live</span>
      <h2 style="margin:0;font-size:2rem">Introduce el codigo de sala</h2>
      <p style="margin:0;color:var(--muted)">Usa <code>?sala=1234</code> para abrirlo directo y <code>?layout=vertical</code> para formato TikTok.</p>
      <input id="codeInput" maxlength="4" inputmode="numeric" placeholder="1234">
      <button id="btnJoin" type="button">Conectar emision</button>
    </article>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://adpjitccwwvlydrtvvqk.supabase.co";
    const SUPABASE_KEY = "sb_publishable_D8CL0HI8vLfD5L3g5ZgUGg_HOM6Ixdk";
    const WAITING_AUDIO_SRC = "/trivialodon/assets/waiting.mp3";
    const ANSWERING_AUDIO_SRC = "/trivialodon/assets/answering.mp3";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {auth:{persistSession:false,autoRefreshToken:false}});
    const params = new URLSearchParams(location.search);
    const $ = id => document.getElementById(id);
    const ui = {
      app:$("app"), join:$("join"), roomCode:$("roomCode"), category:$("category"), prompt:$("prompt"), copy:$("copy"),
      timer:$("timer"), timerRing:$("timerRing"), fact:$("fact"), factKick:$("factKick"), factText:$("factText"),
      answers:$("answers"), codeInput:$("codeInput"), btnJoin:$("btnJoin"), hero:$("hero")
    };
    let channel = null;
    let game = {phase:"lobby",scores:{},questionSet:[]};
    let players = [];
    let lastAnswersVisible = false;
    const soundEnabled = params.get("sound") !== "off";
    const liveAudio = {
      unlocked:false,
      fadeTimers:new Map(),
      decks:{}
    };

    const esc = value => String(value || "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
    const normalize = value => String(value || "").replace(/\D/g,"").slice(0,4);
    const countSeconds = ts => Math.max(0, Math.ceil((Number(ts || 0) - Date.now()) / 1000));
    const nextQuestion = () => Array.isArray(game.questionSet) ? game.questionSet[game.questionIndex || 0] : null;
    const scoreRows = () => players
      .filter(player => player.ready)
      .map(player => ({...player, score:Number((game.scores || {})[player.playerId] || 0)}))
      .sort((a,b) => b.score - a.score || String(a.name || "").localeCompare(String(b.name || ""),"es"));
    const voteMap = question => {
      const map = {};
      Object.entries(question?.responses || {}).forEach(([playerId, response]) => {
        const idx = Number(response?.answerIndex);
        if(Number.isInteger(idx)){
          map[idx] ||= [];
          const player = players.find(item => item.playerId === playerId);
          map[idx].push(player || {name:"Jugador", avatarSrc:"", role:"guest"});
        }
      });
      return map;
    };
    const avatarBubble = player => player?.avatarSrc ? `<span class="voteAvatar"><img src="${player.avatarSrc}" alt="${esc(player.name || "Jugador")}"></span>` : `<span class="voteAvatar">🦖</span>`;
    const castBubble = player => player?.avatarSrc ? `<span class="castAvatar"><img src="${player.avatarSrc}" alt="${esc(player.name || "Jugador")}"></span>` : `<span class="castAvatar">🦖</span>`;
    function createLoopDeck(src, targetVolume){
      const tracks = [new Audio(src), new Audio(src)];
      tracks.forEach(track => { track.loop = false; track.preload = "auto"; track.volume = 0; });
      return {tracks, activeIndex:0, targetVolume, playing:false, transition:false, handoffSeconds:.45};
    }
    if(soundEnabled){
      liveAudio.decks.waiting = createLoopDeck(WAITING_AUDIO_SRC, .28);
      liveAudio.decks.answering = createLoopDeck(ANSWERING_AUDIO_SRC, .34);
    }
    function clearFade(track){
      const timer = liveAudio.fadeTimers.get(track);
      if(timer){ clearInterval(timer); liveAudio.fadeTimers.delete(track); }
    }
    function fadeTrack(track, to, duration = 420, pauseOnZero = false){
      if(!track) return;
      clearFade(track);
      const from = Number(track.volume || 0);
      const start = Date.now();
      const timer = setInterval(() => {
        const progress = Math.min(1, (Date.now() - start) / duration);
        track.volume = from + (to - from) * progress;
        if(progress >= 1){
          clearFade(track);
          track.volume = to;
          if(pauseOnZero && to <= 0.001){
            try{ track.pause(); track.currentTime = 0; } catch(_){}
          }
        }
      }, 40);
      liveAudio.fadeTimers.set(track, timer);
    }
    function activeTrack(deck){ return deck.tracks[deck.activeIndex]; }
    function standbyTrack(deck){ return deck.tracks[1 - deck.activeIndex]; }
    function ensureDeckPlaying(deck){
      if(!deck || deck.playing) return;
      const track = activeTrack(deck);
      try{ track.pause(); track.currentTime = 0; } catch(_){}
      track.volume = 0;
      const attempt = track.play();
      if(attempt && typeof attempt.catch === "function") attempt.catch(() => {});
      fadeTrack(track, deck.targetVolume, 520, false);
      deck.playing = true;
      deck.transition = false;
    }
    function stopDeck(deck, immediate = false){
      if(!deck) return;
      deck.playing = false;
      deck.transition = false;
      deck.tracks.forEach(track => {
        clearFade(track);
        if(immediate){
          try{ track.pause(); track.currentTime = 0; track.volume = 0; } catch(_){}
        } else {
          fadeTrack(track, 0, 320, true);
        }
      });
    }
    function maintainDeck(deck){
      if(!deck || !deck.playing || deck.transition || !liveAudio.unlocked) return;
      const current = activeTrack(deck);
      const next = standbyTrack(deck);
      if(!current.duration || current.currentTime < Math.max(0, current.duration - deck.handoffSeconds)) return;
      deck.transition = true;
      try{ next.pause(); next.currentTime = 0; } catch(_){}
      next.volume = 0;
      const attempt = next.play();
      if(attempt && typeof attempt.catch === "function") attempt.catch(() => {});
      fadeTrack(next, deck.targetVolume, 420, false);
      fadeTrack(current, 0, 420, true);
      setTimeout(() => {
        deck.activeIndex = 1 - deck.activeIndex;
        deck.transition = false;
      }, 440);
    }

    function primeAudio(){
      if(!soundEnabled || liveAudio.unlocked) return;
      liveAudio.unlocked = true;
      [...liveAudio.decks.waiting.tracks, ...liveAudio.decks.answering.tracks].forEach(track => {
        try{ track.load(); } catch(_){}
      });
      syncAudio();
    }
    function ensureAudioReady(){
      if(!soundEnabled) return;
      primeAudio();
      syncAudio();
    }
    function syncAudio(){
      if(!soundEnabled || !liveAudio.unlocked) return;
      const useAnswering = game.phase === "question" || game.phase === "answer";
      const target = useAnswering ? liveAudio.decks.answering : liveAudio.decks.waiting;
      const other = useAnswering ? liveAudio.decks.waiting : liveAudio.decks.answering;
      ensureDeckPlaying(target);
      stopDeck(other, false);
    }
    setInterval(() => {
      if(!soundEnabled) return;
      maintainDeck(liveAudio.decks.waiting);
      maintainDeck(liveAudio.decks.answering);
    }, 120);

    function setLayoutMode(){
      const forced = params.get("layout");
      const vertical = forced === "vertical" || (forced !== "horizontal" && window.matchMedia("(orientation: portrait)").matches);
      document.body.classList.toggle("vertical", vertical);
    }

    function setTimer(value, progress, visible){
      const timer = document.getElementById("timer");
      const timerRing = document.getElementById("timerRing");
      if(!timer || !timerRing) return;
      timer.textContent = value;
      timerRing.style.setProperty("--timer", progress);
      timerRing.classList.toggle("hidden", !visible);
    }

    function renderCountdown(){
      const next = nextQuestion();
      const left = countSeconds(game.countdownEndAt || Date.now());
      ui.hero.className = "hero center";
      ui.category.textContent = "";
      ui.prompt.textContent = "";
      ui.copy.textContent = "";
      setTimer(String(Math.max(1, left)), Math.max(0, Math.min(1, left / Math.max(1, Number(game.countdownSeconds || 4)))), true);
      ui.fact.classList.add("hidden");
      ui.answers.className = "answers";
      ui.answers.innerHTML = "";
      ui.hero.innerHTML = `<div class="timer" id="timerRing" style="--timer:${Math.max(0, Math.min(1, left / Math.max(1, Number(game.countdownSeconds || 4))))}">
            <div class="timerInner" id="timer">${Math.max(1, left)}</div>
          </div>
          <div class="countStage heroStage">
        <div class="countLabel">${next?.type === "speed" ? "Test de velocidad" : "Siguiente ronda"}</div>
        <div class="countCategory">${esc(next?.category || "Categoria sorpresa")}</div>
        <div class="countBig">${Math.max(1, left)}</div>
        <div class="countText">${next?.type === "speed" ? "Se viene una ronda donde cada respuesta puntua distinto." : "Respira. Enseguida entra la siguiente pregunta."}</div>
      </div>`;
    }

    function renderPaused(){
      ui.hero.className = "hero center";
      ui.hero.innerHTML = `<div class="titleWrap">
            <span class="kick" id="category">Sesion</span>
            <h1 class="title" id="prompt">Juego pausado</h1>
            <p class="copy" id="copy">La partida se reanudara en cuanto el anfitrion vuelva a ponerla en marcha.</p>
          </div>
          <div class="timer hidden" id="timerRing" style="--timer:1">
            <div class="timerInner" id="timer"></div>
          </div>`;
      setTimer("", 0, false);
      ui.fact.classList.add("hidden");
      ui.answers.className = "answers";
      ui.answers.innerHTML = "";
    }

    function renderQuestion(){
      const question = game.question || {};
      const isSpeed = question.type === "speed";
      const answersVisible = !question.answersVisibleAt || Date.now() >= question.answersVisibleAt;
      const justRevealed = answersVisible && !lastAnswersVisible;
      lastAnswersVisible = answersVisible;
      const leadLeft = countSeconds(question.answersVisibleAt || Date.now());
      const answerLeft = countSeconds(question.endAt || Date.now());
      const total = answersVisible ? Math.max(1, Number(game.answerSeconds || 15)) : Math.max(1, Number(game.questionLeadSeconds || 6));
      const left = answersVisible ? answerLeft : leadLeft;
      ui.category.textContent = isSpeed ? `Test de velocidad · ${question.category || "Categoria sorpresa"}` : (question.category || "Cultura general");
      ui.prompt.textContent = question.prompt || "Esperando pregunta...";
      ui.copy.textContent = !answersVisible ? "Lee la pregunta. Las opciones aparecen enseguida." : (isSpeed ? "Las respuestas se bloquean en directo y puntuan distinto." : "Se ve en vivo que opcion esta marcando cada jugador.");
      setTimer(String(left), Math.max(0, Math.min(1, left / total)), true);
      ui.hero.className = `hero ${answersVisible ? "compact" : "lead"}${justRevealed ? " revealed" : ""}`;
      ui.hero.innerHTML = `<div class="titleWrap">
            <span class="kick" id="category">${esc(isSpeed ? `Test de velocidad · ${question.category || "Categoria sorpresa"}` : (question.category || "Cultura general"))}</span>
            <h1 class="title" id="prompt">${esc(question.prompt || "Esperando pregunta...")}</h1>
            <p class="copy" id="copy">${esc(!answersVisible ? "Lee la pregunta. Las opciones aparecen enseguida." : (isSpeed ? "Las respuestas se bloquean en directo y puntuan distinto." : "Se ve en vivo que opcion esta marcando cada jugador."))}</p>
          </div>
          <div class="timer${left || left === 0 ? "" : " hidden"}" id="timerRing" style="--timer:${Math.max(0, Math.min(1, left / total))}">
            <div class="timerInner" id="timer">${esc(String(left))}</div>
          </div>`;
      if(!answersVisible){
        ui.fact.classList.add("hidden");
        ui.answers.className = "answers";
        ui.answers.innerHTML = "";
        return;
      }
      const votes = voteMap(question);
      const cards = (question.choices || []).map((choice, index) => {
        const voters = votes[index] || [];
        const locked = isSpeed && voters.length > 0;
        const revealCorrect = !isSpeed && question.revealed && question.correct === index;
        const revealWrong = isSpeed && question.revealed && Number(question.scores?.[index] || 0) === 0;
        const stateLine = isSpeed
          ? (question.revealed ? `${Number(question.scores?.[index] || 0)} pts` : (locked ? "Cogida" : "Libre"))
          : (question.revealed ? (revealCorrect ? "Correcta" : `${voters.length} voto${voters.length === 1 ? "" : "s"}`) : `${voters.length} voto${voters.length === 1 ? "" : "s"}`);
        const visibleVoters = voters.slice(0, 6).map(player => avatarBubble(player)).join("");
        const overflow = voters.length > 6 ? `<span class="voteMore">+${voters.length - 6}</span>` : "";
        return `<article class="answer ${locked ? "selected" : ""} ${revealCorrect ? "correct" : ""} ${revealWrong ? "wrong" : ""}">
          <div class="answerTop">
            <div class="aText"><span class="aKey">${String.fromCharCode(65 + index)}</span>${esc(choice)}</div>
            <div class="aState">${esc(stateLine)}</div>
          </div>
          <div class="voteCloud">${visibleVoters}${overflow}</div>
        </article>`;
      }).join("");
      ui.answers.className = `answers questionBoard${justRevealed ? " revealed" : ""}`;
      ui.answers.innerHTML = cards || `<div class="empty" style="grid-column:1/-1">La pregunta aparecera aqui.</div>`;
      if(question.revealed && isSpeed && Array.isArray(question.ranking) && question.ranking.length){
        ui.fact.classList.remove("hidden");
        ui.factKick.textContent = "Orden correcto";
        ui.factText.textContent = question.ranking.map(item => `${item.rank}. ${item.text} (${item.score} pts)`).join(" · ");
      } else if(question.revealed && question.explanation){
        ui.fact.classList.remove("hidden");
        ui.factKick.textContent = "Fun fact";
        ui.factText.textContent = question.explanation;
      } else {
        ui.fact.classList.add("hidden");
      }
    }

    function renderScoresPhase(){
      ui.hero.className = "hero scores";
      lastAnswersVisible = false;
      ui.category.textContent = "Marcador";
      ui.prompt.textContent = game.finished ? "Podio final" : "Puntuacion del round";
      ui.copy.textContent = "";
      setTimer("", 0, false);
      ui.hero.innerHTML = `<div class="titleWrap">
            <span class="kick" id="category">Marcador</span>
            <h1 class="title" id="prompt">${esc(game.finished ? "Podio final" : "Puntuacion del round")}</h1>
            <p class="copy" id="copy"></p>
          </div>`;
      ui.fact.classList.add("hidden");
      const rows = scoreRows();
      if(!rows.length){
        ui.answers.className = "answers";
        ui.answers.innerHTML = `<div class="empty" style="grid-column:1/-1">El marcador aparecera aqui.</div>`;
        return;
      }
      const isVertical = document.body.classList.contains("vertical");
      if(game.finished){
        const podium = [rows[1], rows[0], rows[2]];
        const podiumClasses = ["second","first","third"];
        const podiumRanks = ["2º","1º","3º"];
        const remainder = rows.slice(3, isVertical ? 7 : 9);
        ui.answers.className = "answers";
        ui.answers.innerHTML = `<div class="podiumBoard" style="grid-column:1/-1">
          <div class="podium">
            ${podium.map((player, index) => player ? `<article class="podiumCard ${podiumClasses[index]}"><div class="podiumRank">${podiumRanks[index]}</div><div class="podiumAvatar">${player.avatarSrc ? `<img src="${player.avatarSrc}" alt="">` : "🦖"}</div><div class="podiumName">${esc(player.name || "Jugador")}</div><div class="podiumMeta">${esc(player.role === "host" ? "Anfitrion" : "Invitado")}</div><div class="podiumPoints">${player.score}</div></article>` : `<article class="podiumCard ${podiumClasses[index]}"><div class="podiumRank">${podiumRanks[index]}</div><div class="podiumAvatar">🦖</div><div class="podiumName">---</div><div class="podiumMeta">Sin jugador</div><div class="podiumPoints">0</div></article>`).join("")}
          </div>
          ${remainder.length ? `<div class="restBoard"><div class="restTitle">Resto de jugadores</div>${remainder.map((player, index) => `<article class="roundRow"><div class="rank">#${index + 4}</div><div class="avatar">${player.avatarSrc ? `<img src="${player.avatarSrc}" alt="">` : "🦖"}</div><div><div class="playerName">${esc(player.name || "Jugador")}</div><div class="playerSub">${esc(player.role === "host" ? "Anfitrion" : "Invitado")}</div></div><div class="points">${player.score}</div></article>`).join("")}${rows.length > (isVertical ? 7 : 9) ? `<div class="moreLine">+${rows.length - (isVertical ? 7 : 9)} jugadores mas</div>` : ""}</div>` : ""}</div>`;
        return;
      }
      const visibleCount = 10;
      const visible = rows.slice(0, visibleCount);
      const leader = visible[0];
      const rest = visible.slice(1);
      ui.answers.className = "answers";
      ui.answers.innerHTML = `<div class="roundBoard" style="grid-column:1/-1">
        <article class="roundHeadline">
          <strong>${esc(leader.name || "Jugador")} manda por ahora</strong>
          <span>${leader.score} puntos acumulados${rest.length ? " · El resto aprieta para la siguiente." : ""}</span>
        </article>
        <div class="roundGrid">
          <article class="roundRow leader">
            <div class="rank">#1</div>
            <div class="avatar">${leader.avatarSrc ? `<img src="${leader.avatarSrc}" alt="">` : "🦖"}</div>
            <div><div class="playerName">${esc(leader.name || "Jugador")}</div><div class="playerSub">${esc(leader.role === "host" ? "Anfitrion" : "Invitado")}</div></div>
            <div class="points">${leader.score}</div>
          </article>
          ${rest.map((player, index) => `<article class="roundRow"><div class="rank">#${index + 2}</div><div class="avatar">${player.avatarSrc ? `<img src="${player.avatarSrc}" alt="">` : "🦖"}</div><div><div class="playerName">${esc(player.name || "Jugador")}</div><div class="playerSub">${esc(player.role === "host" ? "Anfitrion" : "Invitado")}</div></div><div class="points">${player.score}</div></article>`).join("")}
        </div>
        ${rows.length > visibleCount ? `<div class="moreLine">+${rows.length - visibleCount} jugadores mas</div>` : ""}
      </div>`;
    }

    function renderLobby(){
      ui.hero.className = "hero lobby";
      lastAnswersVisible = false;
      const visible = players.slice(0, document.body.classList.contains("vertical") ? 8 : 12);
      const overflow = Math.max(0, players.length - visible.length);
      ui.category.textContent = "";
      ui.prompt.textContent = "Esperando que la partida arranque";
      ui.copy.textContent = "";
      setTimer("", 0, false);
      ui.hero.innerHTML = `<div class="titleWrap">
            <h1 class="title" id="prompt">Esperando que la partida arranque</h1>
            <p class="copy" id="copy"></p>
          </div>
          ${visible.length ? `<div class="lobbyCast">
            ${visible.map(player => `<div class="castPlayer">${castBubble(player)}<div class="castName">${esc(player.name || "Jugador")}</div><div class="castRole">${esc(player.role === "host" ? "Anfitrion" : "Invitado")}</div></div>`).join("")}
            ${overflow ? `<div class="castPlayer"><div class="castAvatar">+${overflow}</div><div class="castName">Mas</div><div class="castRole">jugadores</div></div>` : ""}
          </div>` : ""}`;
      ui.fact.classList.add("hidden");
      ui.answers.className = "answers";
      ui.answers.innerHTML = "";
    }

    function render(){
      document.body.classList.toggle("phase-lobby", game.phase === "lobby");
      document.body.classList.toggle("phase-question", game.phase === "question");
      document.body.classList.toggle("phase-answer", game.phase === "answer");
      document.body.classList.toggle("phase-scores", game.phase === "scores");
      ui.app.classList.toggle("hidden", !channel);
      ui.join.classList.toggle("hidden", !!channel);
      ui.roomCode.textContent = channel ? channel.topic.split(":").pop() : "0000";
      if(game.phase === "paused") renderPaused();
      else if(game.phase === "countdown") renderCountdown();
      else if(game.phase === "question" || game.phase === "answer") renderQuestion();
      else if(game.phase === "scores") renderScoresPhase();
      else renderLobby();
      syncAudio();
    }

    function syncPlayers(){
      if(!channel) return;
      const raw = [];
      Object.values(channel.presenceState()).forEach(entries => (entries || []).forEach(entry => raw.push(entry)));
      const map = new Map();
      raw.forEach(entry => {
        const prev = map.get(entry.playerId);
        if(!prev || entry.updatedAt > prev.updatedAt) map.set(entry.playerId, entry);
      });
      players = [...map.values()];
      render();
    }

    async function join(code){
      if(channel){ try{ await sb.removeChannel(channel); } catch(_){} }
      channel = sb.channel(`trivialodon:session:${code}`, {config:{broadcast:{self:true},presence:{key:`live-${code}`}}});
      channel
        .on("presence",{event:"sync"},syncPlayers)
        .on("broadcast",{event:"game_state"},({payload}) => { if(payload){ game = payload; render(); } })
        .subscribe(async status => {
          if(status === "SUBSCRIBED"){
            render();
            await channel.send({type:"broadcast",event:"request_state",payload:{viewer:"live",requestedAt:Date.now()}});
          }
        });
    }

    ui.btnJoin.onclick = () => {
      ensureAudioReady();
      const code = normalize(ui.codeInput.value);
      if(code.length === 4) join(code);
    };
    ui.codeInput.addEventListener("keydown", ev => {
      if(ev.key === "Enter"){
        ev.preventDefault();
        ui.btnJoin.click();
      }
    });
    ["click","touchstart","keydown"].forEach(eventName => window.addEventListener(eventName, primeAudio, {once:true, passive:eventName !== "keydown"}));
    window.addEventListener("resize", setLayoutMode);
    setLayoutMode();
    setInterval(() => { if(channel) render(); }, 250);
    const auto = normalize(params.get("sala"));
    if(auto.length === 4) join(auto);
  </script>
</body>
</html>
