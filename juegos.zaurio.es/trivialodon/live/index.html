<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Trivialodon Live</title>
  <style>
    :root{
      --bg:radial-gradient(circle at top,#31044c 0%,#180225 44%,#07000b 100%);
      --panel:rgba(44,7,70,.92);
      --panel-soft:rgba(255,255,255,.04);
      --stroke:rgba(255,255,255,.12);
      --text:#fff;
      --muted:rgba(255,255,255,.72);
      --cyan:#38dcff;
      --gold:#ffd84a;
      --pink:#ff7dcf;
      --green:#90eb7c;
      --red:#ff8095;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:Arial,system-ui,sans-serif}
    body{padding:14px}
    body.cast{padding:8px}
    .app{height:calc(100dvh - 28px);display:grid;grid-template-rows:auto minmax(0,1fr);gap:14px}
    body.cast .app{height:calc(100dvh - 16px);gap:8px}
    .top,.card,.answer,.roundRow,.podiumCard,.joinCard{border:1px solid var(--stroke);background:var(--panel);border-radius:28px;box-shadow:0 20px 60px rgba(0,0,0,.28)}
    .top{display:grid;grid-template-columns:auto minmax(0,1fr) auto;align-items:center;padding:14px 18px;gap:12px}
    body.cast .top{padding:8px 14px;border-radius:22px;min-height:92px}
    .top.brand-center{grid-template-columns:1fr auto 1fr}
    .top.brand-center .topBrand{grid-column:2;justify-self:center}
    .top.brand-center .topCenter{display:none}
    .top.brand-center .code{grid-column:3;justify-self:end}
    .top.with-prompt{grid-template-columns:auto minmax(0,1fr) auto}
    .top.with-prompt .topBrand{grid-column:1;justify-self:start}
    .top.with-prompt .topCenter{display:grid}
    .top.with-prompt .code{grid-column:3;justify-self:end}
    .brand{width:min(220px,22vw);display:block}
    body.cast .brand{width:min(136px,12vw)}
    .topBrand{display:flex;align-items:center;min-width:0}
    .topCenter{display:grid;min-width:0;justify-items:center;align-items:center}
    .code{padding:10px 16px;border-radius:999px;background:rgba(255,216,74,.12);color:var(--gold);font-weight:1000;letter-spacing:.08em}
    .navPrompt{display:grid;gap:3px;justify-items:center;align-items:center;max-width:100%;text-align:center;padding:0 10px}
    .navPromptKick{display:inline-flex;padding:4px 9px;border-radius:999px;background:rgba(56,220,255,.12);color:var(--cyan);font-size:10px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}
    .navPromptText{font-weight:1000;line-height:.92;text-wrap:balance;max-width:min(100%,860px)}
    .navPrompt.size-xl .navPromptText{font-size:clamp(1.7rem,2.7vw,2.5rem)}
    .navPrompt.size-lg .navPromptText{font-size:clamp(1.38rem,2.2vw,2rem)}
    .navPrompt.size-md .navPromptText{font-size:clamp(1.08rem,1.8vw,1.56rem)}
    .navPrompt.size-sm .navPromptText{font-size:clamp(.92rem,1.45vw,1.2rem)}
    .layout{display:grid;grid-template-columns:1fr;min-height:0}
    .card{padding:22px;display:grid;gap:16px;min-height:0}
    body.cast .card{padding:12px;gap:10px;border-radius:22px}
    .kick{display:inline-flex;padding:6px 12px;border-radius:999px;background:rgba(56,220,255,.14);color:var(--cyan);font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}
    .hero{display:grid;gap:18px;position:relative;min-height:0}
    .hero.center{align-content:center;justify-items:center;text-align:center;min-height:min(70vh,780px)}
    .hero.center .titleWrap{justify-items:center;text-align:center;max-width:min(1180px,90%);margin:0 auto}
    .hero.lobby{align-content:center;justify-items:center;text-align:center;gap:26px;min-height:min(72vh,820px)}
    .hero.lobby .titleWrap{justify-items:center;text-align:center;max-width:min(1180px,82%);margin:0 auto}
    .hero.lead{align-content:center;justify-items:center;text-align:center;min-height:min(72vh,820px)}
    .hero.lead .titleWrap{justify-items:center;text-align:center;max-width:min(1220px,88%);margin:0 auto}
    .hero.compact{align-content:start}
    .hero.compact .titleWrap{max-width:none}
    .hero.compact .title{font-size:clamp(1.8rem,3vw,3.4rem)}
    .hero.compact .titleWrap{padding-right:120px}
    .hero.headerPrompt{min-height:54px;gap:0}
    .hero.headerPrompt .titleWrap{display:none}
    body.cast .hero.compact{gap:3px}
    body.cast .hero.compact .title{font-size:clamp(.92rem,1.2vw,1.18rem);line-height:1}
    body.cast .hero.compact .copy{display:none}
    body.cast .hero.compact .titleWrap{padding-right:58px;gap:3px}
    body.cast .hero.headerPrompt{min-height:42px}
    body.cast .hero.lead{min-height:min(42vh,340px)}
    body.cast .hero.lead .title{font-size:clamp(1.8rem,3vw,3rem)}
    body.cast .hero.lead .copy{font-size:.82rem}
    body.cast .hero.lobby{min-height:min(48vh,360px);gap:18px}
    body.cast .hero.lobby .title{font-size:clamp(2rem,3.4vw,3.4rem)}
    body.cast .hero.lobby .titleWrap{max-width:min(1100px,82%)}
    body.cast .navPrompt{justify-items:start;text-align:left;padding:0}
    body.cast .navPromptKick{justify-self:start}
    body.cast .navPrompt.size-xl .navPromptText{font-size:clamp(1.25rem,1.8vw,1.65rem)}
    body.cast .navPrompt.size-lg .navPromptText{font-size:clamp(1.02rem,1.45vw,1.34rem)}
    body.cast .navPrompt.size-md .navPromptText{font-size:clamp(.84rem,1.14vw,1.06rem)}
    body.cast .navPrompt.size-sm .navPromptText{font-size:clamp(.72rem,.98vw,.9rem)}
    .hero.scores{align-content:start;justify-items:center;text-align:center}
    .hero.scores .titleWrap{justify-items:center;text-align:center;max-width:min(980px,92%);margin:0 auto}
    .hero.scores.tvStage{align-content:center;gap:26px}
    .scoreStage{display:grid;gap:18px;width:min(1180px,100%);margin:0 auto}
    .scoreLead{padding:20px 24px;border-radius:28px;border:1px solid rgba(255,255,255,.1);background:linear-gradient(135deg,rgba(255,216,74,.16),rgba(255,125,207,.12));display:grid;gap:8px;justify-items:center;text-align:center}
    .scoreLead strong{font-size:clamp(2rem,3.6vw,3.2rem);line-height:1}
    .scoreLead span{font-size:1.02rem;color:var(--muted)}
    .scoreGridTv{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .tvScoreWrap{display:grid;gap:20px;width:min(1520px,100%);margin:0 auto;align-content:start}
    .tvScoreHero{display:grid;grid-template-columns:minmax(0,1.2fr) minmax(380px,.8fr);gap:18px;align-items:stretch}
    .tvLeaderHero{padding:28px 32px;border-radius:32px;border:1px solid rgba(255,255,255,.12);background:linear-gradient(135deg,rgba(255,216,74,.2),rgba(255,125,207,.14));display:grid;gap:12px;align-content:center;min-height:230px}
    .tvLeaderHero .kick{justify-self:start}
    .tvLeaderHero h2{margin:0;font-size:clamp(2.6rem,4.3vw,4.8rem);line-height:.9}
    .tvLeaderHero p{margin:0;font-size:1.06rem;color:var(--muted);line-height:1.4}
    .tvLeaderBadge{padding:22px 24px;border-radius:30px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);display:grid;grid-template-columns:auto minmax(0,1fr) auto;gap:16px;align-items:center}
    .tvLeaderBadge .avatar{width:74px;height:74px}
    .tvLeaderBadge .playerName{font-size:1.5rem}
    .tvLeaderBadge .playerSub{font-size:.9rem}
    .tvLeaderBadge .points{font-size:2.4rem}
    .tvRankGrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
    .tvRankCard{padding:16px 18px;border-radius:24px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);display:grid;grid-template-columns:32px 44px minmax(0,1fr) auto;gap:12px;align-items:center}
    .tvRankCard .rank{width:32px;height:32px}
    .tvRankCard .avatar{width:44px;height:44px}
    .tvRankCard .playerName{font-size:1.06rem}
    .tvRankCard .points{font-size:1.22rem}
    .tvPodiumStage{display:grid;gap:22px;width:min(1580px,100%);margin:0 auto}
    .tvPodiumHero{display:grid;gap:10px;justify-items:center;text-align:center}
    .tvPodiumHero .kick{justify-self:center}
    .tvPodiumHero h2{margin:0;font-size:clamp(3rem,5vw,5.5rem);line-height:.9}
    .tvPodiumHero p{margin:0;color:var(--muted);font-size:1.04rem}
    .tvPodium{display:grid;gap:20px;align-items:end;min-height:450px}
    .tvPodium.trio{grid-template-columns:1fr 1.18fr 1fr}
    .tvPodium.duo{grid-template-columns:1fr 1.18fr}
    .tvPodium.solo{grid-template-columns:minmax(360px,560px);justify-content:center}
    .tvPodiumCard{padding:22px 20px;border-radius:34px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);display:grid;justify-items:center;text-align:center;gap:12px;position:relative;overflow:hidden}
    .tvPodiumCard.first{min-height:390px;background:linear-gradient(180deg,rgba(255,216,74,.26),rgba(255,125,207,.16))}
    .tvPodiumCard.second{min-height:310px;background:linear-gradient(180deg,rgba(196,214,255,.16),rgba(255,255,255,.06))}
    .tvPodiumCard.third{min-height:270px;background:linear-gradient(180deg,rgba(255,180,120,.18),rgba(255,255,255,.05))}
    .tvPodiumCard::after{content:"";position:absolute;inset:auto 0 0 0;height:34%;background:linear-gradient(180deg,transparent,rgba(0,0,0,.16))}
    .tvPodiumRank{position:relative;z-index:1;font-size:.92rem;font-weight:1000;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
    .tvPodiumAvatar{position:relative;z-index:1;width:126px;height:126px;border-radius:999px;overflow:hidden;display:grid;place-items:center;background:rgba(255,255,255,.08);box-shadow:0 18px 34px rgba(0,0,0,.22)}
    .tvPodiumAvatar img{width:100%;height:100%;object-fit:cover}
    .tvPodiumName{position:relative;z-index:1;font-size:clamp(1.4rem,2.2vw,2.15rem);font-weight:1000;line-height:1}
    .tvPodiumMeta{position:relative;z-index:1;font-size:.94rem;color:var(--muted)}
    .tvPodiumPoints{position:relative;z-index:1;font-size:clamp(2rem,3vw,3rem);font-weight:1000;color:var(--gold)}
    .tvRestGrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
    .tvRestCard{padding:14px 16px;border-radius:22px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);display:grid;grid-template-columns:28px 38px minmax(0,1fr) auto;gap:10px;align-items:center}
    .tvRestCard .rank{width:28px;height:28px;font-size:.72rem}
    .tvRestCard .avatar{width:38px;height:38px}
    .tvRestCard .playerName{font-size:.96rem}
    .tvRestCard .playerSub{font-size:.72rem}
    .tvRestCard .points{font-size:1rem}
    .titleWrap{display:grid;gap:12px}
    .title{margin:0;font-size:clamp(2.6rem,5vw,5.5rem);line-height:.94;font-weight:1000}
    .copy{margin:0;color:var(--muted);font-size:1.04rem;line-height:1.48}
    .timer{width:96px;height:96px;border-radius:999px;display:grid;place-items:center;background:conic-gradient(var(--gold) calc(var(--timer,1) * 1turn),rgba(255,255,255,.08) 0);padding:7px;position:absolute;top:0;right:0}
    .timerInner{width:100%;height:100%;border-radius:999px;background:#220432;display:grid;place-items:center;font-weight:1000;font-size:1.5rem}
    body.cast .timer{width:50px;height:50px;padding:4px;top:0;right:0}
    body.cast .timerInner{font-size:.82rem}
    .answers{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-content:start}
    .answers.revealed{animation:answersIn .45s ease both}
    .answers.questionBoard{grid-auto-rows:minmax(108px,auto)}
    body.cast .answers{gap:4px}
    body.cast .answers.questionBoard{grid-template-columns:1fr 1fr !important;grid-auto-rows:minmax(40px,auto)}
    body.cast .answers:not(.questionBoard){grid-auto-rows:minmax(0,auto)}
    .countStage{display:grid;gap:16px;justify-items:center;text-align:center;align-content:center;min-height:min(48vh,520px);width:min(980px,100%);margin:0 auto;padding:34px 28px;border-radius:34px;border:1px solid rgba(255,255,255,.1);background:
      radial-gradient(circle at top,rgba(255,255,255,.06),transparent 48%),
      linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02))}
    .countStage.heroStage{min-height:min(62vh,680px);width:min(1080px,94%)}
    .categorySplash{width:min(190px,26vw);max-width:100%;display:block;justify-self:center;filter:drop-shadow(0 12px 26px rgba(0,0,0,.26))}
    .countLabel{font-size:.78rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
    .countCategory{font-size:clamp(2rem,3.2vw,3.1rem);font-weight:1000;line-height:1.04}
    .countBig{font-size:clamp(6rem,13vw,9rem);font-weight:1000;line-height:1;color:#fff;text-shadow:0 10px 30px rgba(255,216,74,.16)}
    .countText{font-size:1rem;color:var(--muted);max-width:34ch}
    .answer{padding:16px 18px;display:grid;gap:10px;background:rgba(255,255,255,.02)}
    body.cast .answer{padding:6px 8px;gap:2px;border-radius:14px}
    .answer.selected{border-color:rgba(56,220,255,.48);background:linear-gradient(135deg,rgba(56,220,255,.12),rgba(255,125,207,.08))}
    .answer.correct{border-color:rgba(144,235,124,.84);background:linear-gradient(135deg,rgba(144,235,124,.22),rgba(56,220,255,.08))}
    .answer.wrong{border-color:rgba(255,128,149,.86);background:linear-gradient(135deg,rgba(255,128,149,.18),rgba(255,125,207,.08))}
    .answerTop{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
    .aKey{margin-right:8px;color:var(--gold);font-weight:1000}
    .aText{font-size:clamp(1rem,1.34vw,1.45rem);font-weight:900;line-height:1.24}
    .aState{font-size:.94rem;font-weight:900;color:#fff;white-space:nowrap}
    body.cast .aText{font-size:clamp(.62rem,.62vw,.72rem);line-height:1.02}
    body.cast .aState{font-size:.54rem}
    .voteCloud{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
    .voteAvatar{width:34px;height:34px;border-radius:999px;overflow:hidden;display:grid;place-items:center;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12)}
    .voteAvatar img{width:100%;height:100%;object-fit:cover}
    .voteMore{padding:0 8px;height:30px;border-radius:999px;display:grid;place-items:center;background:rgba(255,255,255,.08);font-size:.8rem}
    body.cast .voteCloud{gap:2px}
    body.cast .voteAvatar{width:12px;height:12px}
    body.cast .voteMore{height:12px;font-size:.46rem;padding:0 3px}
    body.cast.phase-question .card,body.cast.phase-answer .card{padding:10px;gap:6px;grid-template-rows:auto minmax(0,1fr)}
    body.cast.phase-question .hero.compact,body.cast.phase-answer .hero.compact{gap:3px}
    body.cast.phase-question .hero.compact .titleWrap,body.cast.phase-answer .hero.compact .titleWrap{padding-right:60px;gap:3px}
    body.cast.phase-question .kick,body.cast.phase-answer .kick{padding:4px 8px;font-size:9px}
    body.cast.phase-question .answer,body.cast.phase-answer .answer{min-height:0}
    body.cast.phase-question .answerTop,body.cast.phase-answer .answerTop{gap:8px;align-items:center}
    body.cast .lobbyCast{gap:14px 12px;max-width:min(1240px,90%);margin:0 auto}
    body.cast .castAvatar{width:74px;height:74px}
    body.cast .castName{font-size:.82rem}
    body.cast .castRole{font-size:.62rem}
    .fact{padding:18px 20px;border-radius:24px;border:1px solid rgba(255,255,255,.1);background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,216,74,.08));display:grid;gap:8px}
    .fact p{margin:0;color:var(--muted);line-height:1.45}
    .roundBoard,.podiumBoard{display:grid;gap:12px;width:min(1280px,100%);margin:0 auto}
    .roundHeadline{display:grid;gap:10px;justify-items:center;text-align:center;padding:18px 22px;border-radius:28px;border:1px solid rgba(255,255,255,.1);background:linear-gradient(135deg,rgba(255,216,74,.16),rgba(255,125,207,.12))}
    .roundHeadline strong{font-size:clamp(1.6rem,3.1vw,2.9rem);line-height:1}
    .roundHeadline span{color:var(--muted);font-size:1rem}
    .roundGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .roundRow{padding:12px 14px;display:grid;grid-template-columns:34px 42px minmax(0,1fr) auto;gap:10px;align-items:center;background:var(--panel-soft)}
    .roundRow.leader{grid-column:1/-1;padding:14px 16px;background:linear-gradient(135deg,rgba(255,216,74,.16),rgba(255,125,207,.12))}
    .rank{width:34px;height:34px;border-radius:999px;display:grid;place-items:center;background:rgba(255,255,255,.06);font-size:.8rem;font-weight:1000;color:var(--gold)}
    .avatar{width:42px;height:42px;border-radius:999px;overflow:hidden;display:grid;place-items:center;background:rgba(255,255,255,.08)}
    .avatar img{width:100%;height:100%;object-fit:cover}
    .playerName{font-size:1rem;font-weight:1000;line-height:1.04}
    .playerSub{margin-top:3px;color:var(--muted);font-size:.8rem}
    .points{font-size:1.1rem;font-weight:1000;color:var(--gold)}
    .moreLine,.empty{color:var(--muted);text-align:center}
    .podium{display:grid;grid-template-columns:1fr 1.15fr 1fr;gap:16px;align-items:end}
    .podiumCard{padding:18px 16px;display:grid;gap:10px;justify-items:center;text-align:center;background:rgba(255,255,255,.04)}
    .podiumCard.first{min-height:300px;background:linear-gradient(180deg,rgba(255,216,74,.2),rgba(255,125,207,.12))}
    .podiumCard.second,.podiumCard.third{min-height:248px}
    .podiumRank{font-size:.78rem;font-weight:900;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
    .podiumAvatar{width:112px;height:112px;border-radius:999px;overflow:hidden;display:grid;place-items:center;background:rgba(255,255,255,.08)}
    .podiumAvatar img{width:100%;height:100%;object-fit:cover}
    .podiumName{font-size:1.5rem;font-weight:1000;line-height:1.04}
    .podiumMeta{font-size:.92rem;color:var(--muted)}
    .podiumPoints{font-size:2.1rem;font-weight:1000;color:var(--gold)}
    .restBoard{display:grid;gap:10px}
    .restTitle{font-size:.8rem;font-weight:900;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;text-align:center}
    .join{height:100dvh;display:grid;place-items:center;padding:16px}
    .joinCard{width:min(520px,100%);padding:28px;display:grid;gap:16px}
    .lobbyCast{display:flex;flex-wrap:wrap;justify-content:center;align-items:flex-start;gap:22px 18px;width:min(1240px,100%);margin:0 auto}
    .castPlayer{display:grid;gap:8px;justify-items:center;min-width:88px}
    .castAvatar{width:86px;height:86px;border-radius:999px;overflow:hidden;display:grid;place-items:center;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);box-shadow:0 12px 30px rgba(0,0,0,.24)}
    .castAvatar img{width:100%;height:100%;object-fit:cover}
    .castName{font-size:.9rem;font-weight:1000;line-height:1.08;text-align:center;max-width:10ch;text-wrap:balance}
    .castRole{font-size:.68rem;color:var(--muted);font-weight:800;letter-spacing:.06em;text-transform:uppercase}
    .versusLiveIntro,.versusLiveStage{display:grid;gap:18px;width:min(1180px,100%);margin:0 auto}
    .versusLiveHead{display:grid;gap:10px;justify-items:center;text-align:center}
    .versusLiveHead .title{font-size:clamp(2.2rem,4.2vw,4.4rem);line-height:.94}
    .versusLiveHead .copy{max-width:30ch}
    .versusLiveIntroNames,.versusLiveScoreline{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
    .versusLivePill{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);font-weight:900}
    .versusLivePill strong{color:var(--gold);font-size:1.1rem}
    .versusLiveCount{justify-self:center;min-width:84px;padding:12px 18px;border-radius:24px;background:linear-gradient(135deg,rgba(255,216,74,.18),rgba(255,125,207,.16));border:1px solid rgba(255,216,74,.3);font-size:2rem;font-weight:1000;color:var(--gold);text-align:center}
    .versusLiveArena{display:grid;grid-template-columns:minmax(0,220px) minmax(0,1fr) minmax(0,220px);align-items:center;gap:18px;padding:18px 20px;border-radius:30px;border:1px solid rgba(255,255,255,.1);background:radial-gradient(circle at top,rgba(56,220,255,.08),rgba(255,255,255,.02) 38%,rgba(0,0,0,.14) 100%)}
    .versusLivePlayer{display:grid;gap:8px;justify-items:center;text-align:center;align-content:center}
    .versusLiveAvatar{width:92px;height:92px;border-radius:999px;overflow:hidden;display:grid;place-items:center;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);box-shadow:0 12px 30px rgba(0,0,0,.2);transition:box-shadow .18s ease,transform .18s ease}

      const cards = (question.choices || []).map((choice, index) => {
        const voters = votes[index] || [];
        const locked = isSpeed && voters.length > 0;
        const revealCorrect = !isSpeed && question.revealed && question.correct === index;
        const revealWrong = isSpeed && question.revealed && Number(question.scores?.[index] || 0) === 0;
        const stateLine = isSpeed
          ? (question.revealed ? `${Number(question.scores?.[index] || 0)} ${tLive("pointsShort")}` : (locked ? tLive("taken") : tLive("free")))
          : (question.revealed ? (revealCorrect ? tLive("correct") : `${voters.length} ${voteLabel(voters.length)}`) : `${voters.length} ${voteLabel(voters.length)}`);
        const visibleVoters = voters.slice(0, 6).map(player => avatarBubble(player)).join("");
        const overflow = voters.length > 6 ? `<span class="voteMore">+${voters.length - 6}</span>` : "";
        return `<article class="answer ${locked ? "selected" : ""} ${revealCorrect ? "correct" : ""} ${revealWrong ? "wrong" : ""}">
          <div class="answerTop">
            <div class="aText"><span class="aKey">${String.fromCharCode(65 + index)}</span>${esc(choice)}</div>
            <div class="aState">${esc(stateLine)}</div>
          </div>
          <div class="voteCloud">${visibleVoters}${overflow}</div>
        </article>`;
      }).join("");
      ui.answers.className = `answers questionBoard${justRevealed ? " revealed" : ""}`;
      ui.answers.innerHTML = cards || `<div class="empty" style="grid-column:1/-1">${tLive("questionSoon")}</div>`;
      if(question.revealed && isSpeed && Array.isArray(question.ranking) && question.ranking.length){
        ui.fact.classList.remove("hidden");
        ui.factKick.textContent = tLive("correctOrder");
        ui.factText.textContent = question.ranking.map(item => `${item.rank}. ${item.text} (${item.score} ${tLive("pointsShort")})`).join(" · ");
      } else if(question.revealed && question.explanation){
        ui.fact.classList.remove("hidden");
        ui.factKick.textContent = tLive("funFact");
        ui.factText.textContent = question.explanation;
      } else {
        ui.fact.classList.add("hidden");
      }
    }
    function versusGlyph(choiceId){
      return ({rock:"✊", paper:"✋", scissors:"✌️"})[choiceId] || "✊";
    }
    function liveRankLabel(position){
      return `#${position}`;
    }
    function liveAvatarFallbackMarkup(cssClass = "avatar", player = null){
      return player?.avatarSrc
        ? `<span class="${cssClass}"><img src="${player.avatarSrc}" alt="${esc(playerLabel(player))}"></span>`
        : `<span class="${cssClass}">🦖</span>`;
    }
    function renderScoresPhaseTranslated(){
      ui.hero.className = "hero scores";
      lastAnswersVisible = false;
      ui.category.textContent = tLive("scoreboard");
      ui.prompt.textContent = game.finished ? tLive("finalPodium") : tLive("roundScore");
      ui.copy.textContent = "";
      setTimer("", 0, false);
      setHeaderPrompt({active:false});
      ui.hero.innerHTML = "";
      ui.fact.classList.add("hidden");
      const rows = scoreRows();
      if(!rows.length){
        ui.answers.className = "answers";
        ui.answers.innerHTML = `<div class="empty" style="grid-column:1/-1">${tLive("scoreboardSoon")}</div>`;
        return;
      }
      const isVertical = document.body.classList.contains("vertical");
      const leader = rows[0];
      if(game.finished){
        if(isVertical){
          const topThree = rows.slice(0, 3);
          const classes = ["first","second","third"];
          const remainder = rows.slice(3, 7);
          ui.hero.className = "hero scores center";
          ui.hero.innerHTML = `<div class="titleWrap">
                <span class="kick">${tLive("scoreboard")}</span>
                <h1 class="title">${tLive("finalPodium")}</h1>
              </div>
              <div class="podiumBoard">
                <div class="podium">
                  ${topThree.map((player, index) => `<article class="podiumCard ${classes[index]}"><div class="podiumRank">${liveRankLabel(index + 1)}</div><div class="podiumAvatar">${player.avatarSrc ? `<img src="${player.avatarSrc}" alt="">` : "🦖"}</div><div class="podiumName">${esc(playerLabel(player))}</div><div class="podiumMeta">${esc(roleLabel(player))}</div><div class="podiumPoints">${player.score}</div></article>`).join("")}
                </div>
                ${remainder.length ? `<div class="restBoard">${remainder.map((player, index) => `<article class="roundRow"><div class="rank">${liveRankLabel(index + 4)}</div><div class="avatar">${player.avatarSrc ? `<img src="${player.avatarSrc}" alt="">` : "🦖"}</div><div><div class="playerName">${esc(playerLabel(player))}</div><div class="playerSub">${esc(roleLabel(player))}</div></div><div class="points">${player.score}</div></article>`).join("")}${rows.length > 7 ? `<div class="moreLine">+${rows.length - 7} ${tLive("morePlayers")}</div>` : ""}</div>` : ""}
              </div>`;
          ui.answers.className = "answers";
          ui.answers.innerHTML = "";
          return;
        }
        const podiumEntries = [
          rows[1] ? { player: rows[1], cls: "second", rank: liveRankLabel(2) } : null,
          rows[0] ? { player: rows[0], cls: "first", rank: liveRankLabel(1) } : null,
          rows[2] ? { player: rows[2], cls: "third", rank: liveRankLabel(3) } : null
        ].filter(Boolean);
        const remainder = rows.slice(3, 11);
        const podiumMode = podiumEntries.length === 1 ? "solo" : podiumEntries.length === 2 ? "duo" : "trio";
        ui.hero.className = "hero scores center";
        ui.hero.innerHTML = `<div class="tvPodiumStage">
            <div class="tvPodiumHero">
              <span class="kick">${tLive("scoreboard")}</span>
              <h2>${tLive("finalPodium")}</h2>
              <p>${tLive("closesFront", {name: esc(playerLabel(leader)), score: leader.score})}</p>
            </div>
            <div class="tvPodium ${podiumMode}">
              ${podiumEntries.map((entry) => `<article class="tvPodiumCard ${entry.cls}"><div class="tvPodiumRank">${entry.rank}</div><div class="tvPodiumAvatar">${entry.player.avatarSrc ? `<img src="${entry.player.avatarSrc}" alt="">` : "🦖"}</div><div class="tvPodiumName">${esc(playerLabel(entry.player))}</div><div class="tvPodiumMeta">${esc(roleLabel(entry.player))}</div><div class="tvPodiumPoints">${entry.player.score}</div></article>`).join("")}
            </div>
            ${remainder.length ? `<div class="tvRestGrid">${remainder.map((player, index) => `<article class="tvRestCard"><div class="rank">${liveRankLabel(index + 4)}</div><div class="avatar">${player.avatarSrc ? `<img src="${player.avatarSrc}" alt="">` : "🦖"}</div><div><div class="playerName">${esc(playerLabel(player))}</div><div class="playerSub">${esc(roleLabel(player))}</div></div><div class="points">${player.score}</div></article>`).join("")}</div>` : ""}${rows.length > 11 ? `<div class="moreLine">+${rows.length - 11} ${tLive("morePlayers")}</div>` : ""}
          </div>`;
        ui.answers.className = "answers";
        ui.answers.innerHTML = "";
        return;
      }
      if(isVertical){
        const visible = rows.slice(0, 10);
        const rest = visible.slice(1);
        ui.hero.className = "hero scores center";
        ui.hero.innerHTML = `<div class="titleWrap">
              <span class="kick">${tLive("scoreboard")}</span>
              <h1 class="title">${tLive("roundScore")}</h1>
            </div>
            <div class="roundBoard">
              <article class="roundHeadline">
                <strong>${tLive("leadsNow", {name: esc(playerLabel(leader))})}</strong>
                <span>${tLive("pointsAccumulated", {score: leader.score})}${rest.length ? ` · ${tLive("chasingPressure")}` : ""}</span>
              </article>
              <div class="roundGrid">
                <article class="roundRow leader">
                  <div class="rank">${liveRankLabel(1)}</div>
                  <div class="avatar">${leader.avatarSrc ? `<img src="${leader.avatarSrc}" alt="">` : "🦖"}</div>
                  <div><div class="playerName">${esc(playerLabel(leader))}</div><div class="playerSub">${esc(roleLabel(leader))}</div></div>
                  <div class="points">${leader.score}</div>
                </article>
                ${rest.map((player, index) => `<article class="roundRow"><div class="rank">${liveRankLabel(index + 2)}</div><div class="avatar">${player.avatarSrc ? `<img src="${player.avatarSrc}" alt="">` : "🦖"}</div><div><div class="playerName">${esc(playerLabel(player))}</div><div class="playerSub">${esc(roleLabel(player))}</div></div><div class="points">${player.score}</div></article>`).join("")}
              </div>
              ${rows.length > 10 ? `<div class="moreLine">+${rows.length - 10} ${tLive("morePlayers")}</div>` : ""}
            </div>`;
        ui.answers.className = "answers";
        ui.answers.innerHTML = "";
        return;
      }
      const visible = rows.slice(0, 9);
      const rest = visible.slice(1);
      ui.hero.className = "hero scores center";
      ui.hero.innerHTML = `<div class="tvScoreWrap">
          <div class="tvScoreHero">
            <article class="tvLeaderHero">
              <span class="kick">${tLive("scoreboard")}</span>
              <h2>${tLive("leadsNow", {name: esc(playerLabel(leader))})}</h2>
              <p>${tLive("pointsAccumulated", {score: leader.score})}${rest.length ? ` · ${tLive("tablePressure")}` : ""}</p>
            </article>
            <article class="tvLeaderBadge">
              <div class="avatar">${leader.avatarSrc ? `<img src="${leader.avatarSrc}" alt="">` : "🦖"}</div>
              <div><div class="playerName">${esc(playerLabel(leader))}</div><div class="playerSub">${esc(roleLabel(leader))}</div></div>
              <div class="points">${leader.score}</div>
            </article>
          </div>
          ${rest.length ? `<div class="tvRankGrid">${rest.map((player, index) => `<article class="tvRankCard"><div class="rank">${liveRankLabel(index + 2)}</div><div class="avatar">${player.avatarSrc ? `<img src="${player.avatarSrc}" alt="">` : "🦖"}</div><div><div class="playerName">${esc(playerLabel(player))}</div><div class="playerSub">${esc(roleLabel(player))}</div></div><div class="points">${player.score}</div></article>`).join("")}</div>` : ""}${rows.length > 9 ? `<div class="moreLine">+${rows.length - 9} ${tLive("morePlayers")}</div>` : ""}
        </div>`;
      ui.answers.className = "answers";
      ui.answers.innerHTML = "";
    }
    function renderVersusIntroTranslated(){
      const versus = game.versus || {};
      const names = (versus.pair || [])
        .map(playerId => players.find(player => player.playerId === playerId)?.name)
        .filter(Boolean);
      const left = Math.max(1, countSeconds(versus.introEndsAt || Date.now()));
      setHeaderPrompt({active:false});
      ui.hero.className = "hero center";
      ui.category.textContent = "";
      ui.prompt.textContent = "";
      ui.copy.textContent = "";
      setTimer("", 0, false);
      ui.fact.classList.add("hidden");
      ui.answers.className = "answers";
      ui.answers.innerHTML = "";
      const introCopy = names.length === 2
        ? `${names[0]} ${liveLang() === "en" ? "and" : "y"} ${names[1]} ${tLive("twoDinosTie").toLowerCase()}`
        : tLive("twoDinosTie");
      ui.hero.innerHTML = `<div class="versusLiveIntro">
        <div class="versusLiveHead">
          <span class="kick">${tLive("tiebreakKick")}</span>
          <h1 class="title">${tLive("versusTitle")}</h1>
          <p class="copy">${esc(introCopy)}</p>
        </div>
        ${names.length ? `<div class="versusLiveIntroNames">${names.map(name => `<span class="versusLivePill">${esc(name)}</span>`).join("")}</div>` : ""}
        <div class="versusLiveCount">${left}</div>
      </div>`;
    }
    function renderVersusLivePlayerTranslated(playerId, activeId, visibleChoiceId, championId){
      const player = players.find(item => item.playerId === playerId);
      const choice = visibleChoiceId ? versusMoveById(visibleChoiceId) : null;
      const status = choice ? `${versusGlyph(choice.id)} ${versusChoiceLabel(choice.id)}` : (activeId === playerId ? tLive("marking") : tLive("hiddenChoice"));
      return `<article class="versusLivePlayer ${activeId === playerId ? "active" : ""} ${championId === playerId ? "champion" : ""}">
        <div class="versusLiveAvatar">${player?.avatarSrc ? `<img src="${player.avatarSrc}" alt="">` : "🦖"}</div>
        <strong class="versusLiveName">${esc(playerLabel(player))}</strong>
        <span class="versusLiveSub">${esc(roleLabel(player))}</span>
        <span class="versusLiveChoice">${esc(status)}</span>
      </article>`;
    }
    function renderVersusTranslated(){
      const versus = game.versus || {};
      const [playerA, playerB] = versus.pair || [];
      const now = Date.now();
      const revealActive = Number(versus.revealUntil || 0) > now || !!versus.roundWinnerId || !!versus.finalWinnerId;
      const visibleChoiceA = revealActive ? ((versus.revealChoices || {})[playerA] || "") : "";
      const visibleChoiceB = revealActive ? ((versus.revealChoices || {})[playerB] || "") : "";
      const winsA = Number(versus.wins?.[playerA] || 0);
      const winsB = Number(versus.wins?.[playerB] || 0);
      const neededWins = Math.ceil(Number(versus.bestOf || 3) / 2);
      const roundLeft = Math.max(0, countSeconds(versus.roundDeadline || Date.now()));
      const championId = versus.finalWinnerId || "";
      const roundWinnerId = versus.roundWinnerId || "";
      const playerAData = players.find(player => player.playerId === playerA);
      const playerBData = players.find(player => player.playerId === playerB);
      let copy = tLive("watchingOnly");
      if(championId){
        copy = tLive("winnerWins", {name: players.find(player => player.playerId === championId)?.name || tLive("player")});
      } else if(roundWinnerId){
        copy = tLive("handWin", {name: players.find(player => player.playerId === roundWinnerId)?.name || tLive("player")});
      } else if(revealActive){
        copy = tLive("tieAgain");
      }
      setHeaderPrompt({active:false});
      ui.hero.className = "hero center";
      ui.category.textContent = "";
      ui.prompt.textContent = "";
      ui.copy.textContent = "";
      setTimer("", 0, false);
      ui.fact.classList.add("hidden");
      ui.answers.className = "answers";
      ui.answers.innerHTML = "";
      ui.hero.innerHTML = `<div class="versusLiveStage">
        <div class="versusLiveHead">
          <span class="kick">${tLive("combat")}</span>
          <h1 class="title">${tLive("decideWithHands")}</h1>
          <p class="copy">${esc(playerLabel(playerAData))} vs ${esc(playerLabel(playerBData))}</p>
        </div>
        <div class="versusLiveScoreline">
          <span class="versusLivePill">${esc(playerLabel(playerAData))} <strong>${winsA}</strong> <span>${"●".repeat(winsA)}${"○".repeat(Math.max(0, neededWins - winsA))}</span></span>
          <span class="versusLivePill">${esc(playerLabel(playerBData))} <strong>${winsB}</strong> <span>${"●".repeat(winsB)}${"○".repeat(Math.max(0, neededWins - winsB))}</span></span>
        </div>
        <div class="versusLiveArena">
          ${renderVersusLivePlayerTranslated(playerA, roundWinnerId, visibleChoiceA, championId)}
          <div class="versusLiveCenter">
            <div class="versusLiveHands">
              <div class="versusLiveMove">${visibleChoiceA ? versusGlyph(versusMoveById(visibleChoiceA).id) : "✊"}</div>
              <div class="versusLiveBurst">VS</div>
              <div class="versusLiveMove">${visibleChoiceB ? versusGlyph(versusMoveById(visibleChoiceB).id) : "✊"}</div>
            </div>
            <div class="versusLiveCount">${championId ? "🏆" : roundLeft}</div>
            <p class="versusLiveCopy">${esc(copy)}</p>
          </div>
          ${renderVersusLivePlayerTranslated(playerB, roundWinnerId, visibleChoiceB, championId)}
        </div>
      </div>`;
    }
    function renderQuestionTranslated(){
      const question = game.question || {};
      const isSpeed = question.type === "speed";
      const art = categoryArtFor(question.category || "");
      const answersVisible = !question.answersVisibleAt || Date.now() >= question.answersVisibleAt;
      const headerPromptMode = answersVisible && (castMode || document.body.classList.contains("vertical"));
      const justRevealed = answersVisible && !lastAnswersVisible;
      lastAnswersVisible = answersVisible;
      const leadLeft = countSeconds(question.answersVisibleAt || Date.now());
      const answerLeft = countSeconds(question.endAt || Date.now());
      const total = answersVisible ? Math.max(1, Number(game.answerSeconds || 15)) : Math.max(1, Number(game.questionLeadSeconds || 6));
      const left = answersVisible ? answerLeft : leadLeft;
      const translatedCategory = translateLiveCategory(question.category || tLive("surpriseCategory"));
      const categoryLabel = isSpeed ? `${tLive("speedMode")} · ${translatedCategory}` : (translatedCategory || tLive("generalKnowledge"));
      const copyLabel = !answersVisible ? tLive("readQuestion") : (isSpeed ? tLive("speedReadQuestion") : "");
      ui.category.textContent = categoryLabel;
      ui.prompt.textContent = question.prompt || tLive("waitingQuestion");
      ui.copy.textContent = copyLabel;
      setHeaderPrompt({
        active: headerPromptMode,
        prompt: question.prompt || tLive("waitingQuestion"),
        category: categoryLabel
      });
      setTimer(String(left), Math.max(0, Math.min(1, left / total)), true);
      ui.hero.className = `hero ${answersVisible ? "compact" : "lead"}${justRevealed ? " revealed" : ""}${headerPromptMode ? " headerPrompt" : ""}`;
      ui.hero.innerHTML = `<div class="titleWrap">
            <span class="kick" id="category">${esc(categoryLabel)}</span>
            ${!answersVisible ? `<img class="categorySplash" src="${art.src}" alt="${esc(translatedCategory)}">` : ""}
            <h1 class="title" id="prompt">${esc(question.prompt || tLive("waitingQuestion"))}</h1>
            <p class="copy" id="copy">${esc(copyLabel)}</p>
          </div>
          <div class="timer${left || left === 0 ? "" : " hidden"}" id="timerRing" style="--timer:${Math.max(0, Math.min(1, left / total))}">
            <div class="timerInner" id="timer">${esc(String(left))}</div>
          </div>`;
      if(!answersVisible){
        ui.fact.classList.add("hidden");
        ui.answers.className = "answers";
        ui.answers.innerHTML = "";
        return;
      }
      const votes = voteMap(question);
      const cards = (question.choices || []).map((choice, index) => {
        const voters = votes[index] || [];
        const locked = isSpeed && voters.length > 0;
        const revealCorrect = !isSpeed && question.revealed && question.correct === index;
        const revealWrong = isSpeed && question.revealed && Number(question.scores?.[index] || 0) === 0;
        const stateLine = isSpeed
          ? (question.revealed ? `${Number(question.scores?.[index] || 0)} ${tLive("pointsShort")}` : (locked ? tLive("taken") : tLive("free")))
          : (question.revealed ? (revealCorrect ? tLive("correct") : `${voters.length} ${voteLabel(voters.length)}`) : `${voters.length} ${voteLabel(voters.length)}`);
        const visibleVoters = voters.slice(0, 6).map(player => player?.avatarSrc ? `<span class="voteAvatar"><img src="${player.avatarSrc}" alt="${esc(playerLabel(player))}"></span>` : `<span class="voteAvatar">🦖</span>`).join("");
        const overflow = voters.length > 6 ? `<span class="voteMore">+${voters.length - 6}</span>` : "";
        return `<article class="answer ${locked ? "selected" : ""} ${revealCorrect ? "correct" : ""} ${revealWrong ? "wrong" : ""}">
          <div class="answerTop">
            <div class="aText"><span class="aKey">${String.fromCharCode(65 + index)}</span>${esc(choice)}</div>
            <div class="aState">${esc(stateLine)}</div>
          </div>
          <div class="voteCloud">${visibleVoters}${overflow}</div>
        </article>`;
      }).join("");
      ui.answers.className = `answers questionBoard${justRevealed ? " revealed" : ""}`;
      ui.answers.innerHTML = cards || `<div class="empty" style="grid-column:1/-1">${tLive("questionSoon")}</div>`;
      if(question.revealed && isSpeed && Array.isArray(question.ranking) && question.ranking.length){
        ui.fact.classList.remove("hidden");
        ui.factKick.textContent = tLive("correctOrder");
        ui.factText.textContent = question.ranking.map(item => `${item.rank}. ${item.text} (${item.score} ${tLive("pointsShort")})`).join(" · ");
      } else if(question.revealed && question.explanation){
        ui.fact.classList.remove("hidden");
        ui.factKick.textContent = tLive("funFact");
        ui.factText.textContent = question.explanation;
      } else {
        ui.fact.classList.add("hidden");
      }
    }
    function render(){
      applyLiveTranslations();
      const waitingPhase = !["paused","countdown","question","answer","scores","versus_intro","versus"].includes(game.phase);
      document.body.classList.toggle("cast", castMode);
      document.body.classList.toggle("phase-lobby", waitingPhase);
      document.body.classList.toggle("phase-question", game.phase === "question");
      document.body.classList.toggle("phase-answer", game.phase === "answer");
      document.body.classList.toggle("phase-scores", game.phase === "scores");
      ui.app.classList.toggle("hidden", !channel);
      ui.join.classList.toggle("hidden", !!channel);
      ui.roomCode.textContent = channel ? channel.topic.split(":").pop() : "0000";
      if(game.phase === "paused") renderPaused();
      else if(game.phase === "countdown") renderCountdown();
      else if(game.phase === "versus_intro") renderVersusIntroTranslated();
      else if(game.phase === "versus") renderVersusTranslated();
      else if(game.phase === "question" || game.phase === "answer") renderQuestionTranslated();
      else if(game.phase === "scores") renderScoresPhaseTranslated();
      else renderLobby();
      syncAudio();
      if(castMode) tryCastAutoplay();
      applyCastFit();
    }

    function syncPlayers(){
      if(!channel) return;
      const raw = [];
      Object.values(channel.presenceState()).forEach(entries => (entries || []).forEach(entry => raw.push(entry)));
      const map = new Map();
      raw.forEach(entry => {
        const prev = map.get(entry.playerId);
        if(!prev || entry.updatedAt > prev.updatedAt) map.set(entry.playerId, entry);
      });
      players = [...map.values()];
      render();
    }

    async function join(code){
      if(channel){ try{ await sb.removeChannel(channel); } catch(_){} }
      channel = sb.channel(`trivialodon:session:${code}`, {config:{broadcast:{self:true},presence:{key:`live-${code}`}}});
      channel
        .on("presence",{event:"sync"},syncPlayers)
        .on("broadcast",{event:"game_state"},({payload}) => { if(payload){ game = payload; render(); } })
        .subscribe(async status => {
          if(status === "SUBSCRIBED"){
            if(castMode) ensureAudioReady();
            render();
            await channel.send({type:"broadcast",event:"request_state",payload:{viewer:"live",requestedAt:Date.now()}});
          }
        });
    }

    ui.btnJoin.onclick = () => {
      ensureAudioReady();
      const code = normalize(ui.codeInput.value);
      if(code.length === 4) join(code);
    };
    ui.codeInput.addEventListener("keydown", ev => {
      if(ev.key === "Enter"){
        ev.preventDefault();
        ui.btnJoin.click();
      }
    });
    ["click","touchstart","keydown"].forEach(eventName => window.addEventListener(eventName, primeAudio, {once:true, passive:eventName !== "keydown"}));
    window.addEventListener("resize", setLayoutMode);
    window.addEventListener("resize", applyCastFit);
    setLayoutMode();
    if(castMode) setTimeout(() => ensureAudioReady(), 120);
    setInterval(() => { if(channel) render(); }, 250);
    const auto = normalize(params.get("sala"));
    if(auto.length === 4){
      if(castMode) ensureAudioReady();
      join(auto);
    }
  </script>
