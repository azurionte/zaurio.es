<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Trivialodon | Zaurio</title>
  <link rel="icon" href="/shared/assets/brand/favicon.ico" />
  <link rel="stylesheet" href="/shared/css/zaurio-ui.css" />
  <style>
    html,body{
      margin:0;
      min-height:100%;
      background:radial-gradient(circle at top, #2a0b38, #09040d 72%);
      color:#fff;
      font-family:Segoe UI, Arial, sans-serif;
    }
    .page{
      width:min(920px,94vw);
      margin:0 auto 48px;
    }
    .card{
      border:1px solid rgba(255,255,255,.12);
      border-radius:28px;
      background:rgba(24,10,34,.9);
      padding:34px;
      box-shadow:0 24px 60px rgba(0,0,0,.34);
    }
    .tag{
      display:inline-flex;
      padding:4px 8px;
      border-radius:999px;
      background:rgba(134,239,255,.14);
      color:#86efff;
      font-size:11px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.04em;
      margin-bottom:10px;
    }
    h1{margin:0 0 12px;font-size:clamp(2.4rem, 5vw, 4rem)}
    p{margin:0;color:rgba(255,255,255,.72);line-height:1.6;max-width:60ch}
    a{
      display:inline-flex;
      margin-top:18px;
      padding:12px 18px;
      border-radius:999px;
      text-decoration:none;
      background:linear-gradient(135deg,#ffd36f,#ff9ec4);
      color:#1c0a1f;
      font-weight:800;
    }
  </style>
</head>
<body data-zaurio-nav="juegos">
  <div class="topMenu"></div>
  <main class="page">
    <section class="card">
      <span class="tag">Proximamente</span>
      <h1>Trivialodon aun esta incubando.</h1>
      <p>La ruta ya existe para que la arquitectura quede bien desde ahora. Cuando el juego este listo, esta pantalla se reemplaza por la experiencia real sin tocar la navegacion global.</p>
      <a href="https://juegos.zaurio.es">Volver a Juegos</a>
    </section>
  </main>
  <script src="/shared/js/zaurio-nav.js"></script>
</body>
</html>
