<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Participantes Live</title>

<style>
  :root{
    --yellow:#ffee00;
    --pink:#ff00aa;
  }
  html,body{
    margin:0;
    width:800px;
    height:400px;
    overflow:hidden;
    background:transparent;
    font-family: Arial, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    color:white;
  }

  .stage{
    width:800px;
    height:400px;
    position:relative;
  }

  /* Fondo totalmente transparente */
  .layer{
    position:absolute;
    inset:0;
  }

  /* Frame PNG */
  .frame{
    position:absolute;
    inset:0;
    width:800px;
    height:400px;
    object-fit:contain;
    pointer-events:none;
    filter: drop-shadow(0 0 18px rgba(255,0,170,.18));
  }

  /* Foto dentro del hueco (ajusta si quieres) */
  .avatarWrap{
    position:absolute;
    left:50%;
    top:46%;
    transform:translate(-50%,-50%);
    width:220px;
    height:220px;
    border-radius:999px;
    overflow:hidden;
    background: rgba(0,0,0,.22);
    box-shadow:
      0 0 24px rgba(255,0,170,.20),
      0 0 18px rgba(255,238,0,.10);
    border: 3px solid rgba(255,238,0,.22);
  }
  .avatarWrap img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  /* Nombre encima de hojas (grande y legible) */
  .name{
    position:absolute;
    left:50%;
    top:74%;
    transform:translate(-50%,-50%);
    width:560px;
    text-align:center;
    font-weight:1000;
    font-size:44px;
    letter-spacing:.3px;
    color:#ffffff;
    text-shadow:
      0 3px 0 rgba(0,0,0,.55),
      0 0 18px rgba(255,0,170,.22),
      0 0 14px rgba(255,238,0,.10);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    padding: 0 10px;
  }

  /* Placeholder si no hay nadie */
  .empty{
    position:absolute;
    left:50%;
    top:74%;
    transform:translate(-50%,-50%);
    width:560px;
    text-align:center;
    font-weight:1000;
    font-size:34px;
    opacity:.9;
    text-shadow:
      0 3px 0 rgba(0,0,0,.55),
      0 0 18px rgba(255,0,170,.18);
  }

  /* heartbeat invisible anti-freeze TikTok */
  #heartbeat{
    position:absolute;
    width:1px;height:1px;
    opacity:0;
  }

  @keyframes pop{
    from{opacity:0; transform:translate(-50%,-48%) scale(.98)}
    to{opacity:1; transform:translate(-50%,-50%) scale(1)}
  }
  .pop{ animation: pop .28s ease both; }
</style>
</head>

<body>
  <div class="stage">
    <div class="layer" id="mount"></div>
    <img class="frame" src="./assets/participantes-frame.png" alt="">
    <div id="heartbeat"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase.js"></script>
  <script src="./participanteslive.js"></script>
</body>
</html>
