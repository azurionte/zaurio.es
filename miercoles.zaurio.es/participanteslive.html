<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Participantes Live</title>

<style>
  :root{
    --yellow:#ffee00;
    --pink:#ff00aa;
  }

  html,body{
    margin:0;
    width:800px;
    height:180px;
    overflow:hidden;
    background:transparent;
    font-family: Arial, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    color:white;
  }

  .stage{
    width:800px;
    height:180px;
    position:relative;
  }

  #mount{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center; /* centrado siempre */
    gap:16px;              /* margen decente */
    padding: 10px 14px;
    box-sizing:border-box;
  }

  .p{
    width:140px; /* 5 caben: 5*140 + 4*16 = 764px */
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:10px;
    animation: pop .25s ease both;
  }

  .avatar{
    width:96px;
    height:96px;
    border-radius:999px;
    overflow:hidden;
    background:rgba(0,0,0,.22);
    border:3px solid rgba(255,238,0,.22);
    box-shadow:0 0 22px rgba(255,0,170,.18), 0 0 16px rgba(255,238,0,.10);
  }
  .avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .name{
    width:140px;
    text-align:center;
    font-weight:1000;
    font-size:20px;
    line-height:1.05;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    text-shadow:
      0 3px 0 rgba(0,0,0,.55),
      0 0 14px rgba(255,0,170,.18);
  }

  #heartbeat{
    position:absolute;
    width:1px;height:1px;
    opacity:0;
  }

  @keyframes pop{
    from{opacity:0; transform:translateY(6px) scale(.98)}
    to{opacity:1; transform:none}
  }
</style>
</head>

<body>
  <div class="stage">
    <div id="mount"></div>
    <div id="heartbeat"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase.js"></script>
  <script src="./participanteslive.js"></script>
</body>
</html>
