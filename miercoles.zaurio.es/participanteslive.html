<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Participantes Live</title>

<style>
  :root{
    --yellow:#ffee00;
    --pink:#ff00aa;
  }

  html,body{
    margin:0;
    width:800px;
    height:180px;
    overflow:hidden;
    background:transparent;
    font-family: Arial, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    color:white;
  }

  .stage{
    width:800px;
    height:180px;
    position:relative;
  }

  /* Si está vacío: NO se ve nada */
  #mount{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center; /* centrado */
    gap:16px;
    padding:10px 14px;
    box-sizing:border-box;
  }

  .p{
    width:140px; /* 5 caben */
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:10px;
    animation: pop .22s ease both;
  }

  /* ✅ MARCO 100% COMPATIBLE (sin conic-gradient) */
  .avatarRing{
    width:110px;
    height:110px;
    border-radius:999px;
    position:relative;
    display:grid;
    place-items:center;
    /* glow exterior */
    box-shadow:
      0 0 22px rgba(255,0,170,.32),
      0 0 18px rgba(255,238,0,.18);
  }

  /* anillo exterior amarillo */
  .avatarRing::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:999px;
    border:5px solid rgba(255,238,0,.95);
    box-shadow:
      0 0 18px rgba(255,238,0,.22),
      0 0 16px rgba(255,0,170,.18);
    pointer-events:none;
  }

  /* anillo interior fucsia (un poquito hacia adentro) */
  .avatarRing::after{
    content:"";
    position:absolute;
    inset:7px;
    border-radius:999px;
    border:3px solid rgba(255,0,170,.70);
    box-shadow: 0 0 14px rgba(255,0,170,.22);
    pointer-events:none;
  }

  .avatar{
    width:90px;
    height:90px;
    border-radius:999px;
    overflow:hidden;
    background: rgba(0,0,0,.18);
    box-shadow: inset 0 0 0 2px rgba(255,255,255,.14);
  }
  .avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .name{
    width:140px;
    text-align:center;
    font-weight:1000;
    font-size:20px;
    line-height:1.05;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    text-shadow:
      0 3px 0 rgba(0,0,0,.60),
      0 0 16px rgba(255,0,170,.22);
  }

  #heartbeat{
    position:absolute;
    width:1px;height:1px;
    opacity:0;
  }

  @keyframes pop{
    from{opacity:0; transform:translateY(6px) scale(.98)}
    to{opacity:1; transform:none}
  }
</style>
</head>

<body>
  <div class="stage">
    <div id="mount"></div>
    <div id="heartbeat"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase.js"></script>
  <script src="./participanteslive.js"></script>
</body>
</html>
