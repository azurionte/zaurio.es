<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Participantes Live</title>

<style>
:root{

  --tileW: 152px;
  --gap: 14px;

  /* MARCO */
  --frameSize: 160px;

  /* FOTO */
  --avatarSize: 110px;
  --avatarX: 0px;
  --avatarY: -10px;
  --avatarScale: 1;

  /* NOMBRE */
  --nameSize: 36px;
}

  html,body{
    margin:0;
    width:800px;
    height:180px;
    overflow:hidden;
    background:transparent;
    font-family: Arial, system-ui;
    color:white;
  }

  .stage{
    width:800px;
    height:180px;
    position:relative;
  }

  #mount{
    position:absolute;
    inset:0;

    display:flex;
    align-items:center;
    justify-content:center;

    gap:var(--gap);

    padding:10px 12px;
    box-sizing:border-box;
  }

  .p{
    width:var(--tileW);

    display:flex;
    flex-direction:column;
    align-items:center;

    animation:pop .22s ease both;
  }

  .avatarStack{
    width:var(--frameSize);
    height:var(--frameSize);
    position:relative;
  }

  .avatar{
    width:var(--avatarSize);
    height:var(--avatarSize);

    border-radius:999px;
    overflow:hidden;

    position:absolute;
    left:50%;
    top:50%;

    transform:
      translate(-50%, -50%)
      translate(var(--avatarX), var(--avatarY))
      scale(var(--avatarScale));

    z-index:1;
  }

  .avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
  }

  .framePng{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:contain;

    pointer-events:none;
    z-index:2;

    filter:drop-shadow(0 6px 10px rgba(0,0,0,.25));
  }

  /* NOMBRE SOBRE LAS HOJAS */

  .name{

    margin-top:-45px;  /* ⬅️ SUBE EL TEXTO */

    width:var(--tileW);

    text-align:center;

    font-weight:1000;
    font-size:var(--nameSize);
    line-height:1;

    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;

    text-shadow:
      0 4px 0 rgba(0,0,0,.85),
      0 0 18px rgba(0,0,0,.55),
      0 0 18px rgba(255,0,170,.18);

    z-index:3;
  }

  #heartbeat{
    position:absolute;
    width:1px;
    height:1px;
    opacity:0;
  }

  @keyframes pop{
    from{opacity:0; transform:translateY(6px) scale(.98)}
    to{opacity:1; transform:none}
  }

</style>
</head>

<body>

<div class="stage">
  <div id="mount"></div>
  <div id="heartbeat"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./supabase.js"></script>
<script src="./participanteslive.js"></script>

</body>
</html>
