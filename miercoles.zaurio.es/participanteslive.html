<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Participantes Live</title>

<style>
  :root{
    --tileW: 148px;      /* ancho de cada participante (5 caben centrados) */
    --gap: 14px;         /* separación entre participantes */
    --frameSize: 118px;  /* tamaño del PNG marco */
    --avatarSize: 86px;  /* tamaño de la foto redonda dentro */
    --avatarTop: 6px;    /* ajuste fino vertical dentro del marco */
  }

  html,body{
    margin:0;
    width:800px;
    height:180px;
    overflow:hidden;
    background:transparent;
    font-family: Arial, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    color:white;
  }

  .stage{
    width:800px;
    height:180px;
    position:relative;
  }

  /* Si está vacío: NO se ve nada */
  #mount{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center; /* centrado siempre */
    gap: var(--gap);
    padding: 10px 12px;
    box-sizing:border-box;
  }

  .p{
    width: var(--tileW);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap: 8px;
    animation: pop .22s ease both;
  }

  /* Contenedor del avatar + marco PNG */
  .avatarStack{
    width: var(--frameSize);
    height: var(--frameSize);
    position:relative;
    display:grid;
    place-items:center;
  }

  /* Foto redonda */
  .avatar{
    width: var(--avatarSize);
    height: var(--avatarSize);
    border-radius: 999px;
    overflow:hidden;
    background: rgba(0,0,0,.18);
    transform: translateY(var(--avatarTop));
    box-shadow: 0 0 0 2px rgba(0,0,0,.25); /* borde suave para contraste */
  }
  .avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  /* TU PNG encima */
  .framePng{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:contain;
    pointer-events:none;
    /* para que se note en compresión */
    filter: drop-shadow(0 0 10px rgba(0,0,0,.25));
  }

  .name{
    width: var(--tileW);
    text-align:center;
    font-weight:1000;
    font-size: 20px;
    line-height:1.05;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    text-shadow:
      0 3px 0 rgba(0,0,0,.65),
      0 0 14px rgba(255,0,170,.18);
  }

  #heartbeat{
    position:absolute;
    width:1px;height:1px;
    opacity:0;
  }

  @keyframes pop{
    from{opacity:0; transform:translateY(6px) scale(.98)}
    to{opacity:1; transform:none}
  }
</style>
</head>

<body>
  <div class="stage">
    <div id="mount"></div>
    <div id="heartbeat"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase.js"></script>
  <script src="./participanteslive.js"></script>
</body>
</html>
