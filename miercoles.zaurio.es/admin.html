<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin — Miércoles</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    .wrap{width:min(980px,92vw);margin:40px auto}
    .top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px}
    .pill{padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(8px);box-shadow:0 0 18px rgba(255,0,170,.25)}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
    .card{background:rgba(36,0,70,.78);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:14px;box-shadow:0 0 30px rgba(255,0,170,.18);animation:pop .25s ease both}
    .msg{white-space:pre-wrap;word-break:break-word;margin:0 0 10px;font-size:16px;line-height:1.35}
    .meta{opacity:.75;font-size:12px;display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn{border:none;cursor:pointer;padding:10px 14px;border-radius:999px;font-weight:900;transition:transform .12s ease}
    .btn:active{transform:scale(.96)}
    .show{background:#ffee00;color:#1a002a;box-shadow:0 0 18px rgba(255,238,0,.25)}
    .disc{background:#ff00aa;color:#fff;box-shadow:0 0 18px rgba(255,0,170,.25)}
    .ghost{background:rgba(255,255,255,.10);color:#fff;border:1px solid rgba(255,255,255,.16)}
    .login{max-width:420px;margin:70px auto;padding:22px;border-radius:22px;background:rgba(36,0,70,.82);border:1px solid rgba(255,255,255,.14);box-shadow:0 0 45px rgba(255,0,170,.20)}
    .field{width:100%;padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.16);background:rgba(0,0,0,.20);color:#fff;font-size:15px;outline:none;margin-top:10px}
    .hidden{display:none!important}
    @keyframes pop{from{opacity:0;transform:translateY(6px) scale(.98)}to{opacity:1;transform:none}}
  </style>
</head>
<body>
  <div class="wrap">

    <div id="login" class="login">
      <h1 style="margin:0 0 6px 0;">🔒 Admin</h1>
      <p style="margin:0;opacity:.85;">Miércoles de dramas y chismes</p>

      <input id="email" class="field" placeholder="Email" value="dramasaurio@zaurio.es" />
      <input id="pass" class="field" type="password" placeholder="Contraseña" />

      <div style="display:flex;gap:10px;margin-top:12px;">
        <button id="btnLogin" class="btn show" style="flex:1;">Entrar</button>
      </div>

      <div id="loginMsg" style="margin-top:12px;font-weight:900;"></div>
    </div>

    <div id="panel" class="hidden">
      <div class="top">
        <div class="pill">💜 Admin · Pendientes: <b id="count">0</b></div>
        <div style="display:flex;gap:10px;">
          <button id="btnRefresh" class="btn ghost">Actualizar</button>
          <button id="btnLogout" class="btn ghost">Salir</button>
        </div>
      </div>

      <div id="status" style="opacity:.85;margin:0 0 12px 0;"></div>
      <div id="grid" class="grid"></div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase.js"></script>

  <script>
    const elLogin = document.getElementById('login');
    const elPanel = document.getElementById('panel');
    const elGrid = document.getElementById('grid');
    const elCount = document.getElementById('count');
    const elStatus = document.getElementById('status');
    const elLoginMsg = document.getElementById('loginMsg');

    const btnLogin = document.getElementById('btnLogin');
    const btnRefresh = document.getElementById('btnRefresh');
    const btnLogout = document.getElementById('btnLogout');

    function esc(s){
      return (s||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
    }
    function showPanel(){ elLogin.classList.add('hidden'); elPanel.classList.remove('hidden'); }
    function showLogin(){ elPanel.classList.add('hidden'); elLogin.classList.remove('hidden'); }
    function status(t){ elStatus.textContent = t || ""; }

    async function ensureSession(){
      const { data } = await supabaseClient.auth.getSession();
      if (data.session) {
        showPanel();
        await cargar();
      } else {
        showLogin();
      }
    }

    async function cargar(){
      status("Cargando pendientes…");
      const { data, error } = await supabaseClient
        .from('mensajes')
        .select('id,texto,creado,estado')
        .eq('estado','pendiente')
        .order('creado',{ ascending:false });

      if (error){ status("❌ " + error.message); return; }

      elCount.textContent = String(data.length);
      status(data.length ? "" : "No hay pendientes ✨");
      elGrid.innerHTML = "";

      data.forEach(m => {
        const d = new Date(m.creado);
        const div = document.createElement('div');
        div.className = "card";
        div.innerHTML = `
          <p class="msg">${esc(m.texto)}</p>
          <div class="meta"><span>🕒 ${d.toLocaleString()}</span><span>🧾 ${m.id.slice(0,8)}…</span></div>
          <div class="actions">
            <button class="btn show" data-a="mostrado" data-id="${m.id}">Mostrar</button>
            <button class="btn disc" data-a="descartado" data-id="${m.id}">Descartar</button>
          </div>`;
        elGrid.appendChild(div);
      });
    }

    async function setEstado(id, estado){
      const { error } = await supabaseClient
        .from('mensajes')
        .update({ estado })
        .eq('id', id);

      if (error){ alert("Error: " + error.message); return; }
      await cargar();
    }

    elGrid.addEventListener('click', (e) => {
      const b = e.target.closest('button');
      if (!b) return;
      const id = b.getAttribute('data-id');
      const estado = b.getAttribute('data-a');
      if (id && estado) setEstado(id, estado);
    });

    btnLogin.addEventListener('click', async () => {
      elLoginMsg.textContent = "Entrando…";
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('pass').value;

      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error){ elLoginMsg.textContent = "❌ " + error.message; return; }
      elLoginMsg.textContent = "✅ OK";
      showPanel();
      await cargar();
    });

    btnRefresh.addEventListener('click', cargar);

    btnLogout.addEventListener('click', async () => {
      await supabaseClient.auth.signOut();
      showLogin();
    });

    ensureSession();
  </script>
</body>
</html>
