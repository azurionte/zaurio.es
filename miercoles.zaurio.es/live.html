<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Live — Miércoles</title>

<style>

html,body{
margin:0;
width:800px;
height:400px;
overflow:hidden;
background:transparent;
font-family:Arial,system-ui;
color:white;
}

.stage{
width:800px;
height:400px;
padding:18px;
box-sizing:border-box;
display:flex;
align-items:flex-end;
justify-content:center;
}

.card{
width:100%;
border-radius:26px;
background:rgba(36,0,70,.86);
border:1px solid rgba(255,255,255,.16);
box-shadow:0 0 28px rgba(255,0,170,.28);
backdrop-filter:blur(10px);
position:relative;
padding:18px;
box-sizing:border-box;
transition:all .25s ease;
}

.label{
position:absolute;
top:-14px;
left:20px;
padding:8px 14px;
border-radius:999px;
background:rgba(0,0,0,.45);
border:1px solid rgba(255,238,0,.38);
box-shadow:0 0 18px rgba(255,238,0,.28);
font-weight:900;
font-size:20px;
color:#ffee00;
max-width:90%;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.msg{
font-size:28px;
line-height:1.2;
white-space:pre-wrap;
word-break:break-word;
margin:0;
}

.promptOnly{
display:flex;
align-items:center;
justify-content:center;
min-height:120px;
text-align:center;
}

.promptOnlyText{
font-size:34px;
font-weight:900;
text-shadow:0 0 18px rgba(255,0,170,.25);
}

/* heartbeat invisible para evitar freeze en TikTok */
#heartbeat{
position:absolute;
width:1px;
height:1px;
opacity:0;
}

</style>
</head>

<body>

<div class="stage">
<div id="mount" style="width:100%;"></div>
</div>

<div id="heartbeat"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./supabase.js"></script>

<script>

const mount = document.getElementById("mount");
let lastState = "";

function esc(s){
return (s||"")
.replaceAll("&","&amp;")
.replaceAll("<","&lt;")
.replaceAll(">","&gt;");
}

function render(html){
mount.innerHTML = html;
}

function renderPrompt(consigna){
return `
<div class="card">
<div class="promptOnly">
<div class="promptOnlyText">${esc(consigna)}</div>
</div>
</div>
`;
}

function renderMessage(consigna,msg){
return `
<div class="card">
<div class="label">${esc(consigna)}</div>
<p class="msg">${esc(msg)}</p>
</div>
`;
}

async function tick(){

const cons = await supabaseClient
.from("config")
.select("consigna")
.eq("id",1)
.maybeSingle();

const consigna = cons.data?.consigna || "";

const m = await supabaseClient
.from("mensajes")
.select("id,texto")
.eq("estado","mostrado")
.limit(1);

if(!m.data || m.data.length===0){

const state="PROMPT:"+consigna;

if(state!==lastState){
lastState=state;
render(renderPrompt(consigna));
}

return;
}

const msg=m.data[0];
const state="MSG:"+msg.id+":"+consigna;

if(state!==lastState){
lastState=state;
render(renderMessage(consigna,msg.texto));
}

}

/* polling normal */
setInterval(tick,1000);

/* heartbeat anti freeze */
setInterval(()=>{
document.getElementById("heartbeat").textContent = Date.now();
},500);

tick();

</script>

</body>
</html>
