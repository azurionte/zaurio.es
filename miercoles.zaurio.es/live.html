<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Live — Miércoles</title>

  <style>
    :root{
      --W: 800px;
      --H: 180px;

      --purple1: #12072a;
      --purple2: #2a0a55;

      --yellow: #ffee00;
      --pink: #ff00aa;
      --cyan: #2fd3ff;

      /* Tarjeta (más ancha, sin crecer en alto) */
      --cardW: 786px;           /* ⬅️ ancho real dentro de 800 */
      --cardHMax: 132px;        /* ⬅️ NO pasar de este alto */

      /* Tipos auto-ajustables */
      --promptSize: clamp(22px, 3.2vw, 34px);  /* consigna grande */
      --msgSize: clamp(15px, 2.0vw, 20px);     /* texto mensaje */
      --labelSize: clamp(14px, 2.1vw, 22px);   /* etiqueta borde */
    }

    html,body{
      margin:0;
      width:var(--W);
      height:var(--H);
      overflow:hidden;
      background: transparent;
      font-family: Arial, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    /* stage 800x180 */
    .stage{
      width:var(--W);
      height:var(--H);
      position:relative;
      background: transparent;
    }

    /* envoltorio centrado */
    .wrap{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 0;
      box-sizing:border-box;
    }

    /* tarjeta */
    .card{
      width: var(--cardW);
      max-height: var(--cardHMax);
      box-sizing:border-box;
      padding: 14px 18px;
      border-radius: 18px;

      background: linear-gradient(135deg, rgba(18,7,42,.88), rgba(42,10,85,.78));
      border: 1px solid rgba(255,255,255,.14);

      box-shadow:
        0 12px 28px rgba(0,0,0,.35),
        0 0 24px rgba(255,0,170,.18);

      position:relative;

      display:flex;
      align-items:center;
      gap: 14px;

      animation: pop .22s ease both;
    }

    /* etiqueta consigna “cortando” borde cuando hay mensaje */
    .card.hasMsg::before{
      content: attr(data-label);
      position:absolute;
      top:-14px;
      left: 18px;

      padding: 5px 12px;
      border-radius: 999px;

      font-weight:1000;
      font-size: var(--labelSize);

      color: #1a002a;
      background: var(--yellow);

      box-shadow:
        0 8px 18px rgba(0,0,0,.35),
        0 0 16px rgba(255,238,0,.18);

      max-width: calc(var(--cardW) - 36px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* icono corona girando (solo en modo consigna) */
    .crown{
      width: 52px;
      height: 52px;
      flex: 0 0 52px;
      display:none;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.35));
      transform-style: preserve-3d;
      animation: spin 2.8s linear infinite;
    }
    .card.promptOnly .crown{ display:block; }

    @keyframes spin{
      from{ transform: rotateY(0deg) rotateZ(-10deg); }
      to  { transform: rotateY(360deg) rotateZ(-10deg); }
    }

    /* contenido */
    .content{
      min-width: 0;
      flex:1;
      display:flex;
      flex-direction:column;
      gap: 8px;
    }

    /* consigna grande cuando no hay mensaje */
    .prompt{
      font-weight: 1000;
      font-size: var(--promptSize);
      line-height: 1.05;
      color: white;

      text-shadow:
        0 4px 0 rgba(0,0,0,.78),
        0 0 18px rgba(0,0,0,.42),
        0 0 18px rgba(255,0,170,.16);

      /* para que no rompa */
      overflow:hidden;
      text-overflow: ellipsis;
      display:-webkit-box;
      -webkit-line-clamp: 2;            /* máximo 2 líneas */
      -webkit-box-orient: vertical;
    }

    /* mensaje: no se sale, se corta bonito */
    .msg{
      font-size: var(--msgSize);
      line-height: 1.25;
      color: rgba(255,255,255,.95);

      overflow:hidden;
      display:-webkit-box;
      -webkit-line-clamp: 5;            /* máximo 5 líneas */
      -webkit-box-orient: vertical;

      text-shadow:
        0 3px 0 rgba(0,0,0,.65),
        0 0 16px rgba(0,0,0,.35);
    }

    /* estado debug oculto (por si alguna vez) */
    .tiny{
      font-size:12px;
      opacity:.65;
      display:none;
    }

    /* anti-freeze tiktok */
    #heartbeat{
      position:absolute;
      width:1px;height:1px;
      opacity:0;
    }

    @keyframes pop{
      from{ opacity:0; transform: translateY(6px) scale(.985); }
      to  { opacity:1; transform:none; }
    }
  </style>
</head>

<body>
  <div class="stage">
    <div class="wrap">
      <div id="card" class="card" aria-live="polite">
        <!-- corona 3D -->
        <img class="crown" src="./assets/crown.png" alt="">
        <div class="content">
          <div id="prompt" class="prompt"></div>
          <div id="msg" class="msg" style="display:none;"></div>
          <div id="tiny" class="tiny"></div>
        </div>
      </div>
    </div>

    <div id="heartbeat"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase.js"></script>
  <script src="./live.js"></script>
</body>
</html>
