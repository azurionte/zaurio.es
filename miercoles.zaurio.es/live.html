<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Live — Miércoles</title>

<style>
  :root{
    --bg: rgba(36,0,70,.86);
    --stroke: rgba(255,255,255,.16);
    --yellow:#ffee00;
    --pink:#ff00aa;
    --glowP: rgba(255,0,170,.25);
    --glowY: rgba(255,238,0,.28);

    /* TARJETA FIJA */
    --W: 800px;
    --H: 200px;

    /* Padding internos */
    --padX: 22px;
    --padY: 18px;

    /* Label */
    --labelH: 38px;      /* reserva visual arriba */
    --labelFont: 22px;

    /* Texto */
    --minFont: 18px;     /* mínimo legible móvil */
    --maxFont: 54px;     /* máximo cuando hay poco texto */

    /* Consigna (prompt-only) */
    --promptMin: 22px;
    --promptMax: 52px;
  }

  html,body{
    margin:0;
    width: var(--W);
    height: var(--H);
    overflow:hidden;
    background:transparent;
    font-family:Arial,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    color:white;
  }

  .stage{
    width: var(--W);
    height: var(--H);
    display:flex;
    align-items:center;
    justify-content:center;
    background:transparent;
  }

  /* Tarjeta SIEMPRE igual */
  .card{
    width: var(--W);
    height: var(--H);
    box-sizing:border-box;

    border-radius:26px;
    background: var(--bg);
    border: 1px solid var(--stroke);
    box-shadow: 0 0 28px var(--glowP), inset 0 0 0 1px rgba(255,255,255,.06);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    position:relative;
    overflow:hidden;

    padding: var(--padY) var(--padX);
  }

  /* Label (solo cuando hay mensaje) */
  .label{
    position:absolute;
    top: 10px;
    left: 18px;
    right: 18px;

    height: var(--labelH);
    display:flex;
    align-items:center;

    padding: 0 14px;
    border-radius:999px;

    background: rgba(0,0,0,.45);
    border: 1px solid rgba(255,238,0,.38);
    box-shadow: 0 0 18px var(--glowY);

    font-weight:1000;
    font-size: var(--labelFont);
    color: var(--yellow);
    text-shadow: 0 0 10px rgba(255,238,0,.25);

    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  /* Cuerpo cuando hay mensaje: ocupa todo lo que queda debajo del label */
  .body{
    position:absolute;
    left: var(--padX);
    right: var(--padX);
    top: calc(10px + var(--labelH) + 10px);
    bottom: var(--padY);

    display:flex;
    align-items:center;
    justify-content:center;
  }

  /* Texto del mensaje (auto-fit) */
  .msg{
    width:100%;
    max-height:100%;

    margin:0;
    text-align:center;

    white-space:pre-wrap;
    word-break:break-word;

    line-height: 1.12;
    font-weight: 900;
    color: rgba(255,255,255,.98);

    text-shadow:
      0 3px 0 rgba(0,0,0,.65),
      0 0 16px rgba(0,0,0,.35);
  }

  /* ========= Prompt-only (sin mensaje) ========= */
  .promptOnly{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:16px;
  }

  .crownWrap{
    width:78px;
    height:78px;
    flex:0 0 78px;
    display:grid;
    place-items:center;
    perspective: 900px;
    filter: drop-shadow(0 0 18px rgba(255,238,0,.18)) drop-shadow(0 0 18px rgba(255,0,170,.14));
  }

  .crown3d{
    width:66px;
    height:66px;
    transform-style: preserve-3d;
    animation: spin3d 2.6s linear infinite;
    will-change: transform;
  }

  .crown3d svg{
    width:66px;height:66px;display:block;
    filter: drop-shadow(0 0 10px rgba(255,238,0,.22));
  }

  .promptText{
    flex:1;
    min-width:0;
    max-height:100%;
    text-align:left;

    font-weight:1000;
    line-height: 1.08;
    color:#fff;

    white-space:pre-wrap;
    word-break:break-word;

    text-shadow:
      0 0 18px rgba(255,0,170,.22),
      0 0 12px rgba(255,238,0,.10);
  }

  /* Anti-freeze TikTok */
  #heartbeat{
    position:absolute;
    width:1px;height:1px;
    opacity:0;
  }

  @keyframes spin3d{
    0%   { transform: rotateX(16deg) rotateY(0deg)   rotateZ(-6deg); }
    50%  { transform: rotateX(16deg) rotateY(180deg) rotateZ(6deg);  }
    100% { transform: rotateX(16deg) rotateY(360deg) rotateZ(-6deg); }
  }
</style>
</head>

<body>
  <div class="stage">
    <div id="mount"></div>
  </div>

  <div id="heartbeat"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase.js"></script>

  <script>
    const mount = document.getElementById("mount");
    let lastState = "";
    let paintN = 0;

    function esc(s){
      return (s||"")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function render(html){
      paintN++;
      mount.setAttribute("data-paint", String(paintN)); // fuerza repaint en TikTok
      mount.innerHTML = html;
    }

    function crownSVG(){
      return `
        <div class="crownWrap" aria-hidden="true">
          <div class="crown3d">
            <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0" stop-color="#fff6a0"/>
                  <stop offset="0.35" stop-color="#ffee00"/>
                  <stop offset="0.7" stop-color="#ffb300"/>
                  <stop offset="1" stop-color="#ff6bd6"/>
                </linearGradient>
                <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0" stop-color="rgba(255,255,255,.85)"/>
                  <stop offset="1" stop-color="rgba(255,255,255,0)"/>
                </linearGradient>
              </defs>

              <path d="M10 44c0 6 4 10 10 10h24c6 0 10-4 10-10v-4H10v4z"
                    fill="url(#gold)" opacity="0.95"/>
              <path d="M12 42h40" stroke="rgba(255,255,255,.28)" stroke-width="2" stroke-linecap="round"/>

              <path d="M10 40l8-18 14 14 14-14 8 18H10z"
                    fill="url(#gold)" opacity="0.95"/>

              <circle cx="18" cy="22" r="4" fill="#7ff0ff" opacity="0.95"/>
              <circle cx="32" cy="26" r="4.5" fill="#b7ff6a" opacity="0.95"/>
              <circle cx="46" cy="22" r="4" fill="#ff6bd6" opacity="0.95"/>

              <path d="M14 40l6-14 12 12 12-12 6 14H14z"
                    fill="url(#shine)" opacity="0.28"/>
              <path d="M14 44c0 4 2 6 6 6h24c4 0 6-2 6-6"
                    fill="url(#shine)" opacity="0.20"/>

              <path d="M10 40l8-18 14 14 14-14 8 18H10z"
                    fill="none" stroke="rgba(255,255,255,.18)" stroke-width="2" />
              <path d="M10 40h44" stroke="rgba(255,255,255,.14)" stroke-width="2" />
            </svg>
          </div>
        </div>
      `;
    }

    function templatePromptOnly(consigna){
      return `
        <div class="card">
          <div class="promptOnly">
            ${crownSVG()}
            <div id="fitPrompt" class="promptText">${esc(consigna || "—")}</div>
          </div>
        </div>
      `;
    }

    function templateMessage(consigna, texto){
      return `
        <div class="card">
          <div class="label">${esc(consigna || "")}</div>
          <div class="body">
            <p id="fitMsg" class="msg">${esc(texto || "")}</p>
          </div>
        </div>
      `;
    }

    function templateError(msg){
      return `
        <div class="card" style="display:flex;align-items:center;justify-content:center;">
          <div style="
            padding:12px 14px;border-radius:14px;
            background:rgba(0,0,0,.35);
            border:1px solid rgba(255,255,255,.16);
            color:#ffee00;font-weight:900;white-space:pre-wrap;
            max-width:760px;
          ">${esc(msg)}</div>
        </div>
      `;
    }

    // ======= AUTO-FIT REAL DE FUENTE =======
    // Ajusta el font-size para que el elemento encaje en su caja (alto y ancho)
    function fitText(el, minPx, maxPx){
      if (!el) return;

      // Importante: que no tenga font-size heredado raro
      el.style.fontSize = maxPx + "px";

      const parent = el.parentElement;
      if (!parent) return;

      const maxW = parent.clientWidth;
      const maxH = parent.clientHeight;

      // Búsqueda binaria
      let lo = minPx;
      let hi = maxPx;
      let best = minPx;

      const fits = (px) => {
        el.style.fontSize = px + "px";
        // forzar reflow
        const w = el.scrollWidth;
        const h = el.scrollHeight;
        return (w <= maxW + 1) && (h <= maxH + 1);
      };

      // Si incluso max cabe, nos quedamos con max
      if (fits(maxPx)){
        el.style.fontSize = maxPx + "px";
        return;
      }

      // Si ni min cabe, ponemos min (igual cortará menos posible)
      if (!fits(minPx)){
        el.style.fontSize = minPx + "px";
        return;
      }

      while (lo <= hi){
        const mid = Math.floor((lo + hi) / 2);
        if (fits(mid)){
          best = mid;
          lo = mid + 1;
        } else {
          hi = mid - 1;
        }
      }
      el.style.fontSize = best + "px";
    }

    // Ajustes específicos según modo
    function applyFits(){
      const msg = document.getElementById("fitMsg");
      if (msg){
        // Mensaje: en .body (ya centrado)
        fitText(msg, parseInt(getComputedStyle(document.documentElement).getPropertyValue("--minFont")), parseInt(getComputedStyle(document.documentElement).getPropertyValue("--maxFont")));
      }
      const prm = document.getElementById("fitPrompt");
      if (prm){
        // Prompt: en .promptOnly (izq con corona)
        fitText(prm, parseInt(getComputedStyle(document.documentElement).getPropertyValue("--promptMin")), parseInt(getComputedStyle(document.documentElement).getPropertyValue("--promptMax")));
      }
    }

    async function tick(){
      try{
        // Consigna
        const c = await supabaseClient
          .from("config")
          .select("consigna")
          .eq("id", 1)
          .maybeSingle();

        if (c.error){
          const key = "ERR:CONFIG:" + c.error.message;
          if (key !== lastState){
            lastState = key;
            render(templateError("CONFIG ERROR:\n" + c.error.message));
          }
          return;
        }
        const consigna = c.data?.consigna || "";

        // Mensaje mostrado
        const m = await supabaseClient
          .from("mensajes")
          .select("id,texto,creado")
          .eq("estado","mostrado")
          .order("creado",{ascending:false})
          .limit(1);

        if (m.error){
          const key = "ERR:MSG:" + m.error.message;
          if (key !== lastState){
            lastState = key;
            render(templateError("MENSAJES ERROR:\n" + m.error.message));
          }
          return;
        }

        const hasShown = m.data && m.data.length > 0;

        if (!hasShown){
          const key = "PROMPT_ONLY:" + consigna;
          if (key !== lastState){
            lastState = key;
            render(templatePromptOnly(consigna));
            requestAnimationFrame(() => {
              applyFits();
              // segundo frame por si TikTok/OBS tarda en calcular layout
              requestAnimationFrame(applyFits);
            });
          }
          return;
        }

        const msg = m.data[0];
        const key = "MSG:" + msg.id + ":" + consigna;
        if (key !== lastState){
          lastState = key;
          render(templateMessage(consigna, msg.texto));
          requestAnimationFrame(() => {
            applyFits();
            requestAnimationFrame(applyFits);
          });
        }

      } catch(e){
        const key = "ERR:JS:" + (e?.message || e);
        if (key !== lastState){
          lastState = key;
          render(templateError("JS ERROR:\n" + (e?.message || e)));
        }
      }
    }

    // Refit al cambiar tamaño (por si TikTok/OBS hace scaling raro)
    window.addEventListener("resize", () => {
      requestAnimationFrame(() => {
        applyFits();
        requestAnimationFrame(applyFits);
      });
    });

    tick();
    setInterval(tick, 1000);

    // Anti-freeze TikTok
    setInterval(()=>{ document.getElementById("heartbeat").textContent = Date.now(); }, 500);
  </script>
</body>
</html>
