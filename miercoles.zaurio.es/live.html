<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Live — Miércoles</title>

  <style>
    :root{
      --bg: rgba(36,0,70,.86);
      --stroke: rgba(255,255,255,.16);
      --yellow: #ffee00;
      --pink: #ff00aa;
      --glowY: rgba(255,238,0,.28);
      --glowP: rgba(255,0,170,.22);
    }

    html,body{
      margin:0;
      padding:0;
      width:800px;   /* ✅ tu resolución */
      height:400px;  /* ✅ tu resolución */
      overflow:hidden;
      background:transparent;
      font-family: Arial, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color:white;
    }

    .stage{
      width:800px;
      height:400px;
      padding:18px;
      box-sizing:border-box;
      display:flex;
      align-items:flex-end;
      justify-content:center;
    }

    /* Card base (squircle-ish) */
    .card{
      width:100%;
      border-radius:26px;
      background: var(--bg);
      border: 1px solid var(--stroke);
      box-shadow:
        0 0 28px var(--glowP),
        inset 0 0 0 1px rgba(255,255,255,.06);
      backdrop-filter: blur(10px);
      position:relative;
      padding:18px 18px 18px;
      box-sizing:border-box;
      animation: pop .35s ease both;
    }

    /* Label en borde: más grande y legible */
    .label{
      position:absolute;
      top:-14px;
      left:20px;
      padding:8px 14px;
      border-radius:999px;
      background: rgba(0,0,0,.45);
      border: 1px solid rgba(255,238,0,.38);
      box-shadow: 0 0 18px var(--glowY);
      font-weight:900;
      letter-spacing:.3px;

      /* ✅ tamaño para 800x400 */
      font-size:18px;
      line-height:1;
      color: var(--yellow);
      text-shadow: 0 0 10px rgba(255,238,0,.25);
      max-width: calc(100% - 40px);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    /* Mensaje mostrado */
    .msg{
      font-size:26px;
      line-height:1.18;
      white-space:pre-wrap;
      word-break:break-word;
      margin:0;
      padding-top:6px;
    }

    /* Modo “solo consigna” (sin mensaje) */
    .promptOnly{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:120px;
      text-align:center;
      padding:8px 12px;
      box-sizing:border-box;
    }
    .promptOnlyText{
      font-weight:1000;
      font-size:32px;         /* ✅ grande */
      line-height:1.12;
      color:#fff;
      text-shadow:
        0 0 18px rgba(255,0,170,.25),
        0 0 12px rgba(255,238,0,.12);
      white-space:pre-wrap;
      word-break:break-word;
    }

    .err{
      position:absolute;
      left:18px;
      right:18px;
      bottom:18px;
      padding:10px 12px;
      border-radius:14px;
      background: rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.16);
      color: var(--yellow);
      font-weight:900;
      white-space:pre-wrap;
      display:none;
    }

    /* Transición cuando cambia el contenido */
    .fadeOut{ animation: fadeOut .18s ease both; }
    .fadeIn{ animation: fadeIn .26s ease both; }
    @keyframes pop{ from{opacity:0; transform:translateY(10px) scale(.985)} to{opacity:1; transform:none} }
    @keyframes fadeOut{ from{opacity:1} to{opacity:0} }
    @keyframes fadeIn{ from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none} }
  </style>
</head>

<body>
  <div class="stage">
    <div id="mount" style="width:100%;"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase.js"></script>

  <script>
    const mount = document.getElementById('mount');

    let lastRenderKey = null; // para no re-renderizar igual

    function esc(s){
      return (s||"")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function render(html){
      // anima el cambio
      if (mount.firstChild){
        mount.firstChild.classList.add('fadeOut');
        setTimeout(()=>{
          mount.innerHTML = html;
          if (mount.firstChild) mount.firstChild.classList.add('fadeIn');
        }, 120);
      } else {
        mount.innerHTML = html;
      }
    }

    function renderPromptOnly(consigna){
      return `
        <div class="card">
          <div class="promptOnly">
            <div class="promptOnlyText">${esc(consigna || "—")}</div>
          </div>
        </div>
      `;
    }

    function renderMessage(consigna, texto){
      return `
        <div class="card">
          <div class="label">${esc(consigna || "")}</div>
          <p class="msg">${esc(texto || "")}</p>
        </div>
      `;
    }

    function renderError(msg){
      return `
        <div class="card">
          <div class="err" style="display:block;">${esc(msg)}</div>
        </div>
      `;
    }

    async function tick(){
      try{
        // 1) consigna (siempre)
        const c = await supabaseClient
          .from('config')
          .select('consigna')
          .eq('id',1)
          .maybeSingle();

        if (c.error){
          const key = "ERR:CONFIG:" + c.error.message;
          if (key !== lastRenderKey){
            lastRenderKey = key;
            render(renderError("CONFIG ERROR:\n" + c.error.message));
          }
          return;
        }

        const consigna = c.data?.consigna || "";

        // 2) último mostrado
        const m = await supabaseClient
          .from('mensajes')
          .select('id,texto,creado')
          .eq('estado','mostrado')
          .order('creado',{ ascending:false })
          .limit(1);

        if (m.error){
          const key = "ERR:MSG:" + m.error.message;
          if (key !== lastRenderKey){
            lastRenderKey = key;
            render(renderError("MENSAJES ERROR:\n" + m.error.message));
          }
          return;
        }

        const hasShown = m.data && m.data.length > 0;

        // ✅ regla nueva:
        // - si NO hay mostrado → tarjeta = consigna grande
        // - si hay mostrado → consigna en label/borde y mensaje en body
        if (!hasShown){
          const key = "PROMPT_ONLY:" + consigna;
          if (key !== lastRenderKey){
            lastRenderKey = key;
            render(renderPromptOnly(consigna));
          }
          return;
        }

        const msg = m.data[0];
        const key = "MSG:" + msg.id + ":" + consigna;
        if (key !== lastRenderKey){
          lastRenderKey = key;
          render(renderMessage(consigna, msg.texto));
        }

      } catch (e){
        const key = "ERR:JS:" + (e?.message || e);
        if (key !== lastRenderKey){
          lastRenderKey = key;
          render(renderError("JS ERROR:\n" + (e?.message || e)));
        }
      }
    }

    tick();
    setInterval(tick, 1200);
  </script>
</body>
</html>
