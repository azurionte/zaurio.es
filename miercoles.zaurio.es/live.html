<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Live — Miércoles</title>

<style>
  :root{
    --bg: rgba(36,0,70,.86);
    --stroke: rgba(255,255,255,.16);
    --yellow:#ffee00;
    --pink:#ff00aa;
    --glowP: rgba(255,0,170,.25);
    --glowY: rgba(255,238,0,.28);

    /* ====== NUEVO: control de ancho/alto de la tarjeta ====== */
    --cardMaxW: 780px;     /* ⬅️ más ancho, casi todo el overlay de 800 */
    --cardMaxH: 180px;     /* ⬅️ NO crecer más que esto (no cambia el alto total visual) */

    /* ====== NUEVO: tipografías auto-ajustables ====== */
    --labelSize: clamp(18px, 2.6vw, 30px);     /* consigna en borde, más grande */
    --msgSize:   clamp(18px, 2.3vw, 28px);     /* mensaje */
    --promptSize: clamp(24px, 3.4vw, 44px);    /* consigna grande (sin mensaje) */
  }

  html,body{
    margin:0;
    width:800px;
    height:400px;
    overflow:hidden;
    background:transparent;
    font-family:Arial,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    color:white;
  }

  .stage{
    width:800px;
    height:400px;
    padding:18px;
    box-sizing:border-box;
    display:flex;
    align-items:flex-end;
    justify-content:center;
  }

  .card{
    /* ⬅️ NUEVO: ensanchar sin tocar altura */
    width: min(100%, var(--cardMaxW));
    max-height: var(--cardMaxH);

    border-radius:26px;
    background: var(--bg);
    border: 1px solid var(--stroke);
    box-shadow: 0 0 28px var(--glowP), inset 0 0 0 1px rgba(255,255,255,.06);
    backdrop-filter: blur(10px);
    position:relative;

    padding:18px;
    box-sizing:border-box;
    transition:all .25s ease;
    animation: pop .35s ease both;

    /* para que nada “explote” en altura */
    overflow:hidden;
  }

  /* Label cuando hay mensaje mostrado */
  .label{
    position:absolute;
    top:-14px;
    left:20px;
    padding:8px 14px;
    border-radius:999px;
    background: rgba(0,0,0,.45);
    border: 1px solid rgba(255,238,0,.38);
    box-shadow: 0 0 18px var(--glowY);
    font-weight:900;

    /* ⬅️ NUEVO: auto-size para que se vea más grande */
    font-size: var(--labelSize);

    line-height:1;
    color: var(--yellow);
    text-shadow: 0 0 10px rgba(255,238,0,.25);
    max-width: calc(100% - 40px);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .msg{
    /* ⬅️ NUEVO: auto-size del mensaje */
    font-size: var(--msgSize);

    line-height:1.18;
    white-space:pre-wrap;
    word-break:break-word;
    margin:0;

    padding-top: 10px; /* deja aire debajo del label */

    /* ⬅️ NUEVO: no dejar que el texto se coma el alto */
    display:-webkit-box;
    -webkit-line-clamp: 5;     /* máximo 5 líneas en 800x400 se ve perfecto */
    -webkit-box-orient: vertical;
    overflow:hidden;

    text-shadow:
      0 3px 0 rgba(0,0,0,.65),
      0 0 16px rgba(0,0,0,.35);
  }

  /* ========= Prompt-only (sin mensaje) ========= */
  .promptOnly{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:16px;

    /* ⬅️ NUEVO: control alto interno sin crecer el overlay */
    min-height: 120px;

    padding:6px 10px;
    box-sizing:border-box;
  }

  /* Corona 3D a la izquierda */
  .crownWrap{
    width:74px;
    height:74px;
    flex:0 0 74px;
    display:grid;
    place-items:center;
    perspective: 900px;
    filter: drop-shadow(0 0 18px rgba(255,238,0,.18)) drop-shadow(0 0 18px rgba(255,0,170,.14));
  }

  .crown3d{
    width:64px;
    height:64px;
    transform-style: preserve-3d;
    animation: spin3d 2.6s linear infinite;
    will-change: transform;
  }

  .crown3d svg{
    width:64px;height:64px;display:block;
    filter: drop-shadow(0 0 10px rgba(255,238,0,.22));
  }

  /* Texto consigna grande */
  .promptOnlyText{
    font-weight:1000;

    /* ⬅️ NUEVO: auto-size grande, para que se lea mucho mejor */
    font-size: var(--promptSize);

    line-height:1.08;
    text-align:left;
    color:#fff;
    text-shadow:
      0 0 18px rgba(255,0,170,.22),
      0 0 12px rgba(255,238,0,.10);

    /* ⬅️ NUEVO: no dejar que rompa el alto */
    display:-webkit-box;
    -webkit-line-clamp: 3;     /* máximo 3 líneas */
    -webkit-box-orient: vertical;
    overflow:hidden;

    white-space:pre-wrap;
    word-break:break-word;
  }

  /* Heartbeat invisible (anti-freeze TikTok) */
  #heartbeat{
    position:absolute;
    width:1px;height:1px;
    opacity:0;
  }

  @keyframes pop{
    from{opacity:0;transform:translateY(10px) scale(.985)}
    to{opacity:1;transform:none}
  }

  @keyframes spin3d{
    0%   { transform: rotateX(16deg) rotateY(0deg)   rotateZ(-6deg); }
    50%  { transform: rotateX(16deg) rotateY(180deg) rotateZ(6deg);  }
    100% { transform: rotateX(16deg) rotateY(360deg) rotateZ(-6deg); }
  }
</style>
</head>

<body>
  <div class="stage">
    <div id="mount" style="width:100%; display:flex; justify-content:center;"></div>
  </div>

  <div id="heartbeat"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase.js"></script>

  <script>
    const mount = document.getElementById("mount");
    let lastState = "";

    function esc(s){
      return (s||"")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function render(html){
      mount.innerHTML = html;
    }

    function crownSVG(){
      return `
        <div class="crownWrap" aria-hidden="true">
          <div class="crown3d">
            <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0" stop-color="#fff6a0"/>
                  <stop offset="0.35" stop-color="#ffee00"/>
                  <stop offset="0.7" stop-color="#ffb300"/>
                  <stop offset="1" stop-color="#ff6bd6"/>
                </linearGradient>
                <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0" stop-color="rgba(255,255,255,.85)"/>
                  <stop offset="1" stop-color="rgba(255,255,255,0)"/>
                </linearGradient>
              </defs>

              <path d="M10 44c0 6 4 10 10 10h24c6 0 10-4 10-10v-4H10v4z"
                    fill="url(#gold)" opacity="0.95"/>
              <path d="M12 42h40" stroke="rgba(255,255,255,.28)" stroke-width="2" stroke-linecap="round"/>

              <path d="M10 40l8-18 14 14 14-14 8 18H10z"
                    fill="url(#gold)" opacity="0.95"/>

              <circle cx="18" cy="22" r="4" fill="#7ff0ff" opacity="0.95"/>
              <circle cx="32" cy="26" r="4.5" fill="#b7ff6a" opacity="0.95"/>
              <circle cx="46" cy="22" r="4" fill="#ff6bd6" opacity="0.95"/>

              <path d="M14 40l6-14 12 12 12-12 6 14H14z"
                    fill="url(#shine)" opacity="0.28"/>
              <path d="M14 44c0 4 2 6 6 6h24c4 0 6-2 6-6"
                    fill="url(#shine)" opacity="0.20"/>

              <path d="M10 40l8-18 14 14 14-14 8 18H10z"
                    fill="none" stroke="rgba(255,255,255,.18)" stroke-width="2" />
              <path d="M10 40h44" stroke="rgba(255,255,255,.14)" stroke-width="2" />
            </svg>
          </div>
        </div>
      `;
    }

    function renderPromptOnly(consigna){
      return `
        <div class="card">
          <div class="promptOnly">
            ${crownSVG()}
            <div class="promptOnlyText">${esc(consigna || "—")}</div>
          </div>
        </div>
      `;
    }

    function renderMessage(consigna, texto){
      return `
        <div class="card">
          <div class="label">${esc(consigna || "")}</div>
          <p class="msg">${esc(texto || "")}</p>
        </div>
      `;
    }

    function renderError(msg){
      return `
        <div class="card">
          <div style="
            padding:10px 12px;border-radius:14px;
            background:rgba(0,0,0,.35);
            border:1px solid rgba(255,255,255,.16);
            color:#ffee00;font-weight:900;white-space:pre-wrap;
          ">${esc(msg)}</div>
        </div>
      `;
    }

    async function tick(){
      try{
        const c = await supabaseClient
          .from("config")
          .select("consigna")
          .eq("id", 1)
          .maybeSingle();

        if (c.error){
          const key = "ERR:CONFIG:" + c.error.message;
          if (key !== lastState){
            lastState = key;
            render(renderError("CONFIG ERROR:\n" + c.error.message));
          }
          return;
        }
        const consigna = c.data?.consigna || "";

        const m = await supabaseClient
          .from("mensajes")
          .select("id,texto,creado")
          .eq("estado","mostrado")
          .order("creado",{ascending:false})
          .limit(1);

        if (m.error){
          const key = "ERR:MSG:" + m.error.message;
          if (key !== lastState){
            lastState = key;
            render(renderError("MENSAJES ERROR:\n" + m.error.message));
          }
          return;
        }

        const hasShown = m.data && m.data.length > 0;

        if (!hasShown){
          const key = "PROMPT_ONLY:" + consigna;
          if (key !== lastState){
            lastState = key;
            render(renderPromptOnly(consigna));
          }
          return;
        }

        const msg = m.data[0];
        const key = "MSG:" + msg.id + ":" + consigna;
        if (key !== lastState){
          lastState = key;
          render(renderMessage(consigna, msg.texto));
        }

      } catch(e){
        const key = "ERR:JS:" + (e?.message || e);
        if (key !== lastState){
          lastState = key;
          render(renderError("JS ERROR:\n" + (e?.message || e)));
        }
      }
    }

    tick();
    setInterval(tick, 1000);
    setInterval(()=>{ document.getElementById("heartbeat").textContent = Date.now(); }, 500);
  </script>
</body>
</html>
