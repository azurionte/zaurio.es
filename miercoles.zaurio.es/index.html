<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Miércoles de Dramas — Zaurio</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/shared/assets/brand/favicon-32x32.png">
  <link rel="stylesheet" href="/shared/css/zaurio-ui.css">

<style>
  :root{
    --bg1:#1a002a;
    --bg2:#000;
    --card: rgba(36,0,70,.82);
    --stroke: rgba(255,255,255,.14);
    --stroke2: rgba(255,255,255,.16);
    --yellow:#ffee00;
    --pink:#ff00aa;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    min-height:100%;
    background: radial-gradient(circle at 30% 10%, #2a0046, var(--bg2));
    color:#fff;
    font-family: Arial, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }

  .wrap{
    width: min(720px, 92vw);
    margin: 18px auto 30px;
    padding-bottom: 26px;
  }

  .topMenu{
    position:sticky;
    top:10px;
    z-index:50;
    display:grid;
    grid-template-columns: 1fr auto 1fr;
    align-items:center;
    margin-bottom:18px;
    padding:12px 16px;
    border-radius:999px;
    background:rgba(32,8,56,.78);
    border:1px solid rgba(255,255,255,.10);
    box-shadow:0 0 24px rgba(255,0,170,.08);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .menuLeft{
    display:flex;
    justify-content:flex-start;
    align-items:center;
    min-width:0;
  }

  .menuCenter{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:22px;
    min-width:0;
  }

  .menuRight{
    display:flex;
    justify-content:flex-end;
    align-items:center;
    min-width:0;
  }

  .menuLogoLink{
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    transition:transform .16s ease, filter .16s ease, opacity .16s ease;
    transform-origin:center center;
    opacity:.75;
    filter: grayscale(1) brightness(.72);
  }

  .menuLogoLink:hover{
    transform:translateY(-2px) scale(1.04);
    opacity:1;
    filter: grayscale(0) brightness(1);
  }

  .menuLogoLink.active{
    opacity:1;
    filter: grayscale(0) brightness(1);
  }

  .menuLogoLink.active .menuLogo{
    filter: drop-shadow(0 0 18px rgba(255,0,170,.16));
  }

  .menuLogo{
    display:block;
    height:auto;
    width:auto;
    object-fit:contain;
  }

  .menuLogo.zaurio{
    max-height:52px;
    border-radius:10px;
  }

  .menuLogo.miercoles{
    max-height:50px;
  }

  .menuLogo.confesion{
    max-height:54px;
  }

  .composeBtn{
    border:none;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    min-width:48px;
    height:48px;
    padding:0 15px;
    border-radius:999px;
    background:rgba(255,238,0,.14);
    border:1px solid rgba(255,238,0,.26);
    color:#fff;
    box-shadow:0 0 18px rgba(255,238,0,.10);
    transition:transform .14s ease, opacity .14s ease, background .14s ease;
    opacity:0;
    pointer-events:none;
  }

  .composeBtn.show{
    opacity:1;
    pointer-events:auto;
  }

  .composeBtn:active{ transform:scale(.96); }

  .composeBtn svg{
    width:18px;
    height:18px;
    display:block;
  }

  .card{
    background: var(--card);
    border: 1px solid var(--stroke);
    border-radius: 26px;
    box-shadow: 0 0 45px rgba(255,0,170,.20);
    overflow: hidden;
  }

  .header{
    padding: 18px 18px 10px;
    border-bottom: 1px solid rgba(255,255,255,.08);
    display:flex;
    flex-direction:column;
    gap:10px;
    text-align:center;
  }

  .logo{
    width: 100%;
    max-width: 360px;
    height: auto;
    display:block;
    margin:0 auto;
    filter: drop-shadow(0 0 18px rgba(255,0,170,.18));
  }

  .sub{
    margin:0;
    opacity:.88;
    font-size: 16px;
    line-height: 1.25;
  }

  .body{
    padding: 16px 18px 18px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  textarea{
    width: 100%;
    max-width: 100%;
    min-height: 170px;
    resize: none;
    padding: 14px 14px;
    border-radius: 18px;
    border: 1px solid var(--stroke2);
    background: rgba(0,0,0,.20);
    color:#fff;
    font-size: 18px;
    outline: none;
    display:block;
  }

  textarea::placeholder{ color: rgba(255,255,255,.45); }

  .row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
  }

  .counter{
    opacity:.75;
    font-size: 13px;
  }

  .btn{
    border:none;
    cursor:pointer;
    padding: 12px 18px;
    border-radius: 999px;
    font-weight: 1000;
    transition: transform .12s ease, filter .12s ease, opacity .12s ease;
    user-select:none;
    white-space:nowrap;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    justify-content:center;
  }

  .btn:active{ transform: scale(.98); }

  .btnPrimary{
    background: var(--yellow);
    color: #1a002a;
    box-shadow: 0 0 18px rgba(255,238,0,.25);
  }

  .btnGhost{
    background: rgba(255,255,255,.10);
    color:#fff;
    border: 1px solid rgba(255,255,255,.16);
  }

  #status{
    font-weight: 1000;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 22px;
    padding: 10px 12px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,.14);
    background: rgba(0,0,0,.20);
    box-shadow: 0 0 22px rgba(255,0,170,.10);
    transform-origin: left center;
  }

  #status:empty{
    padding:0;
    border:none;
    background:transparent;
    box-shadow:none;
    min-height:0;
  }

  #status[data-tone="ok"]{
    color: #ffffff;
    border-color: rgba(255,238,0,.28);
    box-shadow: 0 0 26px rgba(255,238,0,.12), 0 0 26px rgba(255,0,170,.12);
  }

  #status[data-tone="warn"]{
    color: var(--yellow);
  }

  #status[data-tone="error"]{
    color: #ffb3e6;
    border-color: rgba(255,0,170,.28);
    box-shadow: 0 0 26px rgba(255,0,170,.18);
  }

  #status.pop{
    animation: pop .34s ease both;
  }

  @keyframes pop{
    0%{ opacity:.2; transform: translateY(6px) scale(.98); filter: blur(.2px); }
    55%{ opacity:1; transform: translateY(0) scale(1.02); }
    100%{ opacity:1; transform: none; }
  }

  .footerActions{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    flex-wrap:wrap;
  }

  @media (max-width: 420px){
    .wrap{ width: 92vw; margin: 12px auto; }

    .topMenu{
      grid-template-columns: auto 1fr auto;
      gap:10px;
      padding:12px 10px;
    }

    .menuCenter{
      gap:14px;
    }

    .menuLogo.zaurio{ max-height:42px; }
    .menuLogo.miercoles{ max-height:42px; }
    .menuLogo.confesion{ max-height:46px; }

    textarea{ font-size: 17px; min-height: 160px; }
    .logo{ max-width: 320px; }
    .footerActions{ justify-content:space-between; }
  }
</style>
</head>

<body data-zaurio-nav="miercoles" data-zaurio-cta-id="composeBtn" data-zaurio-cta-title="Escribir">
  <div class="wrap">

    <div class="topMenu">
      <div class="menuLeft">
        <a class="menuLogoLink" href="https://zaurio.es" aria-label="Zaurio">
          <img class="menuLogo zaurio" src="/shared/assets/brand/favicon-32x32.png" alt="Zaurio">
        </a>
      </div>

      <div class="menuCenter">
        <a class="menuLogoLink active" href="https://miercoles.zaurio.es" aria-label="Miércoles">
          <img class="menuLogo miercoles" src="/shared/assets/brand/miercoles.png" alt="Miércoles">
        </a>

        <a class="menuLogoLink" href="https://secretos.zaurio.es" aria-label="El Confesionario">
          <img class="menuLogo confesion" src="/shared/assets/brand/confesion.png" alt="El Confesionario">
        </a>
      </div>

      <div class="menuRight">
        <button id="composeBtn" class="composeBtn" aria-label="Escribir" title="Escribir">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 20h9"/>
            <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="card" id="composerCard">
      <div class="header">
        <img class="logo" src="/shared/assets/brand/logo-miercoles.png" alt="Miércoles de Dramas y Chismes con Zaurio">
        <p class="sub">Envía tu pregunta / drama / chisme (anónimo). Máx. 350 caracteres.</p>
      </div>

      <div class="body">
        <textarea id="mensaje" maxlength="350" placeholder="Escribe aquí…"></textarea>

        <div class="row">
          <div class="counter"><span id="count">0</span>/350</div>

          <div class="footerActions">
            <a class="btn btnGhost" href="https://www.tiktok.com/@zaurioking" target="_blank" rel="noopener noreferrer">
              Volver al TikTok de Zaurio
            </a>
            <button id="enviar" class="btn btnPrimary">Enviar</button>
          </div>
        </div>

        <div id="status"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/shared/js/zaurio-nav.js"></script>
  <script src="./supabase.js"></script>
  <script src="./app.js"></script>
  <script>
    const composeBtn = document.getElementById("composeBtn");
    const composerCard = document.getElementById("composerCard");

    composeBtn.addEventListener("click", ()=>{
      composerCard.scrollIntoView({ behavior:"smooth", block:"start" });
    });

    window.addEventListener("scroll", ()=>{
      if (window.scrollY > 180) composeBtn.classList.add("show");
      else composeBtn.classList.remove("show");
    });
  </script>
</body>
</html>
