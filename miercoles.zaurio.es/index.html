<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Miércoles de Dramas — Zaurio</title>

  <!-- FAVICON (pondrás tus archivos en /assets) -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png">

  <style>
    :root{
      --bg1:#1a002a;
      --bg2:#000;
      --card: rgba(36,0,70,.82);
      --stroke: rgba(255,255,255,.14);
      --stroke2: rgba(255,255,255,.16);
      --yellow:#ffee00;
      --pink:#ff00aa;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      background: radial-gradient(circle at 30% 10%, #2a0046, var(--bg2));
      color:#fff;
      font-family: Arial, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    .wrap{
      width: min(720px, 92vw);
      margin: 34px auto;
      padding-bottom: 26px;
    }

    .card{
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: 26px;
      box-shadow: 0 0 45px rgba(255,0,170,.20);
      overflow: hidden;
    }

    .header{
      padding: 18px 18px 10px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .brandRow{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .logo{
      width: 100%;
      max-width: 360px;
      height: auto;
      display:block;
      filter: drop-shadow(0 0 18px rgba(255,0,170,.18));
    }

    .title{
      margin:0;
      font-size: 34px;
      line-height: 1.05;
      font-weight: 1000;
      letter-spacing: .2px;
    }

    .sub{
      margin:0;
      opacity:.88;
      font-size: 16px;
      line-height: 1.25;
    }

    .body{
      padding: 16px 18px 18px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    textarea{
      width: 100%;
      max-width: 100%;
      min-height: 170px;
      resize: none;

      padding: 14px 14px;
      border-radius: 18px;
      border: 1px solid var(--stroke2);
      background: rgba(0,0,0,.20);
      color:#fff;
      font-size: 18px;
      outline: none;

      /* esto evita “salirse” en móvil */
      display:block;
    }

    textarea::placeholder{ color: rgba(255,255,255,.45); }

    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .counter{
      opacity:.75;
      font-size: 13px;
    }

    .btn{
      border:none;
      cursor:pointer;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: 1000;
      transition: transform .12s ease, filter .12s ease, opacity .12s ease;
      user-select:none;
      white-space:nowrap;
    }
    .btn:active{ transform: scale(.98); }

    .btnPrimary{
      background: var(--yellow);
      color: #1a002a;
      box-shadow: 0 0 18px rgba(255,238,0,.25);
    }

    .btnGhost{
      background: rgba(255,255,255,.10);
      color:#fff;
      border: 1px solid rgba(255,255,255,.16);
    }

    #status{
      font-weight: 900;
      color: var(--yellow);
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 20px;
    }

    .footerActions{
      display:flex;
      justify-content:flex-end;
      gap:10px;
      flex-wrap:wrap;
    }

    /* móvil */
    @media (max-width: 420px){
      .wrap{ width: 92vw; margin: 18px auto; }
      .title{ font-size: 30px; }
      textarea{ font-size: 17px; min-height: 160px; }
      .logo{ max-width: 320px; }
      .footerActions{ justify-content:space-between; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">

      <div class="header">
        <!-- LOGO (pondrás la imagen en /assets) -->
        <img class="logo" src="./assets/logo-miercoles.png" alt="Miércoles de Dramas y Chismes con Zaurio">

        <p class="sub">Envía tu pregunta / drama / chisme (anónimo). Máx. 350 caracteres.</p>
      </div>

      <div class="body">
        <textarea id="mensaje" maxlength="350" placeholder="Escribe aquí…"></textarea>

        <div class="row">
          <div class="counter"><span id="count">0</span>/350</div>

          <div class="footerActions">
            <a class="btn btnGhost" href="https://www.tiktok.com/@zaurioking" target="_blank" rel="noopener noreferrer">
              Volver al TikTok de Zaurio
            </a>
            <button id="enviar" class="btn btnPrimary">Enviar</button>
          </div>
        </div>

        <div id="status"></div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase.js"></script>
  <script src="./app.js"></script>
</body>
</html>
