<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Live — El Confesionario</title>

  <style>
    :root{
      --bg: rgba(36,0,70,.86);
      --stroke: rgba(255,255,255,.16);
      --yellow:#ffee00;
      --pink:#ff00aa;
      --cyan:#2fd3ff;
      --green:#79d85d;
      --magenta:#ff4fc9;
      --glowP: rgba(255,0,170,.25);
      --glowY: rgba(255,238,0,.22);

      --maleA: rgba(47,211,255,.14);
      --maleB: rgba(47,211,255,.05);

      --femaleA: rgba(255,107,214,.24);
      --femaleB: rgba(255,0,170,.10);

      --freeA: rgba(121,216,93,.18);
      --freeB: rgba(121,216,93,.08);
    }

    html,body{
      margin:0;
      width:800px;
      height:400px;
      overflow:hidden;
      background:transparent;
      font-family:Arial,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      color:white;
    }

    .stage{
      width:800px;
      height:400px;
      padding:18px;
      box-sizing:border-box;
      display:flex;
      align-items:flex-end;
      justify-content:center;
    }

    .card{
      width:100%;
      max-width:100%;
      min-height:170px;
      border-radius:26px;
      background: var(--bg);
      border: 1px solid var(--stroke);
      box-shadow: 0 0 28px var(--glowP), inset 0 0 0 1px rgba(255,255,255,.06);
      backdrop-filter: blur(10px);
      position:relative;
      padding:18px;
      box-sizing:border-box;
      transition:all .25s ease;
      animation: pop .35s ease both;
      overflow:hidden;
    }

    .card.male{
      border-color:rgba(47,211,255,.34);
      background:
        linear-gradient(180deg, var(--maleA), var(--maleB)),
        var(--bg);
      box-shadow:
        0 0 26px rgba(47,211,255,.10),
        0 0 28px var(--glowP),
        inset 0 0 0 1px rgba(47,211,255,.10);
    }

    .card.female{
      border-color:rgba(255,107,214,.46);
      background:
        linear-gradient(180deg, var(--femaleA), var(--femaleB)),
        var(--bg);
      box-shadow:
        0 0 26px rgba(255,107,214,.12),
        0 0 28px var(--glowP),
        inset 0 0 0 1px rgba(255,107,214,.10);
    }

    .card.free{
      border-color:rgba(121,216,93,.36);
      background:
        linear-gradient(180deg, var(--freeA), var(--freeB)),
        var(--bg);
      box-shadow:
        0 0 26px rgba(121,216,93,.10),
        0 0 28px var(--glowP),
        inset 0 0 0 1px rgba(121,216,93,.10);
    }

    .sourceLabel{
      position:absolute;
      top:-14px;
      left:20px;
      padding:8px 14px;
      border-radius:999px;
      background: rgba(0,0,0,.50);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 0 18px var(--glowY);
      font-weight:900;
      font-size:18px;
      line-height:1;
      color: var(--yellow);
      text-shadow: 0 0 10px rgba(255,238,0,.20);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width: calc(100% - 40px);
    }

    .sourceLabel.centered{
      left:50%;
      transform:translateX(-50%);
      text-align:center;
    }

    .meta{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      font-size:15px;
      font-weight:900;
      opacity:.95;
      margin-bottom:12px;
      padding-top:2px;
    }

    .identityChip{
      width:14px;
      height:14px;
      border-radius:999px;
      display:inline-block;
      box-shadow:0 0 0 2px rgba(255,255,255,.12);
      flex:0 0 14px;
    }

    .identityChip.male{ background:var(--cyan); }
    .identityChip.female{ background:var(--magenta); }
    .identityChip.free{ background:var(--green); }

    .textWrap{
      width:100%;
      height:260px;
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
      overflow:hidden;
    }

    .text{
      line-height:1.16;
      white-space:pre-wrap;
      word-break:break-word;
      margin:0;
      width:100%;
      overflow:hidden;
    }

    .emptyWrap{
      min-height:190px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:30px;
      font-weight:1000;
      color:#fff;
      text-shadow:
        0 0 18px rgba(255,0,170,.22),
        0 0 12px rgba(255,238,0,.10);
    }

    #heartbeat{
      position:absolute;
      width:1px;
      height:1px;
      opacity:0;
    }

    @keyframes pop{
      from{opacity:0;transform:translateY(10px) scale(.985)}
      to{opacity:1;transform:none}
    }
  </style>
</head>

<body>
  <div class="stage">
    <div id="mount" style="width:100%;"></div>
  </div>

  <div id="heartbeat"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase.js"></script>

  <script>
    const mount = document.getElementById("mount");
    let lastState = "";

    function esc(s){
      return (s||"")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function generoClass(g){
      if (g === "hombre") return "male";
      if (g === "mujer") return "female";
      return "free";
    }

    function render(html){
      mount.innerHTML = html;
      fitSecretText();
    }

    function renderEmpty(){
      return `
        <div class="card">
          <div class="sourceLabel centered">secretos.zaurio.es</div>
          <div class="emptyWrap">Ninguna confesión en live</div>
        </div>
      `;
    }

    function renderSecret(s){
      const g = generoClass(s.genero);
      return `
        <div class="card ${g}">
          <div class="sourceLabel">secretos.zaurio.es</div>

          <div class="meta">
            <span>#${esc(String(s.numero_secreto ?? "—"))}</span>
            <span class="identityChip ${g}"></span>
            <span>${esc(String(s.edad ?? ""))} años</span>
          </div>

          <div class="textWrap">
            <p id="secretText" class="text">${esc(s.texto || "")}</p>
          </div>
        </div>
      `;
    }

    function renderError(msg){
      return `
        <div class="card">
          <div class="sourceLabel centered">secretos.zaurio.es</div>
          <div style="
            padding:10px 12px;border-radius:14px;
            background:rgba(0,0,0,.35);
            border:1px solid rgba(255,255,255,.16);
            color:#ffee00;font-weight:900;white-space:pre-wrap;
          ">${esc(msg)}</div>
        </div>
      `;
    }

    function fitSecretText(){
      const el = document.getElementById("secretText");
      if (!el) return;

      let size = 30;
      el.style.fontSize = size + "px";

      while (size > 16 && el.scrollHeight > el.clientHeight + 2){
        size -= 1;
        el.style.fontSize = size + "px";
      }
    }

    async function tick(){
      try{
        const q = await supabaseClient
          .from("secretos")
          .select("id,numero_secreto,genero,edad,texto,show_live,live_updated_at")
          .eq("estado", "aprobado")
          .eq("show_live", true)
          .order("live_updated_at", { ascending:false })
          .limit(1);

        if (q.error){
          const key = "ERR:" + q.error.message;
          if (key !== lastState){
            lastState = key;
            render(renderError("LIVE ERROR:\n" + q.error.message));
          }
          return;
        }

        const data = q.data || [];
        if (!data.length){
          const key = "EMPTY";
          if (key !== lastState){
            lastState = key;
            render(renderEmpty());
          }
          return;
        }

        const s = data[0];
        const key = "LIVE:" + s.id + ":" + (s.live_updated_at || "");
        if (key !== lastState){
          lastState = key;
          render(renderSecret(s));
        } else {
          fitSecretText();
        }

      } catch(e){
        const key = "JS:" + (e?.message || e);
        if (key !== lastState){
          lastState = key;
          render(renderError("JS ERROR:\n" + (e?.message || e)));
        }
      }
    }

    tick();
    setInterval(tick, 1000);
    setInterval(()=>{ document.getElementById("heartbeat").textContent = Date.now(); }, 500);
    window.addEventListener("resize", fitSecretText);
  </script>
</body>
</html>
