<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>El Confesionario</title>
  <link rel="icon" href="https://miercoles.zaurio.es/assets/favicon-32x32.png">

  <style>
    :root{
      --card: rgba(36,0,70,.82);
      --stroke: rgba(255,255,255,.14);
      --yellow:#ffee00;
      --pink:#ff00aa;
      --cyan:#2fd3ff;
      --green:#79d85d;

      --maleA: rgba(47,211,255,.14);
      --maleB: rgba(47,211,255,.05);

      --femaleA: rgba(255,107,214,.24);
      --femaleB: rgba(255,0,170,.10);

      --freeA: rgba(121,216,93,.18);
      --freeB: rgba(121,216,93,.08);

      --text:#fff;
      --muted:rgba(255,255,255,.78);
      --glass: rgba(0,0,0,.22);
      --blurBg: rgba(8,4,16,.55);
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      min-height:100%;
      background:
        radial-gradient(circle at top, #2a0046 0%, #12001d 35%, #000 100%);
      color:var(--text);
      font-family:Arial,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    }

    body.modal-open{
      overflow:hidden;
    }

    .wrap{
      width:min(1180px,94vw);
      margin:18px auto 40px;
    }

    /* =========================
       TOP MENU
    ========================= */
    .topMenu{
      position:sticky;
      top:10px;
      z-index:50;

      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;
      flex-wrap:wrap;

      margin-bottom:18px;
      padding:12px 16px;

      border-radius:999px;
      background:rgba(32,8,56,.78);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 0 24px rgba(255,0,170,.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .menuLogoLink{
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      transition:transform .16s ease, filter .16s ease, opacity .16s ease;
      transform-origin:center center;
      opacity:.75;
      filter: grayscale(1) brightness(.72);
    }

    .menuLogoLink:hover{
      transform:translateY(-2px) scale(1.04);
      opacity:1;
      filter: grayscale(0) brightness(1);
    }

    .menuLogoLink.active{
      opacity:1;
      filter: grayscale(0) brightness(1);
    }

    .menuLogoLink.active .menuLogo{
      filter: drop-shadow(0 0 18px rgba(255,0,170,.16));
    }

    .menuLogo{
      display:block;
      height:auto;
      width:auto;
      object-fit:contain;
    }

    .menuLogo.zaurio{
      max-height:46px;
      border-radius:10px;
    }

    .menuLogo.miercoles{
      max-height:58px;
    }

    .menuLogo.confesionario{
      max-height:64px;
    }

    .composeBtn{
      border:none;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-width:48px;
      height:48px;
      padding:0 16px;
      border-radius:999px;
      background:rgba(255,238,0,.14);
      border:1px solid rgba(255,238,0,.26);
      color:#fff;
      font-weight:1000;
      box-shadow:0 0 18px rgba(255,238,0,.10);
      transition:transform .14s ease, opacity .14s ease, background .14s ease;
      opacity:0;
      pointer-events:none;
    }

    .composeBtn.show{
      opacity:1;
      pointer-events:auto;
    }

    .composeBtn:active{
      transform:scale(.96);
    }

    .composeBtn svg{
      width:18px;
      height:18px;
      display:block;
    }

    /* =========================
       HEADER OUTSIDE COMPOSER
    ========================= */
    .pageIntro{
      text-align:center;
      margin-bottom:14px;
    }

    .logo{
      width:min(320px,72%);
      height:auto;
      display:block;
      margin:0 auto 10px;
      filter:drop-shadow(0 0 18px rgba(255,0,170,.18));
    }

    .sub{
      margin:0 auto;
      max-width:760px;
      opacity:.92;
      font-size:18px;
      line-height:1.32;
    }

    /* =========================
       COMPOSER
    ========================= */
    .composer{
      background:var(--card);
      border:1px solid var(--stroke);
      border-radius:26px;
      box-shadow:0 0 45px rgba(255,0,170,.20);
      overflow:hidden;
      margin-bottom:18px;
      scroll-margin-top:86px;
    }

    .composerBody{
      padding:16px 18px 18px;
      display:grid;
      grid-template-columns: minmax(340px, 1fr) 180px;
      gap:12px;
      align-items:end;
    }

    .fieldLabel{
      font-size:13px;
      opacity:.82;
      margin-bottom:6px;
      font-weight:700;
    }

    .fieldGroup{
      display:flex;
      flex-direction:column;
    }

    /* switch triple */
    .switchRow{
      display:flex;
      gap:12px;
      align-items:end;
      flex-wrap:wrap;
    }

    .identityBlock{
      flex:1;
      min-width:280px;
    }

    .ageBlock{
      width:180px;
      min-width:180px;
    }

    .switchWrap{
      position:relative;
      width:100%;
      max-width:430px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      border-radius:999px;
      padding:6px;
      overflow:hidden;
    }

    .switchTrack{
      position:relative;
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      align-items:center;
      min-height:52px;
    }

    .switchThumb{
      position:absolute;
      top:4px;
      left:4px;
      width:calc((100% - 8px) / 3);
      height:calc(100% - 8px);
      border-radius:999px;
      transition:transform .22s ease, background .22s ease, box-shadow .22s ease;
      box-shadow:0 0 16px rgba(255,255,255,.06);
      z-index:1;
    }

    .switchThumb.hombre{
      background:rgba(47,211,255,.18);
      box-shadow:0 0 18px rgba(47,211,255,.12);
      transform:translateX(0);
    }

    .switchThumb.libre{
      background:rgba(121,216,93,.18);
      box-shadow:0 0 18px rgba(121,216,93,.10);
      transform:translateX(100%);
    }

    .switchThumb.mujer{
      background:rgba(255,107,214,.20);
      box-shadow:0 0 18px rgba(255,107,214,.12);
      transform:translateX(200%);
    }

    .switchOption{
      position:relative;
      z-index:2;
      border:none;
      background:transparent;
      color:#fff;
      font-weight:1000;
      font-size:15px;
      cursor:pointer;
      padding:0 8px;
      height:52px;
      transition:transform .12s ease, opacity .12s ease;
      opacity:.86;
    }

    .switchOption:active{
      transform:scale(.98);
    }

    .switchOption.active{
      opacity:1;
    }

    input, textarea, select{
      width:100%;
      background:var(--glass);
      color:#fff;
      border:1px solid rgba(255,255,255,.16);
      border-radius:18px;
      padding:13px 14px;
      font-size:16px;
      outline:none;
    }

    textarea{
      min-height:96px;
      resize:vertical;
    }

    .full{
      grid-column:1 / -1;
    }

    .actions{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      cursor:pointer;
      padding:12px 18px;
      border-radius:999px;
      font-weight:1000;
      transition:transform .12s ease,opacity .12s ease, box-shadow .12s ease, background .12s ease;
    }

    .btn:active{
      transform:scale(.98);
    }

    .btnPrimary{
      background:var(--yellow);
      color:#1a002a;
      box-shadow:0 0 18px rgba(255,238,0,.25);
    }

    .status{
      font-weight:1000;
      min-height:22px;
      white-space:pre-wrap;
    }

    /* =========================
       FEED
    ========================= */
    .feedWrap{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .featured{
      background:linear-gradient(135deg, rgba(255,238,0,.08), rgba(255,0,170,.10));
      border:1px solid rgba(255,238,0,.18);
      border-radius:24px;
      box-shadow:0 0 35px rgba(255,238,0,.08), 0 0 28px rgba(255,0,170,.10);
      overflow:hidden;
    }

    .featuredHead{
      padding:14px 16px;
      font-weight:1000;
      border-bottom:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
    }

    .featuredBody{
      padding:14px;
    }

    .feedTop{
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
    }

    .filters{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .filters select{
      width:auto;
      min-width:180px;
      border-radius:999px;
      padding:11px 14px;
    }

    .boards{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:16px;
    }

    .board{
      background:var(--card);
      border:1px solid var(--stroke);
      border-radius:24px;
      box-shadow:0 0 35px rgba(255,0,170,.16);
      overflow:hidden;
    }

    .boardHead{
      padding:14px 16px;
      font-weight:1000;
      border-bottom:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
    }

    .boardBody{
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    /* =========================
       SECRET CARD
    ========================= */
    .secret{
      border-radius:18px;
      background:rgba(0,0,0,.22);
      border:1px solid rgba(255,255,255,.10);
      padding:14px;
      box-shadow:0 0 18px rgba(255,0,170,.08);
      position:relative;
    }

    .secret.male{
      border-color:rgba(47,211,255,.34);
      background:
        linear-gradient(180deg, var(--maleA), var(--maleB)),
        rgba(0,0,0,.22);
      box-shadow:
        0 0 18px rgba(47,211,255,.09),
        inset 0 0 0 1px rgba(47,211,255,.12);
    }

    .secret.female{
      border-color:rgba(255,107,214,.48);
      background:
        linear-gradient(180deg, var(--femaleA), var(--femaleB)),
        rgba(0,0,0,.22);
      box-shadow:
        0 0 24px rgba(255,107,214,.16),
        inset 0 0 0 1px rgba(255,107,214,.16);
    }

    .secret.free{
      border-color:rgba(121,216,93,.34);
      background:
        linear-gradient(180deg, var(--freeA), var(--freeB)),
        rgba(0,0,0,.22);
      box-shadow:
        0 0 18px rgba(121,216,93,.10),
        inset 0 0 0 1px rgba(121,216,93,.12);
    }

    .secretMeta{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      font-size:12px;
      opacity:.86;
      margin-bottom:10px;
      font-weight:700;
    }

    .secretText{
      white-space:pre-wrap;
      word-break:break-word;
      line-height:1.35;
      font-size:15px;
      margin-bottom:12px;
    }

    .reactionBar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:6px;
    }

    .reactionBtn{
      border:none;
      cursor:pointer;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      color:#fff;
      display:inline-flex;
      align-items:center;
      gap:9px;
      padding:9px 13px;
      font-weight:1000;
      transition:transform .12s ease, box-shadow .12s ease, background .12s ease, border-color .12s ease;
    }

    .reactionBtn:hover{
      box-shadow:0 0 16px rgba(255,255,255,.06);
    }

    .reactionBtn:active{
      transform:scale(.94);
    }

    .reactionBtn.bump{
      animation:bump .24s ease;
    }

    .reactionIcon{
      width:22px;
      height:22px;
      object-fit:contain;
      display:block;
      flex:0 0 22px;
    }

    .reactionBtn.voted{
      background:rgba(255,238,0,.12);
      border-color:rgba(255,238,0,.22);
      box-shadow:0 0 14px rgba(255,238,0,.10);
    }

    .shareBtn{
      border:none;
      cursor:pointer;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      color:#fff;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      font-weight:1000;
      transition:transform .12s ease, box-shadow .12s ease, background .12s ease;
    }

    .shareBtn:hover{
      box-shadow:0 0 16px rgba(255,255,255,.05);
    }

    .shareBtn:active{
      transform:scale(.96);
    }

    .shareBtn.ok{
      box-shadow:0 0 14px rgba(255,238,0,.12);
      border-color:rgba(255,238,0,.25);
      background:rgba(255,238,0,.10);
    }

    .footerRow{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .empty{
      opacity:.72;
      font-weight:700;
      padding:8px 2px;
    }

    /* =========================
       MODAL PERMALINK
    ========================= */
    .modalOverlay{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding:24px;
      background:var(--blurBg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index:999;
    }

    .modalOverlay.on{
      display:flex;
    }

    .modalCard{
      width:min(860px, 92vw);
      max-height:85vh;
      overflow:auto;
      border-radius:24px;
      background:rgba(20,10,34,.95);
      border:1px solid rgba(255,255,255,.14);
      box-shadow:0 0 42px rgba(255,0,170,.22);
      padding:16px;
      position:relative;
    }

    .modalClose{
      position:absolute;
      top:12px;
      right:12px;
      border:none;
      cursor:pointer;
      border-radius:999px;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.16);
      color:#fff;
      padding:8px 12px;
      font-weight:1000;
    }

    @keyframes bump{
      0%{transform:scale(1)}
      40%{transform:scale(1.12)}
      100%{transform:scale(1)}
    }

    @media (max-width: 980px){
      .boards{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 860px){
      .wrap{
        width:min(96vw, 1180px);
        margin:12px auto 28px;
      }

      .topMenu{
        gap:16px;
        padding:12px 10px;
      }

      .menuLogo.confesionario{
        max-height:54px;
      }

      .menuLogo.miercoles{
        max-height:48px;
      }

      .menuLogo.zaurio{
        max-height:38px;
      }

      .composeBtn{
        min-width:46px;
        height:46px;
        padding:0 14px;
      }

      .logo{
        width:min(260px,66%);
      }

      .sub{
        font-size:16px;
      }

      .composerBody{
        grid-template-columns:1fr;
        gap:10px;
        padding:14px 16px 16px;
      }

      .switchRow{
        flex-direction:column;
        align-items:stretch;
      }

      .identityBlock,
      .ageBlock{
        width:100%;
        min-width:0;
      }

      textarea{
        min-height:96px;
      }

      .reactionBar{
        width:100%;
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:10px;
      }

      .reactionBtn{
        width:100%;
        justify-content:center;
        padding:11px 14px;
      }

      .reactionIcon{
        width:26px;
        height:26px;
        flex:0 0 26px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="topMenu">
      <a class="menuLogoLink" href="https://zaurio.es" aria-label="Zaurio">
        <img class="menuLogo zaurio" src="https://miercoles.zaurio.es/assets/favicon-32x32.png" alt="Zaurio">
      </a>

      <a class="menuLogoLink" href="https://miercoles.zaurio.es" aria-label="Miércoles de dramas">
        <img class="menuLogo miercoles" src="https://miercoles.zaurio.es/assets/logo-miercoles.png" alt="Miércoles de dramas y chismes">
      </a>

      <a class="menuLogoLink active" href="https://secretos.zaurio.es" aria-label="El Confesionario">
        <img class="menuLogo confesionario" src="https://miercoles.zaurio.es/assets/confesionario.png" alt="El Confesionario">
      </a>

      <button id="composeBtn" class="composeBtn" aria-label="Escribir confesión" title="Escribir confesión">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
        </svg>
      </button>
    </div>

    <section class="pageIntro">
      <img class="logo" src="https://miercoles.zaurio.es/assets/confesionario.png" alt="El Confesionario">
      <p class="sub">Confiesa de forma anónima. Tú envías. Zaurio decide si se publica.</p>
    </section>

    <section class="composer" id="composer">
      <div class="composerBody">
        <div class="fieldGroup full switchRow">
          <div class="identityBlock">
            <div class="fieldLabel">Identidad</div>
            <div class="switchWrap">
              <div id="switchThumb" class="switchThumb hombre"></div>
              <div class="switchTrack">
                <button id="btnHombre" class="switchOption active" type="button">♂ Hombre</button>
                <button id="btnLibre" class="switchOption" type="button">◌ Libre</button>
                <button id="btnMujer" class="switchOption" type="button">♀ Mujer</button>
              </div>
            </div>
          </div>

          <div class="ageBlock">
            <div class="fieldLabel">Edad</div>
            <input id="edad" type="number" min="18" max="99" placeholder="18 - 99" />
          </div>
        </div>

        <div class="fieldGroup full">
          <div class="fieldLabel">Tu confesión</div>
          <textarea id="texto" maxlength="700" placeholder="Cuenta tu secreto aquí..."></textarea>
        </div>

        <div class="fieldGroup full">
          <div class="actions">
            <div id="status" class="status"></div>
            <button id="btnEnviar" class="btn btnPrimary">Enviar confesión</button>
          </div>
        </div>
      </div>
    </section>

    <section class="feedWrap">
      <section class="featured" id="featuredBox" style="display:none;">
        <div class="featuredHead">🔥 Más reaccionado</div>
        <div class="featuredBody" id="featuredBody"></div>
      </section>

      <div class="feedTop">
        <h2 style="margin:0;font-size:26px;">Confesiones publicadas</h2>
        <div class="filters">
          <select id="sortSelect">
            <option value="new">Más recientes primero</option>
            <option value="old">Más antiguos primero</option>
          </select>

          <select id="viewSelect">
            <option value="split">Columnas por identidad</option>
            <option value="all">Todos mezclados</option>
            <option value="hombre">Solo hombres</option>
            <option value="libre">Solo libre</option>
            <option value="mujer">Solo mujeres</option>
          </select>

          <select id="reactionFilter">
            <option value="all">Todas las reacciones</option>
            <option value="fire">🔥 Fire</option>
            <option value="heart">💖 Heart</option>
            <option value="fear">😱 Fear</option>
            <option value="sob">😭 Sob</option>
          </select>
        </div>
      </div>

      <div id="boards" class="boards">
        <div class="board" id="boardH">
          <div class="boardHead">♂ Hombre</div>
          <div class="boardBody" id="listH"></div>
        </div>

        <div class="board" id="boardL">
          <div class="boardHead">◌ Libre</div>
          <div class="boardBody" id="listL"></div>
        </div>

        <div class="board" id="boardM">
          <div class="boardHead">♀ Mujer</div>
          <div class="boardBody" id="listM"></div>
        </div>
      </div>
    </section>
  </div>

  <div id="modalOverlay" class="modalOverlay">
    <div class="modalCard">
      <button id="modalClose" class="modalClose">Cerrar</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase.js"></script>
  <script>
    const ASSET = {
      logo: "https://miercoles.zaurio.es/assets/confesionario.png",
      fire: "https://miercoles.zaurio.es/assets/fire.png",
      heart: "https://miercoles.zaurio.es/assets/heart.png",
      fear: "https://miercoles.zaurio.es/assets/fear.png",
      sob: "https://miercoles.zaurio.es/assets/sob.png"
    };

    const btnHombre = document.getElementById("btnHombre");
    const btnLibre = document.getElementById("btnLibre");
    const btnMujer = document.getElementById("btnMujer");
    const switchThumb = document.getElementById("switchThumb");

    const edad = document.getElementById("edad");
    const texto = document.getElementById("texto");
    const btnEnviar = document.getElementById("btnEnviar");
    const status = document.getElementById("status");
    const composeBtn = document.getElementById("composeBtn");
    const composer = document.getElementById("composer");

    const sortSelect = document.getElementById("sortSelect");
    const viewSelect = document.getElementById("viewSelect");
    const reactionFilter = document.getElementById("reactionFilter");

    const boardH = document.getElementById("boardH");
    const boardL = document.getElementById("boardL");
    const boardM = document.getElementById("boardM");

    const listH = document.getElementById("listH");
    const listL = document.getElementById("listL");
    const listM = document.getElementById("listM");

    const featuredBox = document.getElementById("featuredBox");
    const featuredBody = document.getElementById("featuredBody");

    const modalOverlay = document.getElementById("modalOverlay");
    const modalBody = document.getElementById("modalBody");
    const modalClose = document.getElementById("modalClose");

    let genero = "hombre";
    let secretos = [];

    function setGenero(v){
      genero = v;

      btnHombre.classList.toggle("active", v === "hombre");
      btnLibre.classList.toggle("active", v === "libre");
      btnMujer.classList.toggle("active", v === "mujer");

      switchThumb.className = "switchThumb " + v;
    }

    btnHombre.addEventListener("click", ()=>setGenero("hombre"));
    btnLibre.addEventListener("click", ()=>setGenero("libre"));
    btnMujer.addEventListener("click", ()=>setGenero("mujer"));

    setGenero("hombre");

    function esc(s){
      return (s||"")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function setStatus(t, ok=true){
      status.textContent = t || "";
      status.style.color = ok ? "#ffee00" : "#ff9ad8";
    }

    function formatDate(iso){
      const d = new Date(iso);
      return d.toLocaleDateString() + " · " + d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
    }

    function votedMap(){
      try{
        return JSON.parse(localStorage.getItem("zaurio_confesionario_votes") || "{}");
      }catch{
        return {};
      }
    }

    function setVoted(secretId, reaction){
      const map = votedMap();
      map[secretId] = reaction;
      localStorage.setItem("zaurio_confesionario_votes", JSON.stringify(map));
    }

    function getVoted(secretId){
      return votedMap()[secretId] || null;
    }

    function reactionBtn(secretId, type, count){
      const voted = getVoted(secretId) === type ? " voted" : "";
      return `
        <button class="reactionBtn${voted}" data-react="${type}" data-id="${secretId}">
          <img class="reactionIcon" src="${ASSET[type]}" alt="${type}">
          <span>${count}</span>
        </button>
      `;
    }

    function labelGenero(g){
      if (g === "hombre") return "♂ Hombre";
      if (g === "mujer") return "♀ Mujer";
      return "◌ Libre";
    }

    function classGenero(g){
      if (g === "hombre") return "male";
      if (g === "mujer") return "female";
      return "free";
    }

    function secretCard(s){
      const tint = classGenero(s.genero);
      return `
        <article class="secret ${tint}" id="secret-${s.numero_secreto}">
          <div class="secretMeta">
            <span>#${s.numero_secreto ?? "—"}</span>
            <span>${labelGenero(s.genero)}</span>
            <span>${s.edad} años</span>
            <span>${formatDate(s.creado)}</span>
          </div>

          <div class="secretText">${esc(s.texto)}</div>

          <div class="footerRow">
            <div class="reactionBar">
              ${reactionBtn(s.id, "fire", s.fire_count || 0)}
              ${reactionBtn(s.id, "heart", s.heart_count || 0)}
              ${reactionBtn(s.id, "fear", s.fear_count || 0)}
              ${reactionBtn(s.id, "sob", s.sob_count || 0)}
            </div>

            <button class="shareBtn" data-share="${s.numero_secreto}">
              Compartir
            </button>
          </div>
        </article>
      `;
    }

    function currentList(){
      let arr = [...secretos];

      const sort = sortSelect.value;
      const view = viewSelect.value;
      const rf = reactionFilter.value;

      if (rf !== "all"){
        arr = arr.filter(x => (x[rf + "_count"] || 0) > 0);
      }

      arr.sort((a,b)=>{
        const da = new Date(a.creado).getTime();
        const db = new Date(b.creado).getTime();
        return sort === "new" ? db - da : da - db;
      });

      return { arr, view };
    }

    function renderFeatured(arr){
      if (!arr.length){
        featuredBox.style.display = "none";
        featuredBody.innerHTML = "";
        return;
      }

      const sorted = [...arr].sort((a,b)=>{
        const ta = a.total_reacciones || 0;
        const tb = b.total_reacciones || 0;
        if (tb !== ta) return tb - ta;
        return new Date(b.creado) - new Date(a.creado);
      });

      const top = sorted[0];
      if (!top || (top.total_reacciones || 0) <= 0){
        featuredBox.style.display = "none";
        featuredBody.innerHTML = "";
        return;
      }

      featuredBox.style.display = "";
      featuredBody.innerHTML = secretCard(top);
    }

    function renderLists(){
      const { arr, view } = currentList();

      renderFeatured(arr);

      listH.innerHTML = "";
      listL.innerHTML = "";
      listM.innerHTML = "";

      if (view === "all"){
        boardH.style.display = "";
        boardL.style.display = "none";
        boardM.style.display = "none";
        boardH.querySelector(".boardHead").textContent = "Todos";
        listH.innerHTML = arr.length ? arr.map(secretCard).join("") : `<div class="empty">No hay confesiones todavía.</div>`;
        return;
      }

      if (view === "hombre"){
        boardH.style.display = "";
        boardL.style.display = "none";
        boardM.style.display = "none";
        boardH.querySelector(".boardHead").textContent = "♂ Hombre";
        const h = arr.filter(x=>x.genero==="hombre");
        listH.innerHTML = h.length ? h.map(secretCard).join("") : `<div class="empty">No hay confesiones de hombres.</div>`;
        return;
      }

      if (view === "libre"){
        boardH.style.display = "none";
        boardL.style.display = "";
        boardM.style.display = "none";
        const l = arr.filter(x=>x.genero==="libre");
        listL.innerHTML = l.length ? l.map(secretCard).join("") : `<div class="empty">No hay confesiones libres.</div>`;
        return;
      }

      if (view === "mujer"){
        boardH.style.display = "none";
        boardL.style.display = "none";
        boardM.style.display = "";
        const m = arr.filter(x=>x.genero==="mujer");
        listM.innerHTML = m.length ? m.map(secretCard).join("") : `<div class="empty">No hay confesiones de mujeres.</div>`;
        return;
      }

      boardH.style.display = "";
      boardL.style.display = "";
      boardM.style.display = "";
      boardH.querySelector(".boardHead").textContent = "♂ Hombre";
      boardL.querySelector(".boardHead").textContent = "◌ Libre";
      boardM.querySelector(".boardHead").textContent = "♀ Mujer";

      const h = arr.filter(x=>x.genero==="hombre");
      const l = arr.filter(x=>x.genero==="libre");
      const m = arr.filter(x=>x.genero==="mujer");

      listH.innerHTML = h.length ? h.map(secretCard).join("") : `<div class="empty">No hay confesiones de hombres.</div>`;
      listL.innerHTML = l.length ? l.map(secretCard).join("") : `<div class="empty">No hay confesiones libres.</div>`;
      listM.innerHTML = m.length ? m.map(secretCard).join("") : `<div class="empty">No hay confesiones de mujeres.</div>`;
    }

    async function cargarSecretos(){
      const { data, error } = await supabaseClient
        .from("secretos_con_reacciones")
        .select("*")
        .eq("estado","aprobado")
        .limit(300);

      if (error){
        listH.innerHTML = `<div class="empty">Error cargando confesiones.</div>`;
        listL.innerHTML = "";
        listM.innerHTML = "";
        return;
      }

      secretos = data || [];
      renderLists();
      openPermalinkIfPresent();
    }

    async function votar(secretId, reaction, btn){
      const currentVote = getVoted(secretId);
      if (currentVote){
        btn.classList.add("bump");
        setTimeout(()=>btn.classList.remove("bump"), 240);
        return;
      }

      const { error } = await supabaseClient
        .from("secreto_reacciones")
        .insert([{ secreto_id: secretId, reaccion: reaction }]);

      if (error){
        setStatus("❌ No se pudo registrar la reacción.", false);
        return;
      }

      setVoted(secretId, reaction);
      btn.classList.add("voted", "bump");
      setTimeout(()=>btn.classList.remove("bump"), 240);
      await cargarSecretos();
    }

    async function compartir(numero, btn){
      const url = `${location.origin}/?s=${encodeURIComponent(numero)}`;
      try{
        await navigator.clipboard.writeText(url);
        btn.classList.add("ok");
        btn.textContent = "Copiado";
        setTimeout(()=>{
          btn.classList.remove("ok");
          btn.textContent = "Compartir";
        }, 1300);
      }catch{
        prompt("Copia este enlace:", url);
      }
    }

    function openModal(html){
      modalBody.innerHTML = html;
      modalOverlay.classList.add("on");
      document.body.classList.add("modal-open");
    }

    function closeModal(){
      modalOverlay.classList.remove("on");
      document.body.classList.remove("modal-open");
      modalBody.innerHTML = "";
    }

    modalClose.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e)=>{
      if (e.target === modalOverlay) closeModal();
    });

    function openPermalinkIfPresent(){
      const sp = new URLSearchParams(location.search);
      const s = sp.get("s");
      if (!s) return;

      const target = secretos.find(x => String(x.numero_secreto) === String(s));
      if (!target) return;

      openModal(secretCard(target));
    }

    sortSelect.addEventListener("change", renderLists);
    viewSelect.addEventListener("change", renderLists);
    reactionFilter.addEventListener("change", renderLists);

    composeBtn.addEventListener("click", ()=>{
      composer.scrollIntoView({ behavior:"smooth", block:"start" });
    });

    window.addEventListener("scroll", ()=>{
      if (window.scrollY > 180) composeBtn.classList.add("show");
      else composeBtn.classList.remove("show");
    });

    document.addEventListener("click", async (e)=>{
      const reactBtn = e.target.closest(".reactionBtn");
      if (reactBtn){
        await votar(reactBtn.dataset.id, reactBtn.dataset.react, reactBtn);
        return;
      }

      const shareBtn = e.target.closest(".shareBtn");
      if (shareBtn){
        await compartir(shareBtn.dataset.share, shareBtn);
      }
    });

    btnEnviar.addEventListener("click", async ()=>{
      const eNum = parseInt(edad.value, 10);
      const t = (texto.value || "").trim();

      if (!genero){
        setStatus("Selecciona una identidad.", false);
        return;
      }
      if (!Number.isFinite(eNum) || eNum < 18 || eNum > 99){
        setStatus("Pon una edad válida entre 18 y 99.", false);
        return;
      }
      if (t.length < 15){
        setStatus("La confesión debe tener al menos 15 caracteres.", false);
        return;
      }

      btnEnviar.disabled = true;
      btnEnviar.style.opacity = ".65";
      setStatus("Enviando…", true);

      const { error } = await supabaseClient
        .from("secretos")
        .insert([{
          genero,
          edad: eNum,
          texto: t,
          estado: "pendiente"
        }]);

      if (error){
        setStatus("❌ " + error.message, false);
        btnEnviar.disabled = false;
        btnEnviar.style.opacity = "1";
        return;
      }

      texto.value = "";
      edad.value = "";
      setGenero("hombre");
      setStatus("✅ Confesión enviada. Zaurio la revisará.", true);

      btnEnviar.disabled = false;
      btnEnviar.style.opacity = "1";
    });

    cargarSecretos();
  </script>
</body>
</html>
