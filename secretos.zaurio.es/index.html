<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Secretos Zaurio</title>
  <link rel="icon" href="../miercoles.zaurio.es/assets/favicon.png">
  <style>
    :root{
      --bg1:#170026;
      --bg2:#000;
      --card:rgba(36,0,70,.82);
      --stroke:rgba(255,255,255,.14);
      --yellow:#ffee00;
      --pink:#ff00aa;
      --cyan:#2fd3ff;
      --text:#fff;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      min-height:100%;
      background:radial-gradient(circle at top,#2a0046 0%,#12001d 35%,#000 100%);
      color:var(--text);
      font-family:Arial,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    }
    .wrap{
      width:min(1180px,94vw);
      margin:20px auto 40px;
    }
    .nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }
    .nav a{
      text-decoration:none;
      color:white;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.16);
      padding:10px 14px;
      border-radius:999px;
      font-weight:1000;
      box-shadow:0 0 18px rgba(255,0,170,.12);
    }
    .nav a.active{
      background:rgba(255,238,0,.16);
      border-color:rgba(255,238,0,.28);
      color:#fff;
    }
    .hero{
      background:var(--card);
      border:1px solid var(--stroke);
      border-radius:26px;
      box-shadow:0 0 45px rgba(255,0,170,.20);
      overflow:hidden;
      margin-bottom:18px;
    }
    .heroHead{
      padding:18px 20px 10px;
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    h1{
      margin:0;
      font-size:40px;
      line-height:1;
      font-weight:1000;
    }
    .sub{
      margin:10px 0 0;
      opacity:.88;
      font-size:16px;
    }
    .heroBody{
      padding:18px 20px 20px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }
    .fieldLabel{
      font-size:13px;
      opacity:.82;
      margin-bottom:6px;
      font-weight:700;
    }
    .fieldGroup{
      display:flex;
      flex-direction:column;
    }
    .toggle{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .toggle button{
      border:none;
      cursor:pointer;
      padding:12px 16px;
      border-radius:999px;
      font-weight:1000;
      background:rgba(255,255,255,.10);
      color:#fff;
      border:1px solid rgba(255,255,255,.16);
      min-width:120px;
    }
    .toggle button.on{
      background:rgba(255,238,0,.16);
      border-color:rgba(255,238,0,.35);
      box-shadow:0 0 18px rgba(255,238,0,.10);
    }
    input, textarea, select{
      width:100%;
      background:rgba(0,0,0,.22);
      color:#fff;
      border:1px solid rgba(255,255,255,.16);
      border-radius:18px;
      padding:13px 14px;
      font-size:16px;
      outline:none;
    }
    textarea{
      min-height:180px;
      resize:vertical;
    }
    .full{grid-column:1 / -1}
    .actions{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }
    .btn{
      border:none;
      cursor:pointer;
      padding:12px 18px;
      border-radius:999px;
      font-weight:1000;
      transition:transform .12s ease,opacity .12s ease;
    }
    .btn:active{transform:scale(.98)}
    .btnPrimary{
      background:var(--yellow);
      color:#1a002a;
      box-shadow:0 0 18px rgba(255,238,0,.25);
    }
    .status{
      font-weight:1000;
      min-height:22px;
      white-space:pre-wrap;
    }

    .feedWrap{
      display:flex;
      flex-direction:column;
      gap:14px;
    }
    .feedTop{
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
    }
    .filters{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .filters select{
      width:auto;
      min-width:180px;
      border-radius:999px;
      padding:11px 14px;
    }

    .boards{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }

    .board{
      background:var(--card);
      border:1px solid var(--stroke);
      border-radius:24px;
      box-shadow:0 0 35px rgba(255,0,170,.16);
      overflow:hidden;
    }
    .boardHead{
      padding:14px 16px;
      font-weight:1000;
      border-bottom:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
    }
    .boardBody{
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .secret{
      border-radius:18px;
      background:rgba(0,0,0,.22);
      border:1px solid rgba(255,255,255,.10);
      padding:14px;
      box-shadow:0 0 18px rgba(255,0,170,.08);
    }
    .secretMeta{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      font-size:12px;
      opacity:.82;
      margin-bottom:10px;
      font-weight:700;
    }
    .secretText{
      white-space:pre-wrap;
      word-break:break-word;
      line-height:1.35;
      font-size:15px;
    }
    .empty{
      opacity:.72;
      font-weight:700;
      padding:8px 2px;
    }

    @media (max-width: 860px){
      .heroBody{grid-template-columns:1fr}
      .boards{grid-template-columns:1fr}
      h1{font-size:34px}
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="nav">
      <a href="https://miercoles.zaurio.es">Miércoles</a>
      <a href="https://secretos.zaurio.es" class="active">Secretos</a>
    </div>

    <section class="hero">
      <div class="heroHead">
        <h1>Secretos Zaurio</h1>
        <p class="sub">Confiesa de forma anónima. Tú envías. Zaurio decide si aparece.</p>
      </div>

      <div class="heroBody">
        <div class="fieldGroup">
          <div class="fieldLabel">Género</div>
          <div class="toggle">
            <button id="btnHombre" type="button">♂ Hombre</button>
            <button id="btnMujer" type="button">♀ Mujer</button>
          </div>
        </div>

        <div class="fieldGroup">
          <div class="fieldLabel">Edad</div>
          <input id="edad" type="number" min="18" max="99" placeholder="18 - 99" />
        </div>

        <div class="fieldGroup full">
          <div class="fieldLabel">Tu secreto</div>
          <textarea id="texto" maxlength="700" placeholder="Cuenta tu secreto aquí..."></textarea>
        </div>

        <div class="fieldGroup full">
          <div class="actions">
            <div id="status" class="status"></div>
            <button id="btnEnviar" class="btn btnPrimary">Enviar secreto</button>
          </div>
        </div>
      </div>
    </section>

    <section class="feedWrap">
      <div class="feedTop">
        <h2 style="margin:0;font-size:26px;">Secretos publicados</h2>
        <div class="filters">
          <select id="sortSelect">
            <option value="new">Más recientes primero</option>
            <option value="old">Más antiguos primero</option>
          </select>
          <select id="viewSelect">
            <option value="split">2 columnas por género</option>
            <option value="all">Todos mezclados</option>
            <option value="hombre">Solo hombres</option>
            <option value="mujer">Solo mujeres</option>
          </select>
        </div>
      </div>

      <div id="boards" class="boards">
        <div class="board" id="boardH">
          <div class="boardHead">♂ Hombre</div>
          <div class="boardBody" id="listH"></div>
        </div>

        <div class="board" id="boardM">
          <div class="boardHead">♀ Mujer</div>
          <div class="boardBody" id="listM"></div>
        </div>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase.js"></script>
  <script>
    const btnHombre = document.getElementById("btnHombre");
    const btnMujer = document.getElementById("btnMujer");
    const edad = document.getElementById("edad");
    const texto = document.getElementById("texto");
    const btnEnviar = document.getElementById("btnEnviar");
    const status = document.getElementById("status");

    const sortSelect = document.getElementById("sortSelect");
    const viewSelect = document.getElementById("viewSelect");

    const boards = document.getElementById("boards");
    const boardH = document.getElementById("boardH");
    const boardM = document.getElementById("boardM");
    const listH = document.getElementById("listH");
    const listM = document.getElementById("listM");

    let genero = "hombre";
    let secretos = [];

    function setGenero(v){
      genero = v;
      btnHombre.classList.toggle("on", v === "hombre");
      btnMujer.classList.toggle("on", v === "mujer");
    }

    btnHombre.addEventListener("click", ()=>setGenero("hombre"));
    btnMujer.addEventListener("click", ()=>setGenero("mujer"));
    setGenero("hombre");

    function esc(s){
      return (s||"")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function setStatus(t, ok=true){
      status.textContent = t || "";
      status.style.color = ok ? "#ffee00" : "#ff9ad8";
    }

    function formatDate(iso){
      const d = new Date(iso);
      return d.toLocaleDateString() + " · " + d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
    }

    function secretCard(s){
      return `
        <article class="secret">
          <div class="secretMeta">
            <span>#${s.numero_secreto ?? "—"}</span>
            <span>${s.genero === "hombre" ? "♂ Hombre" : "♀ Mujer"}</span>
            <span>${s.edad} años</span>
            <span>${formatDate(s.creado)}</span>
          </div>
          <div class="secretText">${esc(s.texto)}</div>
        </article>
      `;
    }

    function renderLists(){
      const sort = sortSelect.value;
      const view = viewSelect.value;

      let arr = [...secretos];
      arr.sort((a,b)=>{
        const da = new Date(a.creado).getTime();
        const db = new Date(b.creado).getTime();
        return sort === "new" ? db - da : da - db;
      });

      listH.innerHTML = "";
      listM.innerHTML = "";

      if (view === "all"){
        boardH.style.display = "";
        boardM.style.display = "none";
        boardH.querySelector(".boardHead").textContent = "Todos";
        listH.innerHTML = arr.length ? arr.map(secretCard).join("") : `<div class="empty">No hay secretos todavía.</div>`;
        return;
      }

      if (view === "hombre"){
        boardH.style.display = "";
        boardM.style.display = "none";
        boardH.querySelector(".boardHead").textContent = "♂ Hombre";
        const h = arr.filter(x=>x.genero==="hombre");
        listH.innerHTML = h.length ? h.map(secretCard).join("") : `<div class="empty">No hay secretos de hombres.</div>`;
        return;
      }

      if (view === "mujer"){
        boardH.style.display = "none";
        boardM.style.display = "";
        const m = arr.filter(x=>x.genero==="mujer");
        listM.innerHTML = m.length ? m.map(secretCard).join("") : `<div class="empty">No hay secretos de mujeres.</div>`;
        return;
      }

      // split
      boardH.style.display = "";
      boardM.style.display = "";
      boardH.querySelector(".boardHead").textContent = "♂ Hombre";

      const h = arr.filter(x=>x.genero==="hombre");
      const m = arr.filter(x=>x.genero==="mujer");

      listH.innerHTML = h.length ? h.map(secretCard).join("") : `<div class="empty">No hay secretos de hombres.</div>`;
      listM.innerHTML = m.length ? m.map(secretCard).join("") : `<div class="empty">No hay secretos de mujeres.</div>`;
    }

    async function cargarSecretos(){
      const { data, error } = await supabaseClient
        .from("secretos")
        .select("id,numero_secreto,genero,edad,texto,creado,estado")
        .eq("estado","aprobado")
        .limit(200);

      if (error){
        listH.innerHTML = `<div class="empty">Error cargando secretos.</div>`;
        listM.innerHTML = "";
        return;
      }

      secretos = data || [];
      renderLists();
    }

    sortSelect.addEventListener("change", renderLists);
    viewSelect.addEventListener("change", renderLists);

    btnEnviar.addEventListener("click", async ()=>{
      const e = parseInt(edad.value, 10);
      const t = (texto.value || "").trim();

      if (!genero){
        setStatus("Selecciona género.", false);
        return;
      }
      if (!Number.isFinite(e) || e < 18 || e > 99){
        setStatus("Pon una edad válida entre 18 y 99.", false);
        return;
      }
      if (t.length < 15){
        setStatus("El secreto debe tener al menos 15 caracteres.", false);
        return;
      }

      btnEnviar.disabled = true;
      btnEnviar.style.opacity = ".65";
      setStatus("Enviando…", true);

      const { error } = await supabaseClient
        .from("secretos")
        .insert([{
          genero,
          edad: e,
          texto: t,
          estado: "pendiente"
        }]);

      if (error){
        setStatus("❌ " + error.message, false);
        btnEnviar.disabled = false;
        btnEnviar.style.opacity = "1";
        return;
      }

      texto.value = "";
      edad.value = "";
      setGenero("hombre");
      setStatus("✅ Secreto enviado. Zaurio lo revisará.", true);

      btnEnviar.disabled = false;
      btnEnviar.style.opacity = "1";
    });

    cargarSecretos();
  </script>
</body>
</html>
