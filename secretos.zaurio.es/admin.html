<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin — El Confesionario</title>
  <link rel="icon" href="https://miercoles.zaurio.es/assets/favicon.png">
  <style>
    :root{
      --card: rgba(36,0,70,.82);
      --stroke: rgba(255,255,255,.14);
      --yellow:#ffee00;
      --pink:#ff00aa;
      --male:#2fd3ff;
      --female:#ff6bd6;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:radial-gradient(circle,#1a002a,#000);
      color:#fff;
      font-family:Arial,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    }
    .wrap{width:min(1180px,94vw);margin:24px auto}
    .nav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
    .nav a{
      text-decoration:none;color:white;background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.16);
      padding:10px 14px;border-radius:999px;font-weight:1000;
    }
    .nav a.active{
      background:rgba(255,238,0,.16);
      border-color:rgba(255,238,0,.28);
    }
    .logo{
      width:min(420px,90%);
      display:block;
      margin:0 auto 12px;
      filter:drop-shadow(0 0 18px rgba(255,0,170,.18));
    }
    .login{
      max-width:420px;margin:70px auto;padding:22px;border-radius:22px;
      background:var(--card);border:1px solid var(--stroke);
      box-shadow:0 0 45px rgba(255,0,170,.20);
    }
    .panel{display:none}
    .panel.on{display:block}
    .field{
      width:100%;padding:12px 14px;border-radius:14px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(0,0,0,.20);color:#fff;font-size:15px;outline:none;margin-top:10px;
    }
    .btn{
      border:none;cursor:pointer;padding:10px 14px;border-radius:999px;font-weight:1000;
      transition:transform .12s ease,opacity .12s ease;
    }
    .btn:active{transform:scale(.96)}
    .btnPrimary{background:var(--yellow);color:#1a002a;box-shadow:0 0 18px rgba(255,238,0,.25)}
    .btnDanger{background:var(--pink);color:#fff;box-shadow:0 0 18px rgba(255,0,170,.25)}
    .btnGhost{background:rgba(255,255,255,.10);color:#fff;border:1px solid rgba(255,255,255,.16)}
    .top{
      display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px;
    }
    .pill{
      display:inline-flex;gap:10px;align-items:center;padding:10px 14px;border-radius:999px;
      background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);font-weight:1000;
    }
    .section{
      background:var(--card);border:1px solid var(--stroke);border-radius:22px;
      padding:14px;box-shadow:0 0 35px rgba(255,0,170,.14);margin-bottom:16px;
    }
    .grid{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;
    }
    .card{
      background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.10);
      border-radius:18px;padding:14px;
    }
    .card.male{
      border-color:rgba(47,211,255,.28);
      background:linear-gradient(180deg, rgba(47,211,255,.07), rgba(0,0,0,.22));
    }
    .card.female{
      border-color:rgba(255,107,214,.28);
      background:linear-gradient(180deg, rgba(255,107,214,.07), rgba(0,0,0,.22));
    }
    .meta{
      display:flex;gap:10px;flex-wrap:wrap;font-size:12px;opacity:.82;margin-bottom:10px;font-weight:700;
    }
    .text{
      white-space:pre-wrap;word-break:break-word;line-height:1.35;
    }
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .reactions{
      display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;font-size:13px;font-weight:1000;opacity:.9;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="nav">
      <a href="https://miercoles.zaurio.es">Miércoles</a>
      <a href="https://secretos.zaurio.es">El Confesionario</a>
      <a href="https://secretos.zaurio.es/admin.html" class="active">Admin Confesionario</a>
    </div>

    <div id="login" class="login">
      <img class="logo" src="https://miercoles.zaurio.es/assets/confesionario.png" alt="El Confesionario">
      <p style="margin:0;opacity:.85;">Moderación de confesiones</p>
      <input id="email" class="field" placeholder="Email" value="dramasaurio@zaurio.es" />
      <input id="pass" class="field" type="password" placeholder="Contraseña" />
      <div style="display:flex;gap:10px;margin-top:12px;">
        <button id="btnLogin" class="btn btnPrimary" style="flex:1;">Entrar</button>
      </div>
      <div id="loginMsg" style="margin-top:12px;font-weight:1000;"></div>
    </div>

    <div id="panel" class="panel">
      <div class="top">
        <div class="pill">Pendientes: <span id="countPend">0</span></div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <button id="btnRefresh" class="btn btnGhost">Actualizar</button>
          <button id="btnLogout" class="btn btnGhost">Salir</button>
        </div>
      </div>

      <section class="section">
        <h2 style="margin:0 0 12px;">Pendientes</h2>
        <div class="grid" id="pendGrid"></div>
      </section>

      <section class="section">
        <h2 style="margin:0 0 12px;">Aprobados recientes</h2>
        <div class="grid" id="okGrid"></div>
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase.js"></script>
  <script>
    const login = document.getElementById("login");
    const panel = document.getElementById("panel");
    const loginMsg = document.getElementById("loginMsg");
    const pendGrid = document.getElementById("pendGrid");
    const okGrid = document.getElementById("okGrid");
    const countPend = document.getElementById("countPend");

    function esc(s){
      return (s||"")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function showPanel(){
      login.style.display = "none";
      panel.classList.add("on");
    }
    function showLogin(){
      panel.classList.remove("on");
      login.style.display = "block";
    }

    function card(s, pending=true){
      const tint = s.genero === "hombre" ? "male" : "female";
      return `
        <article class="card ${tint}">
          <div class="meta">
            <span>#${s.numero_secreto ?? "—"}</span>
            <span>${s.genero === "hombre" ? "♂ Hombre" : "♀ Mujer"}</span>
            <span>${s.edad} años</span>
            <span>${new Date(s.creado).toLocaleDateString()} · ${new Date(s.creado).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"})}</span>
          </div>
          <div class="text">${esc(s.texto)}</div>

          <div class="reactions">
            <span>🔥 ${s.fire_count || 0}</span>
            <span>💖 ${s.heart_count || 0}</span>
            <span>😱 ${s.fear_count || 0}</span>
            <span>😭 ${s.sob_count || 0}</span>
            <span>Σ ${s.total_reacciones || 0}</span>
          </div>

          <div class="actions">
            ${pending ? `<button class="btn btnPrimary" data-act="approve" data-id="${s.id}">Aprobar</button>` : ``}
            <button class="btn btnDanger" data-act="archive" data-id="${s.id}">Archivar</button>
          </div>
        </article>
      `;
    }

    async function loadData(){
      const pend = await supabaseClient
        .from("secretos_con_reacciones")
        .select("*")
        .eq("estado","pendiente")
        .order("creado",{ascending:false});

      const ok = await supabaseClient
        .from("secretos_con_reacciones")
        .select("*")
        .eq("estado","aprobado")
        .order("creado",{ascending:false})
        .limit(20);

      if (pend.error || ok.error){
        pendGrid.innerHTML = `<div>❌ Error cargando confesiones.</div>`;
        okGrid.innerHTML = "";
        return;
      }

      countPend.textContent = String(pend.data.length);
      pendGrid.innerHTML = pend.data.length ? pend.data.map(x=>card(x,true)).join("") : `<div style="opacity:.75">No hay pendientes.</div>`;
      okGrid.innerHTML = ok.data.length ? ok.data.map(x=>card(x,false)).join("") : `<div style="opacity:.75">No hay aprobados.</div>`;
    }

    async function approve(id){
      const { error } = await supabaseClient
        .from("secretos")
        .update({ estado:"aprobado", aprobado_at:new Date().toISOString() })
        .eq("id", id);

      if (error){ alert(error.message); return; }
      await loadData();
    }

    async function archiveSecret(id){
      const { error } = await supabaseClient
        .from("secretos")
        .update({ estado:"archivado" })
        .eq("id", id);

      if (error){ alert(error.message); return; }
      await loadData();
    }

    pendGrid.addEventListener("click", async (e)=>{
      const b = e.target.closest("button");
      if (!b) return;
      const id = b.dataset.id;
      const act = b.dataset.act;
      if (act === "approve") await approve(id);
      if (act === "archive") await archiveSecret(id);
    });

    okGrid.addEventListener("click", async (e)=>{
      const b = e.target.closest("button");
      if (!b) return;
      const id = b.dataset.id;
      const act = b.dataset.act;
      if (act === "archive") await archiveSecret(id);
    });

    document.getElementById("btnLogin").addEventListener("click", async ()=>{
      loginMsg.textContent = "Entrando…";
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("pass").value;

      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error){
        loginMsg.textContent = "❌ " + error.message;
        return;
      }

      loginMsg.textContent = "✅ OK";
      showPanel();
      await loadData();
    });

    document.getElementById("btnRefresh").addEventListener("click", loadData);
    document.getElementById("btnLogout").addEventListener("click", async ()=>{
      await supabaseClient.auth.signOut();
      showLogin();
    });

    (async ()=>{
      const { data } = await supabaseClient.auth.getSession();
      if (data.session){
        showPanel();
        await loadData();
      } else {
        showLogin();
      }
    })();
  </script>
</body>
</html>
