<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin — El Confesionario</title>
  <link rel="icon" href="https://miercoles.zaurio.es/assets/favicon-32x32.png">

  <style>
    :root{
      --card: rgba(36,0,70,.82);
      --stroke: rgba(255,255,255,.14);
      --yellow:#ffee00;
      --pink:#ff00aa;
      --male:#2fd3ff;
      --female:#ff4fc9;
      --free:#79d85d;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      background:radial-gradient(circle,#1a002a,#000);
      color:#fff;
      font-family:Arial,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    }

    .wrap{
      width:min(1180px,94vw);
      margin:18px auto 28px;
    }

    .topMenu{
      position:sticky;
      top:10px;
      z-index:50;
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      align-items:center;
      margin-bottom:18px;
      padding:12px 16px;
      border-radius:999px;
      background:rgba(32,8,56,.78);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 0 24px rgba(255,0,170,.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .menuLeft{display:flex;justify-content:flex-start;align-items:center}
    .menuCenter{display:flex;justify-content:center;align-items:center;gap:22px}
    .menuRight{display:flex;justify-content:flex-end;align-items:center}

    .menuLogoLink{
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      transition:transform .16s ease, filter .16s ease, opacity .16s ease;
      transform-origin:center center;
      opacity:.75;
      filter: grayscale(1) brightness(.72);
    }

    .menuLogoLink:hover{
      transform:translateY(-2px) scale(1.04);
      opacity:1;
      filter: grayscale(0) brightness(1);
    }

    .menuLogoLink.active{
      opacity:1;
      filter: grayscale(0) brightness(1);
    }

    .menuLogoLink.active .menuLogo{
      filter: drop-shadow(0 0 18px rgba(255,0,170,.16));
    }

    .menuLogo{
      display:block;
      height:auto;
      width:auto;
      object-fit:contain;
    }

    .menuLogo.zaurio{max-height:52px;border-radius:10px}
    .menuLogo.miercoles{max-height:50px}
    .menuLogo.confesion{max-height:54px}

    .login{
      max-width:420px;
      margin:70px auto;
      padding:22px;
      border-radius:22px;
      background:var(--card);
      border:1px solid var(--stroke);
      box-shadow:0 0 45px rgba(255,0,170,.20);
    }

    .panel{display:none}
    .panel.on{display:block}

    .field{
      width:100%;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(0,0,0,.20);
      color:#fff;
      font-size:15px;
      outline:none;
      margin-top:10px;
    }

    .btn{
      border:none;
      cursor:pointer;
      padding:10px 14px;
      border-radius:999px;
      font-weight:1000;
      transition:transform .12s ease,opacity .12s ease;
    }

    .btn:active{transform:scale(.96)}
    .btnPrimary{background:var(--yellow);color:#1a002a;box-shadow:0 0 18px rgba(255,238,0,.25)}
    .btnDanger{background:var(--pink);color:#fff;box-shadow:0 0 18px rgba(255,0,170,.25)}
    .btnGhost{background:rgba(255,255,255,.10);color:#fff;border:1px solid rgba(255,255,255,.16)}
    .btnLive{background:rgba(255,238,0,.16);color:#fff;border:1px solid rgba(255,238,0,.30)}
    .btnOff{background:rgba(255,255,255,.10);color:#fff;border:1px solid rgba(255,255,255,.16)}

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .pill{
      display:inline-flex;
      gap:10px;
      align-items:center;
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      font-weight:1000;
    }

    .section{
      background:var(--card);
      border:1px solid var(--stroke);
      border-radius:22px;
      padding:14px;
      box-shadow:0 0 35px rgba(255,0,170,.14);
      margin-bottom:16px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
      gap:14px;
    }

    .card{
      background:rgba(0,0,0,.22);
      border:1px solid rgba(255,255,255,.10);
      border-radius:18px;
      padding:14px;
    }

    .card.male{
      border-color:rgba(47,211,255,.28);
      background:linear-gradient(180deg, rgba(47,211,255,.07), rgba(0,0,0,.22));
    }

    .card.female{
      border-color:rgba(255,79,201,.30);
      background:linear-gradient(180deg, rgba(255,79,201,.10), rgba(0,0,0,.22));
    }

    .card.free{
      border-color:rgba(121,216,93,.28);
      background:linear-gradient(180deg, rgba(121,216,93,.08), rgba(0,0,0,.22));
    }

    .card.liveNow{
      box-shadow:0 0 28px rgba(255,238,0,.16);
      border-color:rgba(255,238,0,.30);
    }

    .meta{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      font-size:12px;
      opacity:.82;
      margin-bottom:10px;
      font-weight:700;
    }

    .chip{
      width:12px;
      height:12px;
      border-radius:999px;
      display:inline-block;
      flex:0 0 12px;
      box-shadow:0 0 0 2px rgba(255,255,255,.10);
    }

    .chip.male{ background:var(--male); }
    .chip.female{ background:var(--female); }
    .chip.free{ background:var(--free); }

    .livePill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,238,0,.12);
      border:1px solid rgba(255,238,0,.22);
      color:#fff;
      font-size:12px;
      font-weight:1000;
    }

    .text{
      white-space:pre-wrap;
      word-break:break-word;
      line-height:1.35;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .reactions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:12px;
      font-size:13px;
      font-weight:1000;
      opacity:.9;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topMenu">
      <div class="menuLeft">
        <a class="menuLogoLink" href="https://zaurio.es" aria-label="Zaurio">
          <img class="menuLogo zaurio" src="https://miercoles.zaurio.es/assets/favicon-32x32.png" alt="Zaurio">
        </a>
      </div>

      <div class="menuCenter">
        <a class="menuLogoLink" href="https://miercoles.zaurio.es" aria-label="Miércoles">
          <img class="menuLogo miercoles" src="https://miercoles.zaurio.es/assets/miercoles.png" alt="Miércoles">
        </a>

        <a class="menuLogoLink active" href="https://secretos.zaurio.es" aria-label="El Confesionario">
          <img class="menuLogo confesion" src="https://miercoles.zaurio.es/assets/confesion.png" alt="El Confesionario">
        </a>
      </div>

      <div class="menuRight"></div>
    </div>

    <div id="login" class="login">
      <img src="https://miercoles.zaurio.es/assets/confesion.png" alt="El Confesionario" style="width:min(320px,90%);display:block;margin:0 auto 12px;">
      <p style="margin:0;opacity:.85;">Moderación de confesiones</p>
      <input id="email" class="field" placeholder="Email" value="dramasaurio@zaurio.es" />
      <input id="pass" class="field" type="password" placeholder="Contraseña" />
      <div style="display:flex;gap:10px;margin-top:12px;">
        <button id="btnLogin" class="btn btnPrimary" style="flex:1;">Entrar</button>
      </div>
      <div id="loginMsg" style="margin-top:12px;font-weight:1000;"></div>
    </div>

    <div id="panel" class="panel">
      <div class="top">
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <div class="pill">Pendientes: <span id="countPend">0</span></div>
          <div class="pill">Live: <span id="countLive">0</span></div>
        </div>

        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <button id="btnRefresh" class="btn btnGhost">Actualizar</button>
          <button id="btnLogout" class="btn btnGhost">Salir</button>
        </div>
      </div>

      <section class="section">
        <h2 style="margin:0 0 12px;">Pendientes</h2>
        <div class="grid" id="pendGrid"></div>
      </section>

      <section class="section">
        <h2 style="margin:0 0 12px;">Aprobados recientes</h2>
        <div class="grid" id="okGrid"></div>
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase.js"></script>
  <script>
    const login = document.getElementById("login");
    const panel = document.getElementById("panel");
    const loginMsg = document.getElementById("loginMsg");
    const pendGrid = document.getElementById("pendGrid");
    const okGrid = document.getElementById("okGrid");
    const countPend = document.getElementById("countPend");
    const countLive = document.getElementById("countLive");

    function esc(s){
      return (s||"")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function showPanel(){
      login.style.display = "none";
      panel.classList.add("on");
    }

    function showLogin(){
      panel.classList.remove("on");
      login.style.display = "block";
    }

    function tintClass(g){
      if (g === "hombre") return "male";
      if (g === "mujer") return "female";
      return "free";
    }

    function chipClass(g){
      if (g === "hombre") return "male";
      if (g === "mujer") return "female";
      return "free";
    }

    function card(s, pending=true){
      const tint = tintClass(s.genero);
      const chip = chipClass(s.genero);
      const liveNow = s.show_live ? " liveNow" : "";

      return `
        <article class="card ${tint}${liveNow}">
          <div class="meta">
            <span>#${s.numero_secreto ?? "—"}</span>
            <span class="chip ${chip}"></span>
            <span>${s.edad} años</span>
            <span>${new Date(s.creado).toLocaleDateString()} · ${new Date(s.creado).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"})}</span>
            ${s.show_live ? `<span class="livePill">● En live</span>` : ``}
          </div>

          <div class="text">${esc(s.texto)}</div>

          <div class="reactions">
            <span>🔥 ${s.fire_count || 0}</span>
            <span>💖 ${s.heart_count || 0}</span>
            <span>😱 ${s.fear_count || 0}</span>
            <span>😭 ${s.sob_count || 0}</span>
            <span>Σ ${s.total_reacciones || 0}</span>
          </div>

          <div class="actions">
            ${pending ? `<button class="btn btnPrimary" data-act="approve" data-id="${s.id}">Aprobar</button>` : ``}
            ${!pending ? `<button class="btn btnLive" data-act="showlive" data-id="${s.id}">Mostrar en live</button>` : ``}
            ${!pending && s.show_live ? `<button class="btn btnOff" data-act="hidelive" data-id="${s.id}">Quitar de live</button>` : ``}
            <button class="btn btnDanger" data-act="archive" data-id="${s.id}">Archivar</button>
          </div>
        </article>
      `;
    }

    async function loadData(){
      const pend = await supabaseClient
        .from("secretos_con_reacciones")
        .select("*")
        .eq("estado","pendiente")
        .order("creado",{ascending:false});

      const ok = await supabaseClient
        .from("secretos_con_reacciones")
        .select("*")
        .eq("estado","aprobado")
        .order("creado",{ascending:false})
        .limit(30);

      const live = await supabaseClient
        .from("secretos")
        .select("id")
        .eq("show_live", true);

      if (pend.error || ok.error || live.error){
        pendGrid.innerHTML = `<div>❌ Error cargando confesiones.</div>`;
        okGrid.innerHTML = "";
        return;
      }

      countPend.textContent = String(pend.data.length);
      countLive.textContent = String(live.data.length);

      pendGrid.innerHTML = pend.data.length
        ? pend.data.map(x=>card(x,true)).join("")
        : `<div style="opacity:.75">No hay pendientes.</div>`;

      okGrid.innerHTML = ok.data.length
        ? ok.data.map(x=>card(x,false)).join("")
        : `<div style="opacity:.75">No hay aprobados.</div>`;
    }

    async function approve(id){
      const { error } = await supabaseClient
        .from("secretos")
        .update({ estado:"aprobado", aprobado_at:new Date().toISOString() })
        .eq("id", id);

      if (error){ alert(error.message); return; }
      await loadData();
    }

    async function archiveSecret(id){
      const { error } = await supabaseClient
        .from("secretos")
        .update({ estado:"archivado", show_live:false })
        .eq("id", id);

      if (error){ alert(error.message); return; }
      await loadData();
    }

    async function showInLive(id){
      const clear = await supabaseClient
        .from("secretos")
        .update({ show_live:false })
        .eq("show_live", true);

      if (clear.error){
        alert(clear.error.message);
        return;
      }

      const set = await supabaseClient
        .from("secretos")
        .update({
          show_live:true,
          live_updated_at:new Date().toISOString()
        })
        .eq("id", id);

      if (set.error){
        alert(set.error.message);
        return;
      }

      await loadData();
    }

    async function hideFromLive(id){
      const { error } = await supabaseClient
        .from("secretos")
        .update({ show_live:false })
        .eq("id", id);

      if (error){
        alert(error.message);
        return;
      }

      await loadData();
    }

    pendGrid.addEventListener("click", async (e)=>{
      const b = e.target.closest("button");
      if (!b) return;
      const id = b.dataset.id;
      const act = b.dataset.act;

      if (act === "approve") await approve(id);
      if (act === "archive") await archiveSecret(id);
    });

    okGrid.addEventListener("click", async (e)=>{
      const b = e.target.closest("button");
      if (!b) return;
      const id = b.dataset.id;
      const act = b.dataset.act;

      if (act === "archive") await archiveSecret(id);
      if (act === "showlive") await showInLive(id);
      if (act === "hidelive") await hideFromLive(id);
    });

    document.getElementById("btnLogin").addEventListener("click", async ()=>{
      loginMsg.textContent = "Entrando…";
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("pass").value;

      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error){
        loginMsg.textContent = "❌ " + error.message;
        return;
      }

      loginMsg.textContent = "✅ OK";
      showPanel();
      await loadData();
    });

    document.getElementById("btnRefresh").addEventListener("click", loadData);
    document.getElementById("btnLogout").addEventListener("click", async ()=>{
      await supabaseClient.auth.signOut();
      showLogin();
    });

    (async ()=>{
      const { data } = await supabaseClient.auth.getSession();
      if (data.session){
        showPanel();
        await loadData();
      } else {
        showLogin();
      }
    })();
  </script>
</body>
</html>
