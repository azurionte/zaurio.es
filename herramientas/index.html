<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Herramientas · Zaurio</title>
  <link rel="icon" href="/shared/assets/brand/favicon.ico" />
  <link rel="stylesheet" href="/shared/css/zaurio-ui.css">

  <style>
    :root{
      --card: rgba(36,0,70,.82);
      --stroke: rgba(255,255,255,.14);
      --pink: #ff00aa;
    }

    body {
      margin: 0;
      min-height: 100%;
      /* Aplica un degradado similar al de los otros sitios */
      background: radial-gradient(circle at top, #2a0046 0%, #12001d 35%, #000 100%);
      color: #fff;
      font-family: Arial, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }


    /* Deprecated styles for the old topbar have been removed. */

    /* CONTENIDO */
    .container {
      padding: 40px 20px;
      max-width: 1000px;
      margin: auto;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      color: #aaa;
    }

    /* TOOL CARD */
    .tool {
      margin-top: 40px;
      padding: 20px;
      border-radius: 20px;
      background: var(--card);
      border: 1px solid var(--stroke);
      display: flex;
      align-items: center;
      gap: 20px;
      cursor: pointer;
      transition: transform .2s ease, background .2s ease;
    }
    .tool:hover {
      transform: translateY(-3px);
      background: rgba(36,0,70,.94);
    }

    .tool img {
      width: 120px;
    }

    .tool-info h2 {
      margin: 0;
    }

    .tool-info p {
      margin-top: 5px;
    }

        /* La barra anterior ya se eliminó, así que no es necesario ocultarla. */

        /* === Menú superior al estilo de Miércoles/Secretos === */
        .wrap {
          width: min(720px, 92vw);
          margin: 18px auto 40px;
          padding-bottom: 26px;
        }

        .topMenu {
          position: sticky;
          top: 10px;
          z-index: 50;
          display: grid;
          grid-template-columns: 1fr auto 1fr;
          align-items: center;
          margin-bottom: 18px;
          padding: 12px 16px;
          border-radius: 999px;
          background: rgba(32,8,56,.78);
          border: 1px solid rgba(255,255,255,.10);
          box-shadow: 0 0 24px rgba(255,0,170,.08);
          backdrop-filter: blur(10px);
          -webkit-backdrop-filter: blur(10px);
        }

        .menuLeft,
        .menuCenter,
        .menuRight {
          display: flex;
          align-items: center;
          min-width: 0;
        }
        .menuLeft { justify-content: flex-start; }
        .menuCenter { justify-content: center; gap: 22px; }
        .menuRight { justify-content: flex-end; }

        .menuLogoLink {
          display: flex;
          align-items: center;
          justify-content: center;
          text-decoration: none;
          transition: transform .16s ease, filter .16s ease, opacity .16s ease;
          transform-origin: center center;
          opacity: .75;
          filter: grayscale(1) brightness(.72);
        }

        .menuLogoLink:hover {
          transform: translateY(-2px) scale(1.04);
          opacity: 1;
          filter: grayscale(0) brightness(1);
        }

        .menuLogoLink.active {
          opacity: 1;
          filter: grayscale(0) brightness(1);
        }

        .menuLogoLink.active .menuLogo {
          filter: drop-shadow(0 0 18px rgba(255,0,170,.16));
        }

        .menuLogo {
          display: block;
          height: auto;
          width: auto;
          object-fit: contain;
        }

        .menuLogo.zaurio { max-height: 52px; border-radius: 10px; }
        .menuLogo.miercoles { max-height: 50px; }
        .menuLogo.confesion { max-height: 54px; }
        .menuLogo.herramientas { max-height: 50px; }
  </style>
</head>

<body data-zaurio-nav="herramientas">
  <div data-zaurio-nav data-active="herramientas"></div>

  <!-- CONTENIDO -->
  <div class="container">

    <h1>Herramientas</h1>
    <p>Tu hub de utilidades de Zaurio</p>

    <!-- TOOL -->
    <a href="/dinerozaurio/" style="text-decoration:none; color:inherit;">
      <div class="tool">

        <!-- Usamos la imagen local de DineroZaurio -->
        <img src="/shared/assets/apps/dinerozaurio.png" alt="DineroZaurio">

        <div class="tool-info">
          <h2>DineroZaurio</h2>
          <p>Gestor de ingresos, gastos, deudas y previsión</p>
        </div>

      </div>
    </a>

  </div>

  <script src="/shared/js/zaurio-nav.js"></script>
</body>
</html>
