<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Herramientas · Zaurio</title>

  <style>
    body {
      margin: 0;
      min-height: 100%;
      /* Aplica un degradado similar al de los otros sitios */
      background: radial-gradient(circle at top, #2a0046 0%, #12001d 35%, #000 100%);
      color: #fff;
      font-family: Arial, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      margin: 18px auto 30px;
      border-radius: 999px;
      /* Fondo semitransparente y difuminado similar al de Miércoles/Secretos */
      background: rgba(32,8,56,.78);
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: 0 0 24px rgba(255,0,170,.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .menu {
      display: flex;
      gap: 10px;
    }

    .menu a {
      padding: 8px 14px;
      border-radius: 999px;
      text-decoration: none;
      color: rgba(255,255,255,.75);
      border: 1px solid transparent;
      font-weight: bold;
      transition: transform .16s ease, color .16s ease;
    }
    .menu a:hover {
      transform: translateY(-2px) scale(1.04);
      color: #fff;
    }
    .menu a.active {
      color: #ff00aa;
      border: 1px solid #ff00aa;
    }

    /* ICONOS */
    .icons {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .icons img {
      width: 28px;
      height: 28px;
    }

    .gray {
      filter: grayscale(1);
      opacity: 0.5;
    }

    /* CONTENIDO */
    .container {
      padding: 40px 20px;
      max-width: 1000px;
      margin: auto;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      color: #aaa;
    }

    /* TOOL CARD */
    .tool {
      margin-top: 40px;
      padding: 20px;
      border-radius: 20px;
      background: rgba(36,0,70,.82);
      border: 1px solid rgba(255,255,255,.14);
      display: flex;
      align-items: center;
      gap: 20px;
      cursor: pointer;
      transition: transform .2s ease, background .2s ease;
    }
    .tool:hover {
      transform: translateY(-3px);
      background: rgba(36,0,70,.94);
    }

    .tool img {
      width: 120px;
    }

    .tool-info h2 {
      margin: 0;
    }

    .tool-info p {
      margin-top: 5px;
    }
  </style>
</head>

<body>

  <!-- TOP BAR -->
  <div class="topbar">

    <div class="menu">
      <a href="https://zaurio.es">Inicio</a>
      <a href="https://miercoles.zaurio.es">Miércoles</a>
      <a href="https://secretos.zaurio.es">Secretos</a>
      <a href="https://herramientas.zaurio.es" class="active">Herramientas</a>
    </div>

    <div class="icons">
      <img src="https://miercoles.zaurio.es/assets/toolbox.png">
      <img src="https://miercoles.zaurio.es/assets/piggy.png" class="gray">
    </div>

  </div>

  <!-- CONTENIDO -->
  <div class="container">

    <h1>Herramientas</h1>
    <p>Tu hub de utilidades de Zaurio</p>

    <!-- TOOL -->
    <a href="/dinerozaurio/" style="text-decoration:none; color:inherit;">
      <div class="tool">

        <img src="https://miercoles.zaurio.es/assets/dinerozaurio.png">

        <div class="tool-info">
          <h2>DineroZaurio</h2>
          <p>Gestor de ingresos, gastos, deudas y previsión</p>
        </div>

      </div>
    </a>

  </div>

</body>
</html>
